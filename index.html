<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1959 хЛХф┐ЭчЯешнШх║л</title>
<style>
:root{--bg:#F5F7FA;--card:#fff;--text:#2D3748;--muted:#718096;--border:#E2E8F0;--accent:#4CAF7D;--sh:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
#mqSec{background:#2D3748;color:#fff;overflow:hidden}
.mq-row{display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);height:34px}
.mq-row:last-child{border-bottom:none}
.mq-lbl{flex-shrink:0;padding:0 12px;font-size:12px;font-weight:700;height:100%;display:flex;align-items:center;border-right:1px solid rgba(255,255,255,.15);white-space:nowrap}
.mq-track{overflow:hidden;flex:1;height:100%;display:flex;align-items:center}
.mq-txt{white-space:nowrap;display:inline-block;animation:scrollL 30s linear infinite;font-size:13px;padding-left:20px}
.mq-row:hover .mq-txt{animation-play-state:paused}
@keyframes scrollL{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
header{background:#fff;padding:10px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#4CAF7D,#3a9a68);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo h1{font-size:16px;font-weight:800}
.logo p{font-size:11px;color:var(--muted)}
.srch{display:flex;align-items:center;background:var(--bg);border:2px solid var(--border);border-radius:999px;padding:6px 14px;gap:6px;flex:1;max-width:380px;transition:border-color .2s}
.srch:focus-within{border-color:var(--accent)}
.srch input{border:none;background:none;outline:none;font-size:13px;width:100%;color:var(--text);font-family:inherit}
.srch input::placeholder{color:var(--muted)}
.hdr-r{display:flex;gap:5px;flex-shrink:0;align-items:center}
.sz-btns{display:flex;gap:2px}
.sz-btn{background:var(--bg);border:1px solid var(--border);padding:4px 8px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.sz-btn:hover{border-color:var(--accent);color:var(--accent)}
.btn{padding:6px 13px;border-radius:999px;border:none;cursor:pointer;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:4px;font-family:inherit;transition:all .18s}
.btn-out{background:var(--bg);color:var(--text);border:2px solid var(--border)}.btn-out:hover{border-color:var(--accent);color:var(--accent)}
.btn-grn{background:var(--accent);color:#fff}.btn-grn:hover{background:#3d9a68}
.btn-red{background:#FFF5F5;color:#C53030;border:none}.btn-red:hover{background:#FED7D7}
.btn-sm{padding:3px 9px;font-size:11px;border-radius:6px}
#pinBar{background:#FFFBEB;border-bottom:1px solid #F6E05E;padding:7px 18px;display:none;flex-wrap:wrap;gap:6px;align-items:center}
.pin-lbl{font-size:11px;font-weight:700;color:#744210;flex-shrink:0}
.pin-chip{background:#fff;border:1px solid #F6E05E;border-radius:999px;padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;color:#744210;display:inline-flex;align-items:center;gap:4px}
.pin-chip:hover{background:#FEFCBF}
#recBar{background:#EBF8FF;border-bottom:1px solid #BEE3F8;padding:7px 18px;display:none;flex-wrap:wrap;gap:6px;align-items:center}
.rec-lbl{font-size:11px;font-weight:700;color:#2B6CB0;flex-shrink:0}
.rec-chip{background:#fff;border:1px solid #BEE3F8;border-radius:999px;padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;color:#2B6CB0}
.rec-chip:hover{background:#BEE3F8}
.city-tabs{display:flex;gap:4px;padding:10px 18px 0;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto}
.c-tab{padding:8px 18px;border-radius:10px 10px 0 0;border:none;background:var(--bg);color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;position:relative;bottom:-2px;font-family:inherit;transition:all .18s}
.c-tab:hover{background:#edf2f7;color:var(--text)}
.c-tab.active{background:#fff;border:2px solid var(--border);border-bottom:2px solid #fff}
.c-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.layout{display:flex;min-height:calc(100vh - 115px)}
.sidebar{width:214px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);padding:12px 0;position:sticky;top:102px;height:calc(100vh - 102px);overflow-y:auto}
.sb-head{padding:0 10px 7px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.sb-add{background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted);display:none}
.sb-add:hover{color:var(--accent)}
.sb-item{display:flex;align-items:center;border-left:3px solid transparent;background:none;width:100%;cursor:pointer;transition:all .13s;user-select:none}
.sb-item.act{border-left-color:var(--city-color,#333);background:var(--bg)}
.sb-item:hover{background:var(--bg)}
.sb-mv-wrap{display:flex;flex-direction:column;gap:1px;padding:2px 3px 2px 6px;flex-shrink:0}
.sb-mv{background:none;border:none;cursor:pointer;font-size:10px;color:var(--muted);padding:1px 3px;border-radius:3px;line-height:1;display:block}
.sb-mv:hover:not([disabled]){background:#EDF2F7;color:var(--text)}
.sb-mv[disabled]{opacity:.25;cursor:default}
.sb-lbl{flex:1;padding:8px 6px 8px 9px;font-size:13px;font-weight:600;color:var(--muted);text-align:left;line-height:1.3}
.sb-item.act .sb-lbl{color:var(--city-color,#333)}
.sb-cnt{font-size:10px;font-weight:700;padding:1px 5px;border-radius:999px;background:#E2E8F0;color:var(--muted);flex-shrink:0}
.sb-item.act .sb-cnt{background:var(--city-color,#eee);color:#fff}
.sb-acts{display:none;gap:2px;margin:0 4px}
.sb-eb,.sb-db{background:none;border:none;cursor:pointer;font-size:11px;padding:2px 4px;border-radius:3px}
.sb-eb:hover{background:#EBF8FF}.sb-db:hover{background:#FFF5F5}
.sb-item.drag-over{border-top:3px solid var(--accent)}
.content{flex:1;padding:18px;min-width:0}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:7px}
.sec-ttl{font-size:18px;font-weight:800}
.badge{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;color:#fff}
.topic{margin-bottom:18px}
.t-hdr{display:flex;align-items:center;gap:7px;padding:10px 14px;border-radius:9px 9px 0 0;cursor:pointer;user-select:none;transition:opacity .18s}
.t-hdr:hover{opacity:.9}
.t-ttl{color:#fff;font-size:14px;font-weight:800;flex:1}
.t-tools{align-items:center;gap:4px;flex-shrink:0;display:none}
.t-btn{background:rgba(255,255,255,.22);border:none;color:#fff;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.t-btn:hover{background:rgba(255,255,255,.4)}
.t-chev{color:rgba(255,255,255,.8);font-size:13px;transition:transform .2s;flex-shrink:0}
.t-chev.open{transform:rotate(180deg)}
.t-body{display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 9px 9px;overflow:hidden}
.t-body.open{display:block}
.qa-card{border-top:1px solid var(--border);background:#fff}
.qa-card:first-child{border-top:none}
.qa-card.drag-over{border-top:3px solid var(--accent)}
.qa-q{display:flex;align-items:flex-start;gap:8px;padding:11px 13px;cursor:pointer;transition:background .13s;user-select:none}
.qa-q:hover{background:var(--bg)}
.mv-btn{background:rgba(0,0,0,.06);color:var(--muted);border:none;cursor:pointer;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700;font-family:inherit;line-height:1}
.mv-btn:hover:not([disabled]){background:rgba(0,0,0,.14);color:var(--text)}
.q-icon{width:22px;height:22px;border-radius:6px;background:var(--city-color,#eee);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;margin-top:1px}
.q-txt{font-size:14px;font-weight:700;flex:1;line-height:1.5;word-break:break-word}
.qa-acts{display:none;gap:3px;flex-shrink:0;align-items:center}
.qa-pb,.eb,.db{border:none;cursor:pointer;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:inherit}
.qa-pb{background:#FFFBEB;color:#744210}.qa-pb:hover{background:#FEFCBF}
.eb{background:#EBF8FF;color:#2B6CB0}.eb:hover{background:#BEE3F8}
.db{background:#FFF5F5;color:#C53030}.db:hover{background:#FED7D7}
.q-chev{color:var(--muted);font-size:11px;flex-shrink:0;margin-top:3px;transition:transform .2s}
.q-chev.open{transform:rotate(180deg)}
.qa-a{display:none;padding:0 13px 13px 43px;background:var(--bg);border-top:1px solid var(--border)}
.qa-a.open{display:block}
.a-txt{font-size:14px;line-height:1.85;white-space:pre-wrap;padding-top:12px;word-break:break-word}
.hl-red{color:#C53030;font-weight:700}
.hl-orange{color:#C05621;font-weight:700}
.hl-blue{color:#2B6CB0;font-weight:700}
.hl-green{color:#276749;font-weight:700}
.hl-purple{color:#553C9A;font-weight:700}
.a-link{color:var(--city-color,#3182CE);text-decoration:underline;word-break:break-all}
.a-link:hover{opacity:.75}
.url-chip{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--border);border-radius:7px;padding:4px 10px;margin:7px 0 3px;font-size:12px;font-weight:600;text-decoration:none;color:var(--city-color,#3182CE);transition:border-color .18s;word-break:break-all}
.url-chip:hover{border-color:var(--city-color,#3182CE)}
.copy-btn{background:#F0FFF4;color:#276749;border:none;cursor:pointer;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;margin-top:7px;font-family:inherit}
.copy-btn:hover{background:#C6F6D5}
.img-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.img-wrap img{max-width:180px;border-radius:7px;cursor:pointer;border:2px solid var(--border)}
.img-wrap img:hover{border-color:var(--city-color,#333)}
.info-card{padding:10px 13px;font-size:14px;line-height:1.8;border-top:1px solid var(--border);background:#fff;white-space:pre-wrap;word-break:break-word}
.info-card:first-child{border-top:none}
.info-card:last-child{border-radius:0 0 9px 9px}
#srchPanel{padding:18px;display:none}
.hit{background:#fff;border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:box-shadow .18s}
.hit:hover{box-shadow:var(--sh)}
.hit-meta{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:11px;color:var(--muted)}
.hit-city{color:#fff;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.hit-q{font-size:14px;font-weight:700}
.hit-a{font-size:12px;color:var(--muted);margin-top:3px;max-height:48px;overflow:hidden;white-space:pre-wrap}
mark{background:#FEFCBF;border-radius:2px;padding:0 2px}
.no-res{text-align:center;color:var(--muted);padding:48px;font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:14px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:800;margin-bottom:16px}
.modal-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 11px;border:2px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:border-color .18s;resize:vertical}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--accent)}
.fg textarea{min-height:90px}
.upload-zone{border:2px dashed var(--border);border-radius:9px;padding:14px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;transition:border-color .18s}
.upload-zone:hover{border-color:var(--accent)}
.img-prev{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.img-prev img{width:64px;height:48px;object-fit:cover;border-radius:5px;border:2px solid var(--border);cursor:pointer}
.color-bar{display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap;padding:8px 10px;background:#F7FAFC;border-radius:8px;border:1px solid var(--border)}
.color-bar span{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.clr-btn{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.6);cursor:pointer;transition:transform .15s;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.clr-btn:hover{transform:scale(1.3)}
.clr-clear{background:#fff;border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--muted)}
.clr-clear:hover{border-color:var(--accent);color:var(--accent)}
.a-prev{margin-top:8px;padding:10px;background:#fff;border-radius:8px;font-size:13px;line-height:1.8;white-space:pre-wrap;border:1px solid var(--border);display:none}
.a-prev-lbl{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;display:block;text-transform:uppercase}
.admin-sec{margin-bottom:18px}
.admin-sec h4{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.mq-row2{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.mq-row2 select{width:85px;flex-shrink:0;padding:7px 8px;border:2px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;outline:none}
.mq-row2 input{flex:1;padding:7px 10px;border:2px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;outline:none}
.mq-del{background:#FFF5F5;color:#C53030;border:none;cursor:pointer;padding:7px 10px;border-radius:7px;font-weight:700;font-size:12px}
.exp-btns{display:flex;gap:7px;flex-wrap:wrap}
.login-box{background:#fff;border-radius:14px;padding:26px;width:280px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-box h3{font-size:16px;font-weight:800;margin-bottom:4px}
.login-box p{font-size:12px;color:var(--muted);margin-bottom:14px}
.login-box input{width:100%;padding:10px;border:2px solid var(--border);border-radius:9px;font-size:18px;text-align:center;letter-spacing:5px;outline:none;margin-bottom:7px;font-family:inherit}
.login-box input:focus{border-color:var(--accent)}
.l-err{color:#C53030;font-size:12px;margin-bottom:6px;display:none}
.l-btns{display:flex;gap:6px}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:90vh;border-radius:7px}
.lb-x{position:fixed;top:14px;right:20px;color:#fff;font-size:32px;cursor:pointer;line-height:1;font-weight:300}
.toast{position:fixed;bottom:20px;right:20px;background:#2D3748;color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;z-index:3000;transform:translateY(80px);opacity:0;transition:all .28s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:650px){.sidebar{display:none}.logo p,.sz-btns{display:none}.srch{max-width:150px}}
</style>
</head>

  <div class="modal" style="max-width:560px">

    <div class="admin-sec">

          <select id="admCity" style="width:100%;padding:8px 9px;border:2px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none"><option>&#x6843;&#x5712;</option><option>&#x5357;&#x6295;</option><option>&#x5609;&#x7FA9;</option><option>&#x5F70;&#x5316;</option></select></div>

          <input id="newTopicInp" type="text" placeholder="&#x8F38;&#x5165;&#x540D;&#x7A31;" style="width:100%;padding:8px 11px;border:2px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none"></div>

    <div class="admin-sec">

      <div style="background:#F0FFF4;border:1px solid #9AE6B4;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;line-height:1.7;color:#276749">

<script>
var COLORS={'цбГхЬТ':'#E8763A','хНЧцКХ':'#4CAF7D','хШЙч╛й':'#E8A03A','х╜░хМЦ':'#5B8FD4'};
var CITIES=['цбГхЬТ','хНЧцКХ','хШЙч╛й','х╜░хМЦ'];
var db,city,adminMode,pImgs,editCtx,mqData,pins,recents,fSize;
var dSrcSb=null;

function E(id){return document.getElementById(id);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderColored(s){
  if(!s)return'';
  return esc(s).replace(/\[\[(\w+):([^\]]*)\]\]/g,function(_,c,t){return '<span class="hl-'+c+'">'+t+'</span>';});
}
function stripColor(s){return(s||'').replace(/\[\[\w+:([^\]]*)\]\]/g,'$1');}
function linkify(s){return s.replace(/(https?:\/\/)([^\s<>"&]*)(&amp;[^\s<>"]*)?/g,function(_,a,b,c){var u=(a+b+(c||'')).replace(/&amp;/g,'&');return '<a class="a-link" href="'+u+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+(a+b+(c||''))+'</a>';});}
function hl(t,q){var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return t.replace(re,'<mark>$1</mark>');}
function toast(m){var t=E('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2500);}
function clone(o){return JSON.parse(JSON.stringify(o));}

function saveDB(){
  try{localStorage.setItem('qadb',JSON.stringify(db));}
  catch(e){toast('тЪа хД▓хнШхд▒цХЧ');}
}

function showLoading(msg){
  E('content').innerHTML='<div style="padding:48px;text-align:center;color:var(--muted);font-size:15px">'+msg+'</div>';
}

function init(){
  city='цбГхЬТ';adminMode=false;pImgs=[];editCtx=null;
  fSize=parseInt(localStorage.getItem('fs')||'14');
  document.body.style.fontSize=fSize+'px';
  try{mqData=JSON.parse(localStorage.getItem('mq')||'[]');}catch(e){mqData=[];}
  if(!mqData.length)mqData=[{scope:'all',text:'цнбш┐Оф╜┐чФи 1959 хЛХф┐ЭчЯешнШх║ля╝БцПРф╛ЫцбГхЬТуАБхНЧцКХуАБхШЙч╛йуАБх╜░хМЦхЫЫч╕гх╕ВхЛХчЙйф┐Эшн╖ш│ЗшиКцЯешйвуАВ'}];
  try{pins=JSON.parse(localStorage.getItem('pins')||'[]');}catch(e){pins=[];}
  try{recents=JSON.parse(localStorage.getItem('recs')||'[]');}catch(e){recents=[];}

  renderMQ();renderTabs();renderPins();renderRecs();
  showLoading('тП│ ш╝ЙхЕеш│ЗцЦЩф╕нтАж');

  // Always fetch data.json from server (no cache) so all devices see latest data
  fetch('data.json?t='+Date.now())
    .then(function(r){
      if(!r.ok) throw new Error('чДбц│Хш╝ЙхЕе data.json ('+r.status+')');
      return r.json();
    })
    .then(function(json){
      if(!json['цбГхЬТ']) throw new Error('data.json ца╝х╝Пф╕Нчмж');
      db = json;
      // Also save to localStorage as offline fallback
      saveDB();
      renderSB();renderContent();
    })
    .catch(function(err){
      // Fallback: try localStorage
      var s=localStorage.getItem('qadb');
      if(s){
        try{
          db=JSON.parse(s);
          renderSB();renderContent();
          toast('тЪа ф╜┐чФицЪлхнШш│ЗцЦЩя╝И'+err.message+'я╝Й');
          return;
        }catch(e2){}
      }
      E('content').innerHTML='<div style="padding:48px;text-align:center">'
        +'<div style="font-size:40px;margin-bottom:16px">тЪая╕П</div>'
        +'<div style="font-size:16px;font-weight:700;color:#C53030;margin-bottom:8px">чДбц│Хш╝ЙхЕеш│ЗцЦЩ</div>'
        +'<div style="font-size:13px;color:var(--muted)">'+esc(err.message)+'<br>шлЛчв║шкН data.json х╖▓ф╕КхВ│шЗ│ GitHub хРМф╕АчЫощМД</div>'
        +'</div>';
    });
}

function chgSz(d){fSize=Math.max(12,Math.min(20,fSize+d));localStorage.setItem('fs',fSize);document.body.style.fontSize=fSize+'px';}

function renderMQ(){
  var el=E('mqSec');var rows=mqData.filter(function(m){return m.text.trim();});
  if(!rows.length){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=rows.map(function(m){
    var lbl=m.scope==='all'?'ЁЯУв хЕичлЩ':('ЁЯУМ '+m.scope);
    var bg=m.scope==='all'?'#4A5568':COLORS[m.scope];
    return '<div class="mq-row"><span class="mq-lbl" style="background:'+bg+'">'+lbl+'</span><div class="mq-track"><div class="mq-txt">'+esc(m.text)+'</div></div></div>';
  }).join('');
}

function renderTabs(){
  E('cityTabs').innerHTML=CITIES.map(function(c){
    return '<button class="c-tab'+(c===city?' active':'')+'" onclick="switchCity(\''+c+'\')" style="'+(c===city?'color:'+COLORS[c]+';':'')+'">'
      +'<span class="c-dot" style="background:'+COLORS[c]+'"></span>'+c+'</button>';
  }).join('');
}
function switchCity(c){city=c;E('srchInput').value='';E('srchPanel').style.display='none';E('mainLayout').style.display='flex';renderTabs();renderSB();renderContent();}

function renderSB(){
  var sb=E('sidebar');var color=COLORS[city];
  sb.style.setProperty('--city-color',color);
  var topics=db[city].topics;
  var last=topics.length-1;
  var h='<div class="sb-head"><span>ф╕╗щбМхдзч╢▒</span><button class="sb-add" onclick="sbAdd()" style="display:'+(adminMode?'block':'none')+'">я╝Л</button></div>';
  topics.forEach(function(t,i){
    h+='<div class="sb-item" id="sbi'+i+'" onclick="sbClick('+i+')">'
      +(adminMode?'<span class="sb-mv-wrap">'
        +'<button class="sb-mv" onclick="event.stopPropagation();moveTopic('+i+',-1)" '+(i===0?'disabled':'')+' title="ф╕Кчз╗">тЦ▓</button>'
        +'<button class="sb-mv" onclick="event.stopPropagation();moveTopic('+i+',1)" '+(i===last?'disabled':'')+' title="ф╕Лчз╗">тЦ╝</button>'
        +'</span>':'')
      +'<span class="sb-lbl">'+esc(t.name)+'</span>'
      +'<span class="sb-cnt">'+t.items.length+'</span>'
      +'<span class="sb-acts" style="display:'+(adminMode?'flex':'none')+'">'
      +'<button class="sb-eb" onclick="event.stopPropagation();sbRename('+i+')">тЬП</button>'
      +'<button class="sb-db" onclick="event.stopPropagation();sbDel('+i+')">ЁЯЧС</button></span></div>';
  });
  sb.innerHTML=h;
  if(topics.length)E('sbi0').classList.add('act');
}
function sbClick(i){document.querySelectorAll('.sb-item').forEach(function(el,j){el.classList.toggle('act',j===i);});var el=E('topic'+i);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});var b=E('tbody'+i);if(b&&!b.classList.contains('open'))togTopic(i);}
function sbAdd(){var n=prompt('шлЛш╝╕хЕецЦ░ф╕╗щбМхРНчи▒я╝Ъ');if(!n||!n.trim())return;db[city].topics.push({name:n.trim(),items:[]});saveDB();renderSB();renderContent();toast('тЬЕ ф╕╗щбМх╖▓цЦ░хвЮ');}
function sbRename(i){var o=db[city].topics[i].name;var n=prompt('ф┐оцФ╣хРНчи▒я╝Ъ',o);if(!n||n===o)return;db[city].topics[i].name=n.trim();saveDB();renderSB();renderContent();toast('тЬЕ х╖▓цЫ┤цЦ░');}
function sbDel(i){if(!confirm('хИкщЩдуАМ'+db[city].topics[i].name+'уАНя╝Я'))return;db[city].topics.splice(i,1);saveDB();renderSB();renderContent();toast('ЁЯЧС х╖▓хИкщЩд');}
function moveTopic(i,dir){
  var arr=db[city].topics;var dest=i+dir;
  if(dest<0||dest>=arr.length)return;
  var tmp=arr[i];arr[i]=arr[dest];arr[dest]=tmp;
  saveDB();renderSB();renderContent();toast(dir<0?'тЦ▓ х╖▓ф╕Кчз╗':'тЦ╝ х╖▓ф╕Лчз╗');
}

function renderContent(){
  var color=COLORS[city];var topics=db[city].topics;
  var total=topics.reduce(function(s,t){return s+t.items.length;},0);
  var h='<div class="sec-hdr"><div class="sec-ttl" style="color:'+color+'">ЁЯУН '+city+' хЛХчЙйф┐Эшн╖</div>'
    +'<span class="badge" style="background:'+color+'">'+total+' чнЖш│ЗцЦЩ</span></div>';
  topics.forEach(function(topic,ti){
    h+='<div class="topic" id="topic'+ti+'" style="--city-color:'+color+'">'
      +'<div class="t-hdr" style="background:'+color+'" onclick="togTopic('+ti+')">'
      +'<span class="t-ttl">'+esc(topic.name)+'</span>'
      +'<div class="t-tools" style="display:'+(adminMode?'flex':'none')+'">'
      +'<button class="t-btn" onclick="event.stopPropagation();openAddQa('+ti+')">я╝Л цЦ░хвЮ</button>'
      +'<button class="t-btn" onclick="event.stopPropagation();sortT('+ti+',1)" title="AтЖТZ цОТх║П">AтЖСZ</button>'
      +'<button class="t-btn" onclick="event.stopPropagation();sortT('+ti+',-1)" title="ZтЖТA цОТх║П">ZтЖУA</button>'
      +'</div>'
      +'<span class="t-chev open" id="tchev'+ti+'">тЦ╛</span></div>'
      +'<div class="t-body open" id="tbody'+ti+'">';
    topic.items.forEach(function(item,ii){
      var hasDet=item.a||item.url||(item.imgs&&item.imgs.length);
      if(hasDet){
        var aH=item.a?linkify(renderColored(item.a)):'';
        var uH=item.url?'<a class="url-chip a-link" href="'+esc(item.url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">ЁЯФЧ '+esc(item.url)+'</a>':'';
        var iH=(item.imgs&&item.imgs.length)?'<div class="img-wrap">'+item.imgs.map(function(s,si){return '<img src="'+s+'" onclick="openLb('+ti+','+ii+','+si+')" alt="щЩДхЬЦ">';}).join('')+'</div>':'';
        var cB=item.a?'<button class="copy-btn" onclick="event.stopPropagation();cpTxt('+ti+','+ii+')">ЁЯУЛ шдЗшг╜хЫЮчнФ</button>':'';
        var maxIi=topic.items.length-1;
        var adm=adminMode?'<div class="qa-acts" style="display:flex">'
          +'<button class="mv-btn" onclick="event.stopPropagation();moveQa('+ti+','+ii+',-1)" '+(ii===0?'disabled style="opacity:.3"':'')+' title="ф╕Кчз╗">тЦ▓</button>'
          +'<button class="mv-btn" onclick="event.stopPropagation();moveQa('+ti+','+ii+',1)" '+(ii===maxIi?'disabled style="opacity:.3"':'')+' title="ф╕Лчз╗">тЦ╝</button>'
          +'<button class="qa-pb" onclick="event.stopPropagation();togPin('+ti+','+ii+')">ЁЯУМ</button>'
          +'<button class="eb" onclick="event.stopPropagation();openEdit('+ti+','+ii+')">тЬП</button>'
          +'<button class="db" onclick="event.stopPropagation();delQa('+ti+','+ii+')">ЁЯЧС</button></div>':'';
        h+='<div class="qa-card" id="qac'+ti+'_'+ii+'">'
          +'<div class="qa-q" onclick="togQA('+ti+','+ii+')">'
          +'<div class="q-icon">Q</div><div class="q-txt">'+linkify(renderColored(item.q))+'</div>'
          +adm+'<span class="q-chev" id="chev'+ti+'_'+ii+'">тЦ╛</span></div>'
          +'<div class="qa-a" id="qaa'+ti+'_'+ii+'">'+(aH?'<div class="a-txt">'+aH+'</div>':'')+cB+uH+iH+'</div></div>';
      }else{
        var adm2=adminMode?'<span style="float:right;display:inline-flex;gap:3px;margin-left:7px">'
          +'<button class="eb btn-sm" onclick="event.stopPropagation();openEdit('+ti+','+ii+')">тЬП</button>'
          +'<button class="db btn-sm" onclick="event.stopPropagation();delQa('+ti+','+ii+')">ЁЯЧС</button></span>':'';
        h+='<div class="info-card">'+adm2+linkify(renderColored(item.q))+'</div>';
      }
    });
    h+='</div></div>';
  });
  E('content').innerHTML=h;
}

function sortT(ti,dir){db[city].topics[ti].items.sort(function(a,b){return dir*(a.q||'').localeCompare(b.q||'','zh-TW');});saveDB();renderContent();toast(dir>0?'тЬЕ AтЖТZ цОТх║ПхоМцИР':'тЬЕ ZтЖТA цОТх║ПхоМцИР');}
function togTopic(i){E('tbody'+i).classList.toggle('open');E('tchev'+i).classList.toggle('open');}
function togQA(ti,ii){var a=E('qaa'+ti+'_'+ii);var c=E('chev'+ti+'_'+ii);a.classList.toggle('open');c.classList.toggle('open');if(a.classList.contains('open'))addRec(city,ti,ii,db[city].topics[ti].items[ii].q);}
function cpTxt(ti,ii){var t=stripColor(db[city].topics[ti].items[ii].a||'');if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){toast('ЁЯУЛ х╖▓шдЗшг╜');});}else{var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('ЁЯУЛ х╖▓шдЗшг╜');}}
function openLb(ti,ii,si){E('lbImg').src=db[city].topics[ti].items[ii].imgs[si];E('lb').classList.add('open');}
function closeLb(){E('lb').classList.remove('open');}

function moveQa(ti,ii,dir){
  var items=db[city].topics[ti].items;
  var dest=ii+dir;
  if(dest<0||dest>=items.length)return;
  var tmp=items[ii];items[ii]=items[dest];items[dest]=tmp;
  saveDB();
  // Re-render only this topic body for speed
  renderSB();renderContent();
  // Re-open the card that was moved
  setTimeout(function(){
    var el=E('topic'+ti);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },50);
  toast(dir<0?'тЦ▓ х╖▓ф╕Кчз╗':'тЦ╝ х╖▓ф╕Лчз╗');
}

// PIN & RECENT
function togPin(ti,ii){var k=city+'|'+ti+'|'+ii;var idx=pins.findIndex(function(p){return p.k===k;});var item=db[city].topics[ti].items[ii];if(idx>=0){pins.splice(idx,1);toast('ЁЯУМ хПЦц╢И');}else{pins.push({k:k,city:city,ti:ti,ii:ii,q:item.q.substring(0,28)});toast('ЁЯУМ х╖▓щЗШщБ╕');}localStorage.setItem('pins',JSON.stringify(pins));renderPins();}
function renderPins(){var bar=E('pinBar');if(!pins.length){bar.style.display='none';return;}bar.style.display='flex';E('pinChips').innerHTML=pins.map(function(p){return '<span class="pin-chip" onclick="gotoRes(\''+p.city+'\','+p.ti+','+p.ii+')">'+esc(p.q)+' <span onclick="event.stopPropagation();rmPin(\''+p.k+'\')" style="opacity:.5;font-size:10px">тЬХ</span></span>';}).join('');}
function rmPin(k){pins=pins.filter(function(p){return p.k!==k;});localStorage.setItem('pins',JSON.stringify(pins));renderPins();}
function addRec(c,ti,ii,q){var k=c+'|'+ti+'|'+ii;recents=recents.filter(function(r){return r.k!==k;});recents.unshift({k:k,city:c,ti:ti,ii:ii,q:q.substring(0,24)});if(recents.length>5)recents.pop();localStorage.setItem('recs',JSON.stringify(recents));renderRecs();}
function renderRecs(){var bar=E('recBar');if(!recents.length){bar.style.display='none';return;}bar.style.display='flex';E('recChips').innerHTML=recents.map(function(r){return '<span class="rec-chip" onclick="gotoRes(\''+r.city+'\','+r.ti+','+r.ii+')">'+esc(r.q)+'</span>';}).join('');}

function doSearch(q){
  q=q.trim();if(!q){E('srchPanel').style.display='none';E('mainLayout').style.display='flex';return;}
  E('mainLayout').style.display='none';E('srchPanel').style.display='block';
  var ql=q.toLowerCase();var hits=[];
  CITIES.forEach(function(c){db[c].topics.forEach(function(t,ti){t.items.forEach(function(item,ii){
    var qp=stripColor(item.q),ap=stripColor(item.a||'');
    if(qp.toLowerCase().indexOf(ql)>=0||ap.toLowerCase().indexOf(ql)>=0||(item.url&&item.url.toLowerCase().indexOf(ql)>=0))
      hits.push({c:c,t:t.name,ti:ti,ii:ii,item:item,qp:qp,ap:ap});
  });});});
  if(!hits.length){E('srchPanel').innerHTML='<div class="no-res">ЁЯФН цЬкцЙ╛хИ░уАМ'+esc(q)+'уАНчЪДчЫ╕щЧЬш│ЗцЦЩ</div>';return;}
  var h='<div class="sec-hdr"><div class="sec-ttl">цРЬх░ЛуАМ'+esc(q)+'уАНя╝И'+hits.length+' чнЖя╝Й</div></div>';
  hits.forEach(function(hit){var col=COLORS[hit.c];
    h+='<div class="hit" onclick="gotoRes(\''+hit.c+'\','+hit.ti+','+hit.ii+')">'
      +'<div class="hit-meta"><span class="hit-city" style="background:'+col+'">'+hit.c+'</span>тА║ '+esc(hit.t)+'</div>'
      +'<div class="hit-q">'+hl(esc(hit.qp),q)+'</div>'
      +(hit.ap?'<div class="hit-a">'+hl(esc(hit.ap.substring(0,130)),q)+(hit.ap.length>130?'тАж':'')+'</div>':'')
      +(hit.item.url?'<div style="font-size:11px;color:'+col+';margin-top:3px">ЁЯФЧ '+esc(hit.item.url)+'</div>':'')
      +'</div>';
  });
  E('srchPanel').innerHTML=h;
}
function gotoRes(c,ti,ii){E('srchInput').value='';E('srchPanel').style.display='none';E('mainLayout').style.display='flex';if(c!==city)switchCity(c);else{renderTabs();renderSB();renderContent();}setTimeout(function(){var el=E('topic'+ti);if(el)el.scrollIntoView({behavior:'smooth'});var b=E('tbody'+ti);if(b&&!b.classList.contains('open'))togTopic(ti);var a=E('qaa'+ti+'_'+ii);if(a&&!a.classList.contains('open'))togQA(ti,ii);},120);}

// ADMIN
function clickAdmin(){if(!adminMode){E('loginOv').classList.add('open');setTimeout(function(){E('loginPw').focus();},80);}else openAdmin();}
function closeLogin(){E('loginOv').classList.remove('open');E('loginPw').value='';E('loginErr').style.display='none';}
function doLogin(){if(E('loginPw').value==='1959'){adminMode=true;closeLogin();openAdmin();E('adminBtn').textContent='тЪЩ х╛МхП░(ч╖иш╝пф╕н)';E('adminBtn').style.cssText='background:#FFFBEB;border-color:#F6E05E;';renderSB();renderContent();toast('тЬЕ ч╖иш╝пцибх╝П');}else{E('loginErr').style.display='block';E('loginPw').value='';E('loginPw').focus();}}
function openAdmin(){renderMqEds();E('admCity').value=city;E('adminOv').classList.add('open');}
function closeAdmin(){E('adminOv').classList.remove('open');}
function saveAdmin(){mqData=[];document.querySelectorAll('.mq-row2').forEach(function(r){var s=r.querySelector('select').value;var t=r.querySelector('input').value.trim();if(t)mqData.push({scope:s,text:t});});localStorage.setItem('mq',JSON.stringify(mqData));renderMQ();closeAdmin();toast('тЬЕ х╖▓хД▓хнШ');}
function doLogout(){if(!confirm('чв║хоЪчЩ╗хЗ║я╝Я'))return;adminMode=false;closeAdmin();E('adminBtn').textContent='тЪЩ х╛МхП░';E('adminBtn').style.cssText='';renderSB();renderContent();toast('ЁЯСЛ х╖▓чЩ╗хЗ║');}
function renderMqEds(){var c=E('mqEds');c.innerHTML='';(mqData.length?mqData:[{scope:'all',text:''}]).forEach(function(m){addMqRow(m.scope,m.text);});}
function addMqEd(){if(document.querySelectorAll('.mq-row2').length>=3){toast('тЪа цЬАхдЪ3цвЭ');return;}addMqRow('all','');}
function addMqRow(sc,tx){var c=E('mqEds');if(c.children.length>=3)return;var d=document.createElement('div');d.className='mq-row2';var opts=CITIES.map(function(ci){return '<option value="'+ci+'"'+(sc===ci?' selected':'')+'>'+ci+'</option>';}).join('');d.innerHTML='<select><option value="all"'+(sc==='all'?' selected':'')+'>хЕичлЩ</option>'+opts+'</select><input type="text" placeholder="хЕмхСКцЦЗхнЧ" value="'+esc(tx||'')+'"><button class="mq-del" onclick="this.parentElement.remove()">тЬХ</button>';c.appendChild(d);}
function addTopic(){var c=E('admCity').value;var n=E('newTopicInp').value.trim();if(!n){toast('тЪа шлЛш╝╕хЕехРНчи▒');return;}db[c].topics.push({name:n,items:[]});saveDB();E('newTopicInp').value='';if(c===city){renderSB();renderContent();}toast('тЬЕ ф╕╗щбМх╖▓цЦ░хвЮ');}
function exportDB(){dlFile(JSON.stringify(db,null,2),'data.json','application/json');toast('тЬЕ data.json х╖▓ф╕Лш╝Йя╝МшлЛф╕КхВ│хИ░ GitHubя╝Б');}
function importDB(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var p=JSON.parse(e.target.result);if(!p['цбГхЬТ'])throw new Error('ца╝х╝Пф╕Нчмж');db=p;saveDB();renderSB();renderContent();toast('тЬЕ х╖▓хМпхЕея╝МшиШх╛Чф╕Лш╝Йф╕жф╕КхВ│ data.jsonя╝Б');}catch(er){toast('тЪа '+er.message);}};r.readAsText(f);inp.value='';}
function dlFile(ct,nm,tp){var b=new Blob([ct],{type:tp});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=nm;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}

// COLOR MARK
function applyClr(color){
  var ta=E('qaA');var s=ta.selectionStart,en=ta.selectionEnd;
  if(s===en){E('clrHint').style.display='inline';setTimeout(function(){E('clrHint').style.display='none';},2000);return;}
  var v=ta.value,sel=v.substring(s,en).replace(/\[\[\w+:([^\]]*)\]\]/g,'$1');
  var tagged='[['+color+':'+sel+']]';
  ta.value=v.substring(0,s)+tagged+v.substring(en);
  ta.selectionStart=s;ta.selectionEnd=s+tagged.length;
  updPrev();
}
function removeClr(){
  var ta=E('qaA');var s=ta.selectionStart,en=ta.selectionEnd;
  if(s===en){ta.value=ta.value.replace(/\[\[\w+:([^\]]*)\]\]/g,'$1');}
  else{var v=ta.value;ta.value=v.substring(0,s)+v.substring(s,en).replace(/\[\[\w+:([^\]]*)\]\]/g,'$1')+v.substring(en);}
  updPrev();
}
function updPrev(){
  var v=E('qaA').value;var pv=E('aPrev');var pc=E('aPrevContent');
  if(v.indexOf('[[')>=0){pv.style.display='block';pc.innerHTML=linkify(renderColored(v));}
  else{pv.style.display='none';}
}

// QA EDIT
function openAddQa(ti){editCtx=null;pImgs=[];E('qaTitle').textContent='тЮХ цЦ░хвЮ Q&A';E('qaCity').value=city;updQaTopic(ti);E('qaQ').value='';E('qaA').value='';E('qaUrl').value='';E('imgPrev').innerHTML='';E('aPrev').style.display='none';E('qaOv').classList.add('open');}
function openEdit(ti,ii){var item=db[city].topics[ti].items[ii];editCtx={city:city,ti:ti,ii:ii};pImgs=(item.imgs||[]).slice();E('qaTitle').textContent='тЬП ч╖иш╝п Q&A';E('qaCity').value=city;updQaTopic(ti);E('qaQ').value=item.q||'';E('qaA').value=item.a||'';E('qaUrl').value=item.url||'';renderImgPrev();updPrev();E('qaOv').classList.add('open');}
function updQaTopic(sel){var c=E('qaCity').value;E('qaTopic').innerHTML=db[c].topics.map(function(t,i){return '<option value="'+i+'"'+(i===sel?' selected':'')+'>'+esc(t.name)+'</option>';}).join('');}
function closeQa(){E('qaOv').classList.remove('open');editCtx=null;pImgs=[];E('aPrev').style.display='none';}
function saveQa(){var c=E('qaCity').value;var ti=parseInt(E('qaTopic').value);var q=E('qaQ').value.trim();var a=E('qaA').value.trim();var url=E('qaUrl').value.trim();if(!q){toast('тЪа шлЛш╝╕хЕехХПщбМ');return;}var item={q:q};if(a)item.a=a;if(url)item.url=url;if(pImgs.length)item.imgs=pImgs;if(editCtx&&editCtx.ii>=0)db[c].topics[ti].items[editCtx.ii]=item;else db[c].topics[ti].items.push(item);saveDB();closeQa();if(c===city){renderSB();renderContent();}toast('тЬЕ х╖▓хД▓хнШ');}
function delQa(ti,ii){if(!confirm('чв║хоЪхИкщЩдя╝Я'))return;db[city].topics[ti].items.splice(ii,1);saveDB();renderSB();renderContent();toast('ЁЯЧС х╖▓хИкщЩд');}
function handleImgs(inp){Array.from(inp.files).forEach(function(f){var r=new FileReader();r.onload=function(e){pImgs.push(e.target.result);renderImgPrev();};r.readAsDataURL(f);});inp.value='';}
function renderImgPrev(){E('imgPrev').innerHTML=pImgs.map(function(s){return '<img src="'+s+'" onclick="E(\'lbImg\').src=this.src;E(\'lb\').classList.add(\'open\')" alt="">';}).join('');}

document.addEventListener('click',function(e){if(e.target.classList.contains('a-link'))e.stopPropagation();});
E('qaA').addEventListener('input',updPrev);
init();
</script>
