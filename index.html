<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動物保護資訊查詢系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="header-inner">
    <div class="site-title">🐾 <span>動物保護</span>資訊查詢</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="搜尋問題、電話、關鍵字…（跨縣市）" autocomplete="off">
    </div>
    <a href="admin.html" class="btn-admin">⚙ 後台管理</a>
  </div>
</header>

<!-- Main -->
<div class="main-layout">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">縣市選擇</div>
    <div id="county-nav"></div>
    <div class="sidebar-footer">
      <a href="admin.html">⚙ 後台管理</a>
    </div>
  </nav>

  <!-- Content -->
  <main class="content-area">
    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>載入中…</span>
    </div>

    <!-- Search Results -->
    <div id="search-results-area">
      <div class="search-header">
        <div class="search-title" id="search-title">搜尋結果</div>
        <div class="search-badge" id="search-count"></div>
      </div>
      <div id="search-results-list"></div>
    </div>

    <!-- County View -->
    <div id="county-view">
      <!-- Marquee -->
      <div class="marquee-wrap" id="marquee-wrap" style="display:none">
        <span class="marquee-label">📢 公告</span>
        <div class="marquee-track">
          <div class="marquee-inner" id="marquee-inner">
            <span id="marquee-text-a"></span>
            <span id="marquee-text-b"></span>
          </div>
        </div>
      </div>

      <!-- County Header -->
      <div class="county-header" id="county-header" style="display:none">
        <div class="county-color-bar" id="county-color-bar"></div>
        <div class="county-name-h" id="county-name-h"></div>
        <div class="county-meta" id="county-meta"></div>
      </div>

      <!-- Topics -->
      <div class="topics-list" id="topics-list"></div>
    </div>
  </main>

</div>

<footer class="site-footer">
  動物保護資訊查詢系統 · 資料來源：各縣市動物保護機關
</footer>

<script>
(function() {
  let appData = null;
  let currentCountyId = null;

  /* ── Load data ── */
  async function loadData() {
    // 1. Try localStorage
    const saved = localStorage.getItem('animalData');
    if (saved) {
      try {
        appData = JSON.parse(saved);
        init();
        return;
      } catch(e) {}
    }
    // 2. Fetch data.json
    try {
      const r = await fetch('data.json');
      appData = await r.json();
      init();
    } catch(e) {
      document.getElementById('loading').innerHTML = '<span style="color:#c62828">⚠ 資料載入失敗，請確認 data.json 存在。</span>';
    }
  }

  /* ── Init ── */
  function init() {
    document.getElementById('loading').style.display = 'none';
    buildCountyNav();
    // Select first county
    if (appData.counties && appData.counties.length > 0) {
      selectCounty(appData.counties[0].id);
    }
    // Update title
    const title = appData.settings && appData.settings.site_title;
    if (title) document.title = title;
  }

  /* ── Build county nav ── */
  function buildCountyNav() {
    const nav = document.getElementById('county-nav');
    nav.innerHTML = '';
    (appData.counties || []).forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'county-btn';
      btn.dataset.id = c.id;
      btn.style.backgroundColor = c.color || '#888';
      btn.textContent = c.name;
      btn.addEventListener('click', () => selectCounty(c.id));
      nav.appendChild(btn);
    });
  }

  /* ── Select county ── */
  function selectCounty(id) {
    currentCountyId = id;
    // Clear search
    document.getElementById('search-input').value = '';
    hideSearch();

    // Update nav active
    document.querySelectorAll('.county-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.id === id);
    });

    const county = appData.counties.find(c => c.id === id);
    if (!county) return;

    // Marquee
    const mq = county.marquee || '';
    if (mq.trim()) {
      document.getElementById('marquee-text-a').textContent = mq;
      document.getElementById('marquee-text-b').textContent = mq;
      document.getElementById('marquee-wrap').style.display = 'flex';
    } else {
      document.getElementById('marquee-wrap').style.display = 'none';
    }

    // County header
    document.getElementById('county-color-bar').style.backgroundColor = county.color || '#888';
    document.getElementById('county-name-h').textContent = county.name;
    const totalItems = (county.topics || []).reduce((s, t) => s + (t.items || []).length, 0);
    document.getElementById('county-meta').textContent = (county.topics || []).length + ' 個主題 · ' + totalItems + ' 筆資料';
    document.getElementById('county-header').style.display = 'flex';

    // Topics
    renderTopics(county);
  }

  /* ── Render topics ── */
  function renderTopics(county) {
    const container = document.getElementById('topics-list');
    container.innerHTML = '';
    (county.topics || []).forEach(topic => {
      const section = document.createElement('div');
      section.className = 'topic-section';
      section.innerHTML = `
        <div class="topic-header" data-topic="${escHtml(topic.id)}">
          <div class="topic-dot" style="background:${escHtml(county.color || '#888')}"></div>
          <div class="topic-title">${escHtml(topic.title)}</div>
          <div class="topic-count">${(topic.items || []).length} 則</div>
          <div class="topic-chevron">▼</div>
        </div>
        <div class="topic-body" id="body-${escHtml(topic.id)}">
          ${renderItems(topic.items || [])}
        </div>
      `;
      container.appendChild(section);
    });

    // Topic header click
    container.querySelectorAll('.topic-header').forEach(hd => {
      hd.addEventListener('click', () => {
        const tid = hd.dataset.topic;
        const body = document.getElementById('body-' + tid);
        hd.classList.toggle('open');
        body.classList.toggle('open');
      });
    });

    // Item question click
    container.querySelectorAll('.item-question').forEach(q => {
      q.addEventListener('click', () => {
        const aid = q.dataset.answer;
        const ans = document.getElementById('ans-' + aid);
        q.classList.toggle('open');
        ans.classList.toggle('open');
      });
    });
  }

  /* ── Render items HTML ── */
  function renderItems(items, highlight) {
    return items.map((item, i) => {
      const q = highlight ? hlText(item.question, highlight) : escHtml(item.question);
      const a = highlight ? hlText(item.answer || '', highlight) : escHtml(item.answer || '');
      let meta = '';
      if (item.phone) meta += `<a class="meta-chip phone" href="tel:${encodeURI(item.phone)}">📞 ${escHtml(item.phone)}</a>`;
      if (item.link) meta += `<a class="meta-chip link" href="${escHtml(item.link)}" target="_blank" rel="noopener">🔗 連結</a>`;
      // Support images array (new) and image string (legacy)
      const imgs = Array.isArray(item.images) && item.images.length > 0
        ? item.images
        : (item.image ? [item.image] : []);
      imgs.forEach(src => { meta += `<img class="answer-image" src="${escHtml(src)}" alt="圖片">`; });
      return `
        <div class="item-row">
          <div class="item-question" data-answer="${escHtml(item.id || String(i))}">
            <div class="item-q-badge">Q</div>
            <div class="item-q-text">${q}</div>
            <div class="item-chevron">▼</div>
          </div>
          <div class="item-answer" id="ans-${escHtml(item.id || String(i))}">
            <div class="answer-text">${a}</div>
            ${meta ? `<div class="answer-meta">${meta}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  /* ── Search ── */
  let searchTimer;
  document.getElementById('search-input').addEventListener('input', function() {
    clearTimeout(searchTimer);
    const q = this.value.trim();
    searchTimer = setTimeout(() => {
      if (!q || !appData) {
        hideSearch();
      } else {
        doSearch(q);
      }
    }, 180);
  });

  function doSearch(query) {
    const kw = query.toLowerCase();
    const results = [];
    (appData.counties || []).forEach(county => {
      (county.topics || []).forEach(topic => {
        (topic.items || []).forEach(item => {
          const text = (item.question + ' ' + (item.answer || '') + ' ' + (item.phone || '')).toLowerCase();
          if (text.includes(kw)) {
            results.push({ county, topic, item });
          }
        });
      });
    });

    // Show search results
    document.getElementById('search-results-area').classList.add('active');
    document.getElementById('county-view').classList.add('hidden');
    document.getElementById('search-title').textContent = `「${query}」 搜尋結果`;
    document.getElementById('search-count').textContent = results.length + ' 筆';

    const list = document.getElementById('search-results-list');
    if (results.length === 0) {
      list.innerHTML = `<div class="no-results"><div class="big">🔍</div>找不到「${escHtml(query)}」的相關資料</div>`;
      return;
    }

    list.innerHTML = results.map(({ county, topic, item }) => {
      const q = hlText(item.question, query);
      const a = hlText((item.answer || '').substring(0, 200) + ((item.answer || '').length > 200 ? '…' : ''), query);
      let meta = '';
      if (item.phone) meta += `<a class="meta-chip phone" href="tel:${encodeURI(item.phone)}" style="margin-right:6px">📞 ${escHtml(item.phone)}</a>`;
      if (item.link) meta += `<a class="meta-chip link" href="${escHtml(item.link)}" target="_blank" rel="noopener">🔗 連結</a>`;
      return `
        <div class="search-result-card">
          <div class="src-meta">
            <span class="county-tag" style="background:${escHtml(county.color || '#888')}">${escHtml(county.name)}</span>
            <span class="topic-tag">› ${escHtml(topic.title)}</span>
          </div>
          <div class="src-q">${q}</div>
          <div class="src-a">${a}</div>
          ${meta ? `<div style="padding:0 14px 12px">${meta}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  function hideSearch() {
    document.getElementById('search-results-area').classList.remove('active');
    document.getElementById('county-view').classList.remove('hidden');
  }

  /* ── Helpers ── */
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function hlText(text, query) {
    if (!query || !text) return escHtml(text);
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const reSplit = new RegExp('(' + escaped + ')', 'gi');
    const reTest  = new RegExp('^' + escaped + '$', 'i');
    return text.split(reSplit).map(part =>
      reTest.test(part) ? `<mark class="hl">${escHtml(part)}</mark>` : escHtml(part)
    ).join('');
  }

  // Start
  loadData();
})();
</script>
</body>
</html>
