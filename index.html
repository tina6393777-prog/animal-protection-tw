<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1959 動保知識庫</title>
<style>
:root{--bg:#F5F7FA;--card:#fff;--text:#2D3748;--muted:#718096;--border:#E2E8F0;--accent:#4CAF7D;--sh:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
#mqSec{background:#2D3748;color:#fff;overflow:hidden}
.mq-row{display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);height:34px}
.mq-row:last-child{border-bottom:none}
.mq-lbl{flex-shrink:0;padding:0 12px;font-size:12px;font-weight:700;height:100%;display:flex;align-items:center;border-right:1px solid rgba(255,255,255,.15);white-space:nowrap}
.mq-track{overflow:hidden;flex:1;height:100%;display:flex;align-items:center}
.mq-txt{white-space:nowrap;display:inline-block;animation:scrollL 30s linear infinite;font-size:13px;padding-left:20px}
.mq-row:hover .mq-txt{animation-play-state:paused}
@keyframes scrollL{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
header{background:#fff;padding:10px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#4CAF7D,#3a9a68);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo h1{font-size:16px;font-weight:800}
.logo p{font-size:11px;color:var(--muted)}
.srch{display:flex;align-items:center;background:var(--bg);border:2px solid var(--border);border-radius:999px;padding:6px 14px;gap:6px;flex:1;max-width:380px;transition:border-color .2s}
.srch:focus-within{border-color:var(--accent)}
.srch input{border:none;background:none;outline:none;font-size:13px;width:100%;color:var(--text);font-family:inherit}
.srch input::placeholder{color:var(--muted)}
.hdr-r{display:flex;gap:5px;flex-shrink:0;align-items:center}
.sz-btns{display:flex;gap:2px}
.sz-btn{background:var(--bg);border:1px solid var(--border);padding:4px 8px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.sz-btn:hover{border-color:var(--accent);color:var(--accent)}
.btn{padding:6px 13px;border-radius:999px;border:none;cursor:pointer;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:4px;font-family:inherit;transition:all .18s}
.btn-out{background:var(--bg);color:var(--text);border:2px solid var(--border)}.btn-out:hover{border-color:var(--accent);color:var(--accent)}
.btn-grn{background:var(--accent);color:#fff}.btn-grn:hover{background:#3d9a68}
.btn-red{background:#FFF5F5;color:#C53030;border:none}.btn-red:hover{background:#FED7D7}
.btn-sm{padding:3px 9px;font-size:11px;border-radius:6px}
.nav-tabs{display:flex;gap:3px;padding:6px 18px;background:#F0F4F8;border-bottom:1px solid var(--border)}
.ntab{padding:5px 14px;border-radius:7px;border:none;background:none;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .18s}
.ntab:hover{background:#fff;color:var(--text)}
.ntab.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}
#pinBar{background:#FFFBEB;border-bottom:1px solid #F6E05E;padding:7px 18px;display:none;flex-wrap:wrap;gap:6px;align-items:center}
.pin-lbl{font-size:11px;font-weight:700;color:#744210;flex-shrink:0}
.pin-chip{background:#fff;border:1px solid #F6E05E;border-radius:999px;padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;color:#744210;display:inline-flex;align-items:center;gap:4px}
.pin-chip:hover{background:#FEFCBF}
#recBar{background:#EBF8FF;border-bottom:1px solid #BEE3F8;padding:7px 18px;display:none;flex-wrap:wrap;gap:6px;align-items:center}
.rec-lbl{font-size:11px;font-weight:700;color:#2B6CB0;flex-shrink:0}
.rec-chip{background:#fff;border:1px solid #BEE3F8;border-radius:999px;padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;color:#2B6CB0}
.rec-chip:hover{background:#BEE3F8}
.city-tabs{display:flex;gap:4px;padding:10px 18px 0;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto}
.c-tab{padding:8px 18px;border-radius:10px 10px 0 0;border:none;background:var(--bg);color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;position:relative;bottom:-2px;font-family:inherit;transition:all .18s}
.c-tab:hover{background:#edf2f7;color:var(--text)}
.c-tab.active{background:#fff;border:2px solid var(--border);border-bottom:2px solid #fff}
.c-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.layout{display:flex;min-height:calc(100vh - 115px)}
.sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);padding:12px 0;position:sticky;top:102px;height:calc(100vh - 102px);overflow-y:auto}
.sb-head{padding:0 10px 7px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.sb-add{background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted);display:none}
.sb-add:hover{color:var(--accent)}
.sb-item{display:flex;align-items:center;border-left:3px solid transparent;background:none;width:100%;cursor:pointer;transition:all .13s}
.sb-item.act{border-left-color:var(--city-color,#333);background:var(--bg)}
.sb-item:hover{background:var(--bg)}
.sb-lbl{flex:1;padding:8px 9px;font-size:13px;font-weight:600;color:var(--muted);text-align:left;line-height:1.3}
.sb-item.act .sb-lbl{color:var(--city-color,#333)}
.sb-cnt{margin-right:6px;font-size:10px;font-weight:700;padding:1px 5px;border-radius:999px;background:#E2E8F0;color:var(--muted);flex-shrink:0}
.sb-item.act .sb-cnt{background:var(--city-color,#eee);color:#fff}
.sb-acts{display:none;gap:2px;margin-right:4px}
.sb-eb,.sb-db{background:none;border:none;cursor:pointer;font-size:11px;padding:2px 4px;border-radius:3px}
.sb-eb:hover{background:#EBF8FF}.sb-db:hover{background:#FFF5F5}
.content{flex:1;padding:18px;min-width:0}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:7px}
.sec-ttl{font-size:18px;font-weight:800}
.badge{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;color:#fff}
.topic{margin-bottom:18px}
.t-hdr{display:flex;align-items:center;gap:7px;padding:10px 14px;border-radius:9px 9px 0 0;cursor:pointer;user-select:none;transition:opacity .18s}
.t-hdr:hover{opacity:.9}
.t-ttl{color:#fff;font-size:14px;font-weight:800;flex:1}
.t-addqa{background:rgba(255,255,255,.22);border:none;color:#fff;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;display:none;font-family:inherit}
.t-addqa:hover{background:rgba(255,255,255,.38)}
.t-chev{color:rgba(255,255,255,.8);font-size:13px;transition:transform .2s}
.t-chev.open{transform:rotate(180deg)}
.t-body{display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 9px 9px;overflow:hidden}
.t-body.open{display:block}
.qa-card{border-top:1px solid var(--border);background:#fff}
.qa-card:first-child{border-top:none}
.qa-q{display:flex;align-items:flex-start;gap:8px;padding:11px 13px;cursor:pointer;transition:background .13s;user-select:none}
.qa-q:hover{background:var(--bg)}
.q-icon{width:22px;height:22px;border-radius:6px;background:var(--city-color,#eee);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;margin-top:1px}
.q-txt{font-size:14px;font-weight:700;flex:1;line-height:1.5;word-break:break-word}
.qa-acts{display:none;gap:3px;flex-shrink:0;align-items:center}
.qa-pb{background:#FFFBEB;color:#744210;border:none;cursor:pointer;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:inherit}
.eb{background:#EBF8FF;color:#2B6CB0;border:none;cursor:pointer;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:inherit}
.db{background:#FFF5F5;color:#C53030;border:none;cursor:pointer;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:inherit}
.eb:hover{background:#BEE3F8}.db:hover{background:#FED7D7}
.q-chev{color:var(--muted);font-size:11px;flex-shrink:0;margin-top:3px;transition:transform .2s}
.q-chev.open{transform:rotate(180deg)}
.qa-a{display:none;padding:0 13px 13px 43px;background:var(--bg);border-top:1px solid var(--border)}
.qa-a.open{display:block}
.a-txt{font-size:14px;line-height:1.85;white-space:pre-wrap;padding-top:12px;word-break:break-word}
.a-link{color:var(--city-color,#3182CE);text-decoration:underline;word-break:break-all}
.a-link:hover{opacity:.75}
.url-chip{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--border);border-radius:7px;padding:4px 10px;margin:7px 0 3px;font-size:12px;font-weight:600;text-decoration:none;color:var(--city-color,#3182CE);transition:border-color .18s;word-break:break-all}
.url-chip:hover{border-color:var(--city-color,#3182CE)}
.copy-btn{background:#F0FFF4;color:#276749;border:none;cursor:pointer;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;margin-top:7px;font-family:inherit}
.copy-btn:hover{background:#C6F6D5}
.img-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.img-wrap img{max-width:180px;border-radius:7px;cursor:pointer;border:2px solid var(--border)}
.img-wrap img:hover{border-color:var(--city-color,#333)}
.info-card{padding:10px 13px;font-size:14px;line-height:1.8;border-top:1px solid var(--border);background:#fff;white-space:pre-wrap;word-break:break-word}
.info-card:first-child{border-top:none}
.info-card:last-child{border-radius:0 0 9px 9px}
#srchPanel{padding:18px;display:none}
.hit{background:#fff;border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:box-shadow .18s}
.hit:hover{box-shadow:var(--sh)}
.hit-meta{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:11px;color:var(--muted)}
.hit-city{color:#fff;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.hit-q{font-size:14px;font-weight:700}
.hit-a{font-size:12px;color:var(--muted);margin-top:3px;max-height:48px;overflow:hidden;white-space:pre-wrap}
mark{background:#FEFCBF;border-radius:2px;padding:0 2px}
.no-res{text-align:center;color:var(--muted);padding:48px;font-size:14px}
#casePanel{padding:18px;display:none}
.c-form{background:#fff;border:1px solid var(--border);border-radius:11px;padding:16px;margin-bottom:18px}
.c-form h3{font-size:14px;font-weight:800;margin-bottom:12px}
.c-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.c-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:9px}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 11px;border:2px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:border-color .18s;resize:vertical}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--accent)}
.fg textarea{min-height:72px}
.c-tbl-wrap{background:#fff;border:1px solid var(--border);border-radius:11px;overflow:hidden;overflow-x:auto}
.c-tbl{width:100%;border-collapse:collapse;font-size:12px}
.c-tbl th{background:#F7FAFC;padding:9px 11px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);white-space:nowrap}
.c-tbl td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.45}
.c-tbl tr:last-child td{border-bottom:none}
.c-tbl tr:hover td{background:#F7FAFC}
.s-open{background:#FFF5F5;color:#C53030;border:none;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.s-pend{background:#FFFBEB;color:#744210;border:none;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.s-done{background:#F0FFF4;color:#276749;border:none;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.c-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 4px;border-radius:3px}
.c-del:hover{background:#FFF5F5;color:#C53030}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:14px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:800;margin-bottom:16px}
.modal-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.upload-zone{border:2px dashed var(--border);border-radius:9px;padding:14px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;transition:border-color .18s}
.upload-zone:hover{border-color:var(--accent)}
.img-prev{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.img-prev img{width:64px;height:48px;object-fit:cover;border-radius:5px;border:2px solid var(--border);cursor:pointer}
.admin-sec{margin-bottom:18px}
.admin-sec h4{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.mq-row2{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.mq-row2 select{width:85px;flex-shrink:0;padding:7px 8px;border:2px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;outline:none}
.mq-row2 input{flex:1;padding:7px 10px;border:2px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;outline:none}
.mq-del{background:#FFF5F5;color:#C53030;border:none;cursor:pointer;padding:7px 10px;border-radius:7px;font-weight:700;font-size:12px}
.exp-btns{display:flex;gap:7px;flex-wrap:wrap}
.login-box{background:#fff;border-radius:14px;padding:26px;width:280px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-box h3{font-size:16px;font-weight:800;margin-bottom:4px}
.login-box p{font-size:12px;color:var(--muted);margin-bottom:14px}
.login-box input{width:100%;padding:10px;border:2px solid var(--border);border-radius:9px;font-size:18px;text-align:center;letter-spacing:5px;outline:none;margin-bottom:7px;font-family:inherit}
.login-box input:focus{border-color:var(--accent)}
.l-err{color:#C53030;font-size:12px;margin-bottom:6px;display:none}
.l-btns{display:flex;gap:6px}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:90vh;border-radius:7px}
.lb-x{position:fixed;top:14px;right:20px;color:#fff;font-size:32px;cursor:pointer;line-height:1;font-weight:300}
.toast{position:fixed;bottom:20px;right:20px;background:#2D3748;color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;z-index:3000;transform:translateY(80px);opacity:0;transition:all .28s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:650px){.sidebar{display:none}.logo p,.sz-btns{display:none}.srch{max-width:150px}.c-grid,.c-grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="mqSec"></div>
<header>
  <div class="logo">
    <div class="logo-icon">&#x1F43E;</div>
    <div><h1>1959 &#x52D5;&#x4FDD;&#x77E5;&#x8B58;&#x5EAB;</h1><p>&#x52D5;&#x7269;&#x4FDD;&#x8B77;&#x5C08;&#x7DDA;&#x5167;&#x90E8;&#x67E5;&#x8A62;&#x7CFB;&#x7D71;</p></div>
  </div>
  <div class="srch">
    <span style="color:var(--muted)">&#x1F50D;</span>
    <input id="srchInput" type="text" placeholder="&#x8DE8;&#x7E23;&#x5E02;&#x95DC;&#x9375;&#x5B57;&#x641C;&#x5C0B;&#x2026;" oninput="doSearch(this.value)" autocomplete="off">
  </div>
  <div class="hdr-r">
    <div class="sz-btns">
      <button class="sz-btn" onclick="chgSz(-1)">A-</button>
      <button class="sz-btn" onclick="chgSz(1)">A+</button>
    </div>
    <button class="btn btn-out" id="adminBtn" onclick="clickAdmin()">&#x2699; &#x5F8C;&#x53F0;</button>
  </div>
</header>
<div class="nav-tabs">
  <button class="ntab active" id="nKB" onclick="showView('kb')">&#x1F4DA; &#x77E5;&#x8B58;&#x5EAB;</button>
  <button class="ntab" id="nCase" onclick="showView('case')">&#x1F4CB; &#x6848;&#x4EF6;&#x8A18;&#x9304;</button>
</div>
<div id="pinBar"><span class="pin-lbl">&#x1F4CC; &#x66F8;&#x7C3D;</span><span id="pinChips"></span></div>
<div id="recBar"><span class="rec-lbl">&#x1F550; &#x6700;&#x8FD1;&#x67E5;&#x770B;</span><span id="recChips"></span></div>
<div class="city-tabs" id="cityTabs"></div>
<div class="layout" id="mainLayout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>
<div id="srchPanel"></div>
<div id="casePanel"></div>

<div class="overlay" id="loginOv">
  <div class="login-box">
    <h3>&#x1F510; &#x5F8C;&#x53F0;&#x767B;&#x5165;</h3><p>&#x8ACB;&#x8F38;&#x5165;&#x7BA1;&#x7406;&#x5BC6;&#x78BC;</p>
    <input type="password" id="loginPw" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="l-err" id="loginErr">&#x5BC6;&#x78BC;&#x932F;&#x8AA4;&#xFF0C;&#x8ACB;&#x91CD;&#x8A66;</div>
    <div class="l-btns">
      <button class="btn btn-out" style="flex:1" onclick="closeLogin()">&#x53D6;&#x6D88;</button>
      <button class="btn btn-grn" style="flex:1" onclick="doLogin()">&#x767B;&#x5165;</button>
    </div>
  </div>
</div>

<div class="overlay" id="adminOv">
  <div class="modal" style="max-width:560px">
    <h3>&#x2699; &#x5F8C;&#x53F0;&#x8A2D;&#x5B9A;</h3>
    <div class="admin-sec">
      <h4>&#x1F50A; &#x8DE8;&#x99AC;&#x71C8;&#xFF08;&#x6700;&#x591A;3&#x689D;&#xFF09;</h4>
      <div id="mqEds"></div>
      <button class="btn btn-out btn-sm" style="margin-top:5px" onclick="addMqEd()">+ &#x65B0;&#x589E;&#x8DE8;&#x99AC;&#x71C8;</button>
    </div>
    <div class="admin-sec">
      <h4>&#x1F4C2; &#x5FEB;&#x901F;&#x65B0;&#x589E;&#x4E3B;&#x984C;</h4>
      <div style="display:flex;gap:7px;align-items:flex-end">
        <div class="fg" style="flex:0 0 90px"><label>&#x7E23;&#x5E02;</label>
          <select id="admCity"><option>&#x6843;&#x5712;</option><option>&#x5357;&#x6295;</option><option>&#x5609;&#x7FA9;</option><option>&#x5F70;&#x5316;</option></select></div>
        <div class="fg" style="flex:1"><label>&#x4E3B;&#x984C;&#x540D;&#x7A31;</label>
          <input id="newTopicInp" type="text" placeholder="&#x8F38;&#x5165;&#x540D;&#x7A31;"></div>
        <button class="btn btn-grn" style="height:37px;flex-shrink:0" onclick="addTopic()">&#x65B0;&#x589E;</button>
      </div>
    </div>
    <div class="admin-sec">
      <h4>&#x1F4BE; &#x8CC7;&#x6599;&#x5099;&#x4EFD;</h4>
      <div class="exp-btns">
        <button class="btn btn-out btn-sm" onclick="exportDB()">&#x2B07; &#x532F;&#x51FA;&#x5099;&#x4EFD; JSON</button>
        <label class="btn btn-out btn-sm" style="cursor:pointer">&#x2B06; &#x532F;&#x5165;&#x9084;&#x539F; JSON
          <input type="file" accept=".json" style="display:none" onchange="importDB(this)"></label>
      </div>
    </div>
    <div class="modal-btns">

76\u9f0e\u8d85\u5a92\u9ad4\u6709\u9650\u516c\u53f8\u9032\u884c\u5354\u52a9\n\n\u3010\u5099\u8a3b\u3011\n\u6d3e\u52e4\u8acb\u5b8c\u6574\u63d0\u4f9b\u4eba\u3001\u4e8b\u3001\u6642\u3001\u5730\u3001\u7269\uff0c(\u7bc4\u672c\u53c3\u8003\u5982\u4e0b)\uff1a\n\u25c6\u4f76\u9f0e\u8d85\u5a92\u9ad4\u6709\u9650\u516c\u53f8\u8a71\u52d9\u7a97\u53e3:0972588688\n\u25c6\u5099\u63f4\u96fb\u8a71:0937802020(\u8ca0\u8cac\u4eba\u8cf4\u5f65\u6587\u5148\u751f)\n\u5099\u7528\uff082\uff090966652765\n\n\u8acb\u7559\u610f\u3010\u8cf4\u5f65\u6587\u3011\u6642\u6bb5\uff0c\u80fd\u529b\u53ca\u5de5\u5177\u8cc7\u6e90\u50c5\u80fd\u6551\u63f4\u72ac\u8c93\uff0c\u8acb\u4f9d\u6551\u63f4\u539f\u5247\u63d0\u4f9b\u5c0d\u61c9\u53ef\u5354\u52a9\u55ae\u4f4d\n\u59d4\u5916\u6025\u96e3\u6551\u52a9\u5ee0\u5546\u50c5\u80fd\u5354\u52a9\u8c93\u72d7\u6551\u63f4\n\u82e5\u6c11\u773e\u4f86\u96fb\u53cd\u61c9\u6709\u52d5\u7269\u9700\u6025\u96e3\u6551\u52a9\u4f46\u975e\u8c93\u72d7\u4e14\u8a72\u6642\u6bb5\u70ba\u59d4\u5916\u6025\u96e3\u6551\u52a9\u5ee0\u5546\u8655\u7406\uff0c\u8acb\u59d4\u5a49\u8aaa\u660e:\n\u300c\u73fe\u6642\u6bb5\u7531\u59d4\u5916\u6025\u96e3\u6551\u52a9\u5ee0\u5546\u5354\u52a9\u4f46\u4ed6\u5011\u80fd\u529b\u6709\u9650\u50c5\u80fd\u6551\u52a9\u8c93\u72d7\uff0c\u76ee\u524d\u5982\u6709\u975e\u8c93\u72d7\u7684\u52d5\u7269\u9700\u6551\u63f4\uff0c\u8981\u9ebb\u7169\u60a8\u6539\u6d3d1999\u7531\u4ed6\u5011\u901a\u77e5\u6d3e\u6848\u7d66\u5c0d\u61c9\u55ae\u4f4d\u5354\u52a9\u3002\u300d\n\u25c6\u82e5\u6c11\u773e\u7dda\u4e0a\u4e0d\u63a5\u53d7\u6301\u7e8c\u8981\u6c421959\u63a5\u6848\n\u2192\u8acb\u7d00\u9304\u52d5\u7269\u72c0\u614b\u5f8c\u76f4\u63a5\u901a\u5831\u7fa4\u7d44(\u9700\u65bc\u5099\u8a3b\u8aaa\u660e\u6709\u8acb\u6c11\u773e\u6539\u6d3d1999\u4f46\u6c11\u773e\u6301\u7e8c\u4e0d\u9858\u8981\u6c42\u8655\u7406)\uff0c\u4e0d\u6253\u7d66\u59d4\u5916\u6025\u96e3\u6551\u52a9\u5ee0\u5546\u3002\n\u6ce8\u610f\u4e8b\u9805:\n\u25c7\u8aaa\u660e\u4e0a\u8acb\u7559\u610f\uff0c\u4e0d\u662f\u300c\u7d93\u8cbb\u4e0d\u8db3\u300d\u800c\u662f\u300c\u6551\u63f4\u80fd\u529b\u6709\u9650\u300d\u3002(\u4e0d\u662f\u9322\u7684\u554f\u984c\uff0c\u662f\u6551\u63f4\u4eba\u54e1\u80fd\u529b\u50c5\u80fd\u8655\u7406\u8c93\u72ac)\n\u25c7 \u86c7\u3001\u8702\u3001\u4fdd\u80b2\u985e\u52d5\u7269\u3001\u91ce\u751f\u52d5\u7269\u672c\u8eab\u5c31\u662f1999\u8655\u7406\u3002"},{"q":"\u86c7\u3001\u8702\u3001\u4fdd\u80b2\u985e\u52d5\u7269\u3001\u91ce\u751f\u52d5\u7269\u3001\u71d5\u5b50","a":"\u8fb2\u696d\u5c40\u6797\u52d9\u79d1\u6b0a\u8cac\uff1b\u53ef\u8acb\u6c11\u773e\u64a5\u62531999\u5354\u52a9\uff0c\u6703\u6d3e\u7d66\u6797\u52d9\u79d1\u3002\n\u25c6\u9d3f\u5b50\u53ca\u767d\u5634\u516b\u54e5\u2192\u6843\u5712\u52d5\u4fdd\u8655\u63a5\u6848\uff0c\u4e0d\u662f1999\u3002\n(\u767d\u5634\u516b\u54e5(\u53f0\u7063\u51a0\u516b\u54e5)\u5c6c\u65bc\u4e8c\u7d1a\u4fdd\u80b2\u985e\u52d5\u7269\u9084\u662f\u6b78\u6843\u5712\u52d5\u4fdd\u8655\u63a5\u6848\uff0c\u8acb\u52ff\u6d3e\u5916\u52e4\uff0c\u8acb\u6c11\u773e\u5b89\u7f6e\u5f85\u4e0a\u73ed\u518d\u806f\u7e6b\u52d5\u4fdd\u8655\u3002)\n\n\u3010\u5099\u8a3b\u3011\n\u86c7\u3001\u8702\u3001\u4fdd\u80b2\u985e\u52d5\u7269\u3001\u91ce\u751f\u52d5\u7269\u4ee5\u5916\u4e4b\u52d5\u7269\u7686\u70ba\u672c\u8655\u6b0a\u8cac\u3002"},{"q":"\u4e0d\u5728\u670d\u52d9\u7bc4\u570d\u7684\u52d5\u7269\u3000\u8c93\u72ac\u4ee5\u5916\u3001 \u86c7\u3001\u8702\u3001\u4fdd\u80b2\u985e\u52d5\u7269\u3001\u91ce\u751f\u52d5\u7269"}]},{"name":"\u5e38\u898b\u554f\u984c","items":[{"q":"\u5e38\u898b\u554f\u984c\u3000\u52d5\u4fdd\u55ae\u4f4d\u767d\u5929\u8655\u7406\u65b9\u5f0f(\u5ba2\u670d\u53c3\u8003\u7528)"},{"q":"\u6c11\u773e\u767c\u73fe\u4e0d\u540c\u7a2e\u985e\u4e4b\u53d7\u50b7\u52d5\u7269\uff08\u5982\u72d7\u3001\u8c93\uff09\uff0c\u61c9\u5206\u5225\u5411\u54ea\u4e00\u55ae\u4f4d\u901a\u5831\u6536\u5bb9\u8655\u7406?","a":"\u5982\u679c\u8857\u982d\u767c\u73fe\u6d41\u6d6a\u72ac\u8c93\u53d7\u50b7\u6642\uff0c\u65bc\u672c\u8655\u4e0a\u73ed\u6642\u9593\u53ef\u901a\u5831\u672c\u8655\uff08\u96fb\u8a71\uff1a03-3250126#500\uff09\u6216\u5e02\u6c11\u5c08\u7dda1999\uff0c\u4e0b\u73ed\u6642\u9593\u5247\u76f4\u64a5\u5e02\u6c11\u5c08\u7dda1999\u901a\u5831\uff0c\u672c\u8655\u5c07\u76e1\u5feb\u6d3e\u54e1\u524d\u5f80\u6551\u63f4\uff0c\u4e26\u70ba\u8a72\u52d5\u7269\u6aa2\u50b7\u5206\u985e\uff0c\u8a55\u4f30\u662f\u5426\u5f8c\u9001\u5408\u7d04\u52d5\u7269\u91ab\u9662\u4f4f\u9662\u91ab\u7642\u3002\n\n\u3010\u5099\u8a3b\u3011\n\u52d5\u7269\u6025\u96e3\u6551\u52a9\u9867\u540d\u601d\u7fa9\u4ee5\u6551\u63f4\u53d7\u50b7\u904a\u8569\u72ac\u8c93\u70ba\u4e3b\uff0c\u9700\u7531\u4eba\u54e1\u524d\u5f80\u4e86\u89e3\uff0c\u4e26\u8655\u7406\u5f8c\u7e8c\uff0c\u5fc5\u8981\u6642\u9001\u5f80\u5408\u7d04\u9662\u6240\u3002(\u62fe\u7372\u6709\u4e3b\u72ac\u8c93\u5728\u5916\u6d41\u6d6a\u906d\u5916\u610f\u5916\u901a\u5831\u4ea6\u53ef\u5354\u52a9\u2192\u6709\u6676\u7247\u53ef\u6383\u3001\u5bb6\u72ac\u8c93\u9700\u81ea\u8cbb\u8655\u7406)\n\u4e0d\u80fd\u662f\u6c11\u773e\u81ea\u884c\u9001\u5f80\u91ab\u9662\u2192\u7121\u6cd5\u5224\u5225\u662f\u5426\u70ba\u6d41\u6d6a\u72ac\u8c93\uff0c\u9700\u81ea\u8cbb\u6cbb\u7642\u3002\n\u5982\u70ba\u6d41\u6d6a\u52d5\u7269\u53d7\u50b7\u901a\u5831\uff0c\u52ff\u8acb\u6c11\u773e\u81ea\u884c\u9001\u5f80\u91ab\u9662\uff0c\u8981\u901a\u5831\u6551\u63f4\u3002"},{"q":"\u4e0a\u73ed\u6642\u9593\u5982\u679c\u65bc\u8857\u982d\u767c\u73fe\u52d5\u7269\u53d7\u50b7\u600e\u9ebc\u8fa6\uff1f\u52d5\u7269\u5f8c\u7e8c\u8655\u7f6e\u70ba\u4f55\uff1f","a":"\"\u4e00.\t\u767c\u73fe\u6d41\u6d6a\u52d5\u7269(\u4e00\u822c\u6307\u72ac\u8c93)\u53d7\u50b7\u6642\uff0c\u53ef\u901a\u5831\u672c\u8655\uff08\u96fb\u8a71\uff1a03-3250126\u5206\u6a5f500~510\uff09\u6216\u5e02\u6c11\u5c08\u7dda1999\uff0c\u672c\u8655\u5c07\u76e1\u5feb\u6d3e\u54e1\u524d\u5f80\u6551\u63f4\uff0c\u4e26\u70ba\u8a72\u52d5\u7269\u6aa2\u50b7\u5206\u985e\uff0c\u8a55\u4f30\u662f\u5426\u5f8c\u9001\u5408\u7d04\u52d5\u7269\u91ab\u9662\u4f4f\u9662\u91ab\u7642\u3002\u52d9\u5fc5\u63d0\u4f9b\u901a\u5831\u4eba\u7684\u59d3\u540d\u3001\u806f\u7d61\u96fb\u8a71\u3001\u53d7\u50b7\u52d5\u7269\u6240\u5728\u5730\u8a73\u7d30\u5730\u5740\u3001\u52d5\u7269\u5225\uff08\u72d7/\u8c93\uff09\u3001\u52d5\u7269\u9ad4\u578b(\u5927/\u4e2d/\u5c0f)\u3001\u6bdb\u8272\u6216\u7279\u5fb5\u3001\u52d5\u7269\u53d7\u50b7\u72c0\u6cc1\uff08\u5c1a\u53ef\u884c\u8d70/\u7121\u6cd5\u884c\u8d70\uff09\u7b49\u8cc7\u6599\uff0c\u4e26\u8fa6\u7406\u516c\u544a\u3002\u4e8c\u3001\u5982\u7121\u4e3b\u72ac\u8c93\u7121\u4eba\u8a8d\u9818\uff0c\u4e14\u9ad4\u6cc1\u6062\u5fa9\u826f\u597d\uff0c\u4e14\u9054\u5df2\u53ef\u7d55\u80b2\u4e4b\u5e74\u9f61\uff0c\u4eff\u7167\u570b\u5916\u53ca\u5176\u4ed6\u7e23\u5e02\u4f5c\u6cd5\uff0c\u7531\u672c\u8655\u5354\u52a9TNVR(\u8a98\u6355\u3001\u7d55\u80b2\u3001\u72c2\u72ac\u75c5\u75ab\u82d7\u6ce8 \u5c04\u3001\u56de\u653e) \uff0c\u4ee5\u671f\u63a7\u5236\u904a\u8569\u72ac\u8c93\u65cf\u7fa4\u6578\u91cf\u3002\u5176\u4ed6\u5247\u63a5\u56de\u672c\u5e02\u52d5\u7269\u4fdd\u8b77\u6559\u80b2\u5712\u5340\u5b89\u7f6e\uff0c\u5982\u516c\u544a7\u65e5\u7121\u4eba\u8a8d\u9818\uff0c\u5247\u4f9d\u52d5\u7269\u4fdd\u8b77\u6cd5\u898f\u5b9a\u57f7\u884c\u5f8c\u7e8c\u6536\u5bb9\u5b89\u7f6e\u8207\u958b\u653e\u6c11\u773e\u8a8d\u990a\u3002\""},{"q":"\u5982\u679c\u65bc\u8857\u982d\u767c\u73fe\u6d41\u6d6a\u72ac\u3001\u8c93\u53d7\u50b7\u600e\u9ebc\u8fa6\uff1f\u52d5\u7269\u5f8c\u7e8c\u8655\u7f6e\u70ba\u4f55\uff1f","a":"\u4e00.\u767c\u73fe\u6d41\u6d6a\u72ac\u3001\u8c93\u53d7\u50b7\u6642\uff0c\u8acb\u64a5\u4ee5\u4e0b\u96fb\u8a71\uff1a\n1.\u4e0a\u73ed\u6642\u9593\uff1a\u53ef\u901a\u5831\u672c\u8655(\u96fb\u8a71\uff1a03-3250126\u5206\u6a5f500-510)\u62161959\u52d5\u4fdd\u5c08\u7dda\u53ca\u5e02\u6c11\u5c08\u7dda1999\u3002\n2.\u4e0b\u73ed\u6642\u9593\uff1a\u5e02\u6c11\u5c08\u7dda1999\u3002\n\u63a5\u7372\u901a\u5831\u5f8c\uff0c\u672c\u8655\u5c07\u76e1\u5feb\u6d3e\u54e1\u524d\u5f80\u6551\u63f4\uff0c\u4e26\u70ba\u8a72\u52d5\u7269\u6aa2\u50b7\u5206\u985e\uff0c\u8a55\u4f30\u662f\u5426\u5f8c\u9001\u5408\u7d04\u52d5\u7269\u91ab\u9662\u4f4f\u9662\u91ab\u7642\u3002\u52d9\u5fc5\u63d0\u4f9b\u901a\u5831\u4eba\u7684\u59d3\u540d\u3001\u806f\u7d61\u96fb\u8a71\u3001\u53d7\u50b7\u52d5\u7269\u6240\u5728\u5730\u8a73\u7d30\u5730\u5740\u3001\u52d5\u7269\u5225\uff08\u72d7/\u8c93\uff09\u3001\u52d5\u7269\u9ad4\u578b(\u5927/\u4e2d/\u5c0f)\u3001\u6bdb\u8272\u6216\u7279\u5fb5\u3001\u52d5\u7269\u53d7\u50b7\u72c0\u6cc1\uff08\u5c1a\u53ef\u884c\u8d70/\u7121\u6cd5\u884c\u8d70\uff09\u7b49\u8cc7\u6599\uff0c\u4e26\u8fa6\u7406\u516c\u544a\u3002\n\u4e8c.\u5982\u7121\u4e3b\u72ac\u8c93\u7121\u4eba\u8a8d\u9818\uff0c\u4e14\u9ad4\u6cc1\u6062\u5fa9\u826f\u597d\uff0c\u4e14\u9054\u5df2\u53ef\u7d55\u80b2\u4e4b\u5e74\u9f61\uff0c\u4eff\u7167\u570b\u5916\u53ca\u5176\u4ed6\u7e23\u5e02\u4f5c\u6cd5\uff0c\u7531\u672c\u8655\u5354\u52a9TNVR(\u8a98\u6355\u3001\u7d55\u80b2\u3001\u72c2\u72ac\u75c5\u75ab\u82d7\u6ce8\u5c04\u3001\u56de\u653e) \uff0c\u4ee5\u671f\u63a7\u5236\u904a\u8569\u72ac\u8c93\u65cf\u7fa4\u6578\u91cf\u3002\u5176\u4ed6\u5247\u63a5\u56de\u672c\u5e02\u52d5\u7269\u4fdd\u8b77\u6559\u80b2\u5712\u5340\u5b89\u7f6e\uff0c\u5982\u516c\u544a7\u65e5\u7121\u4eba\u8a8d\u9818\uff0c\u5247\u4f9d\u52d5\u7269\u4fdd\u8b77\u6cd5\u898f\u5b9a\u57f7\u884c\u5f8c\u7e8c\u6536\u5bb9\u5b89\u7f6e\u8207\u958b\u653e\u6c11\u773e\u8a8d\u990a\u3002\n\n\u3010\u5099\u8a3b\u3011\n\u4e0b\u73ed\u6642\u9593\uff1a\n\u63a5\u7372\u901a\u5831\u5f8c\uff0c\u672c\u8655\u5c07\u76e1\u5feb\u6d3e\u54e1\u524d\u5f80\u6551\u63f4\uff0c\u4e26\u70ba\u8a72\u52d5\u7269\u6aa2\u50b7\u5206\u985e\uff0c\u8a55\u4f30\u662f\u5426\u5f8c\u9001\u5408\u7d04\u52d5\u7269\u91ab\u9662\u4f4f\u9662\u91ab\u7642\u3002\u52d9\u5fc5\u63d0\u4f9b\u901a\u5831\u4eba\u7684\u59d3\u540d\u3001\u806f\u7d61\u96fb\u8a71\u3001\u53d7\u50b7\u52d5\u7269\u6240\u5728\u5730\u8a73\u7d30\u5730\u5740\u3001\u52d5\u7269\u5225\uff08\u72d7/\u8c93\uff09\u3001\u52d5\u7269\u9ad4\u578b(\u5927/\u4e2d/\u5c0f)\u3001\u6bdb\u8272\u6216\u7279\u5fb5\u3001\u52d5\u7269\u53d7\u50b7\u72c0\u6cc1\uff08\u5c1a\u53ef\u884c\u8d70/\u7121\u6cd5\u884c\u8d70\uff09\u7b49\u8cc7\u6599"},{"q":"\u6d41\u6d6a\u52d5\u7269(\u72ac\u8c93)\u65bc\u975e\u4e0a\u73ed\u6642\u9593\u53d7\u50b7\u9700\u7dca\u6025\u6551\u8b77\u61c9\u5982\u4f55\u8655\u7406\uff1f","a":"\u60a8\u53ef\u64a5\u62531999\u5e02\u6c11\u8aee\u8a62\u670d\u52d9\u71b1\u7dda\uff0c\u8a71\u52d9\u4eba\u54e1\u5c07\u901a\u5831\u76f8\u95dc\u55ae\u4f4d\u524d\u5f80\u8655\u7406\uff0c\u70ba\u4e86\u80fd\u76e1\u5feb\u641c\u5c0b\u5230\u52d5\u7269\uff0c\u8acb\u52d9\u5fc5\u63d0\u4f9b\u60a8\u7684\u59d3\u540d\u3001\u806f\u7d61\u96fb\u8a71\u3001\u53d7\u50b7\u52d5\u7269\u6240\u5728\u5730\u8a73\u7d30\u5730\u5740\u3001\u52d5\u7269\u5225\uff08\u72d7/\u8c93\uff09\u3001\u52d5\u7269\u9ad4\u578b(\u5927/\u4e2d/\u5c0f)\u3001\u6bdb\u8272\u6216\u7279\u5fb5\u3001\u52d5\u7269\u53d7\u50b7\u72c0\u6cc1\uff08\u5c1a\u53ef\u884c\u8d70/\u7121\u6cd5\u884c\u8d70\uff09\u7b49\u8cc7\u6599\u3002\n\n\u3010\u5099\u8a3b\u3011\n\u901a\u5831\u6025\u96e3\u6551\u52a9\u55ae\u4f4d\u524d\u5f80\u8655\u7406\uff0c\u70ba\u4e86\u80fd\u76e1\u5feb\u641c\u5c0b\u5230\u52d5\u7269\uff0c\u52d9\u5fc5\u63d0\u4f9b\n\u59d3\u540d\uff1a\n\u806f\u7d61\u96fb\u8a71\uff1a\n\u53d7\u50b7\u52d5\u7269\uff1a\n\u6240\u5728\u5730\u8a73\u7d30\u5730\u5740\uff1a\n\u52d5\u7269\u5225\uff08\u72d7/\u8c93\uff09\uff1a\n\u52d5\u7269\u9ad4\u578b(\u5927/\u4e2d/\u5c0f)\uff1a\n\u6bdb\u8272\u6216\u7279\u5fb5\uff1a\n\u52d5\u7269\u53d7\u50b7\u72c0\u6cc1\uff08\u5c1a\u53ef\u884c\u8d70/\u7121\u6cd5\u884c\u8d70\uff09\uff1a\n\u7b49\u8cc7\u6599\u3002"},{"q":"\u5bb6\u4e2d\u5fc3\u611b\u5bf5\u7269\u5f80\u751f\uff0c\u6211\u8981\u5c07\u7260\u5c4d\u9ad4\u711a\u5316\uff0c\u8acb\u554f\u5982\u4f55\u8fa6\u7406\ufe56","a":"\u76ee\u524d\u5e02\u6c11\u8655\u7406\u98fc\u990a\u5bf5\u7269\u4e4b\u907a\u9ad4\u7684\u5efa\u8b70\u65b9\u5f0f\u5982\u4e0b\uff1a\n(\u4e00) \u53ef\u4ea4\u7531\u5404\u5340\u516c\u6240\u6e05\u6f54\u968a\u6b0a\u8cac\u8655\u7406\u3002\u63a1\u7528\u672c\u65b9\u5f0f\u8655\u7406\u5bf5\u7269\u907a\u9ad4\uff0c\u7121\u9808\u7e73\u4ea4\u984d\u5916\u8cbb\u7528\u3002\u672a\u4f86\u6c11\u773e\u767c\u73fe\u8857\u9053\u72ac\u8c93\u907a\u9ad4\u7531\u74b0\u5883\u6e05\u6f54\u7a3d\u67e5\u5927\u968a\u524d\u5f80\u73fe\u5834,\u5354\u52a9\u6383\u63cf\u6676\u7247,\u4e26\u4e88\u660e\u78ba\u8a18\u9304\u7de8\u865f\u5f8c\u88dd\u888b, \u5f8c\u9001\u5f80\u672c\u5e02\u52d5\u7269\u4fdd\u8b77\u6559\u80b2\u5712\u5340(\u7c21\u7a31\u5712\u5340),\u5982\u7d93\u6676\u7247\u8fa8\u8b58 \u70ba\u6709\u4e3b\u4e4b\u907a\u9ad4,\u7531\u5712\u5340\u901a\u77e5\u98fc\u4e3b\u9818\u56de;\u7121\u4e3b\u5247\u7531\u5712\u5340\u59d4\u8a17 \u907a\u9ad4\u5c08\u696d\u711a\u5316\u6a5f\u69cb\u8655\u7406\u3002\n(\u4e8c) \u672c\u8655\u63d0\u4f9b\u5e02\u6c11\u59d4\u8a17\u72ac\u8c93\u5c4d\u9ad4\u711a\u5316\u670d\u52d9\uff0c\u59d4\u5916\u96c6\u9ad4\u711a\u5316\u72ac\u8c93\u907a\u9ad4\u3002\u72ac\u8c93\u5c4d\u9ad4\u711a\u5316\u670d\u52d9\u8cbb\u6309\u91cd\u91cf\u8a08\u8cbb\uff0c\u6bcf\u516c\u65a4\u6536\u8cbb\u65b0\u81fa\u5e6390\u5143\uff0c\u4e0d\u8db3\u4e00\u516c\u65a4\u8005\u4ee5\u4e00\u516c\u65a4\u8a08\u7b97\u3002\u5176\u4ed6\u5bf5\u7269\u5c4d\u9ad4\u91cd\u91cf\u4e0d\u903e\u516b\u5341\u516c\u65a4\u8005\uff0c\u4e14\u7121\u9632\u75ab\u7591\u616e\u8005\uff0c\u5f97\u6bd4\u7167\u8655\u7406\u3002 \n(\u4e09) \u5bf5\u7269\u9700\u500b\u5225\u706b\u5316\u8005\uff0c\u53ef\u4ea4\u4ed8\u79c1\u4eba\u5bf5\u7269\u6baf\u846c\u696d\u8655\u7406\uff0c\u76ee\u524d\u5317\u90e8\u5171\u6709\u6578\u5bb6\u696d\u8005\u63d0\u4f9b\u76f8\u95dc\u670d\u52d9\uff0c\u6c11\u773e\u53ef\u53c3\u8003\u5404\u5bb6\u696d\u8005\u670d\u52d9\u5167\u5bb9\u53ca\u6536\u8cbb\u898f\u5b9a\u81ea\u7531\u9032\u884c\u9078\u64c7\u3002"},{"q":"\u6843\u5712\u5e02\u52d5\u7269\u4fdd\u8b77\u6559\u80b2\u5712\u5340\u4e4b\u958b\u653e\u6642\u9593\u70ba\u4f55\uff1f","a":"\u8a8d\u9818\u990a\u72ac\u8c93\u3001\u514d\u8cbb\u53c3\u89c0\u958b\u653e\u6642\u9593\uff1a\u6bcf\u9031\u4e8c\u3001\u56db\u3001\u516d\u53ca\u65e5\uff0c10:00~12:00\uff0c13:00~15:30\u3002(\u6bcf\u9031\u4e09\u53ca\u570b\u5b9a\u5047\u65e5\u4f11\u5712)\n\n\u3010\u5099\u8a3b\u3011\n\u8a8d\u990a\u9700\u6c42\u8acb\u53c3\u7167\u8aaa\u660e\uff01\n\u5982\u70ba\u68c4\u990a\u6216\u62fe\u7372\u52d5\u7269\u8a62\u554f\u9001\u4ea4\u6536\u5bb9\u6240\uff0c\u8acb\u52ff\u76f4\u63a5\u540c\u610f\u6c11\u773e\u524d\u5f80\uff01\u5982\u6709\u76f8\u95dc\u9700\u6c42\uff0c\u8acb\u5c07\u5167\u5bb9\u9304\u6848\uff0c\u7531\u55ae\u4f4d\u4e0a\u73ed\u65e5\u5f8c\u8655\u8aaa\u660e\u3002"},{"q":"\u6211\u5bb6\u9644\u8fd1\u6709\u8a31\u591a\u6d41\u6d6a\u72ac\u8a72\u5982\u4f55\u8655\u7f6e\uff1f","a":"\u5982\u60a8\u6709\u6355\u72ac\u9700\u6c42\u8acb\u81f4\u96fb03-3250126\u5206\u6a5f500\u62161999\u53ca1959\u52d5\u4fdd\u5c08\u7dda\uff0c\u4e26\u63d0\u4f9b\u72ac\u96bb\u8a73\u7d30\u51fa\u6c92\u5730\u9ede\u3001\u7279\u5fb5(\u82b1\u8272\u3001\u9ad4\u578b)\u3001\u6578\u91cf\u3001\u8209\u5831\u539f\u56e0\uff0c\u4e26\u7559\u4e0b\u60a8\u7684\u806f\u7d61\u8cc7\u6599\uff0c\u6211\u5011\u5c07\u76e1\u5feb\u70ba\u60a8\u670d\u52d9\u3002\n\n\u3010\u5099\u8a3b\u3011\n\u5982\u80fd\u63d0\u4f9b\u72ac\u96bb\u8a73\u7d30\u51fa\u6c92\u5730\u9ede\u3001\u7279\u5fb5(\u82b1\u8272\u3001\u9ad4\u578b)\u3001\u6578\u91cf\u3001\u8209\u5831\u539f\u56e0\u3001\u806f\u7d61\u8cc7\u6599\uff0c\u96d9\u7cfb\u7d71\u9304\u6848\uff0c\u7531\u55ae\u4f4d\u4e0a\u73ed\u65e5\u5f8c\u8655\u3002\n\u5982\u8ffd\u8eca\u54ac\u4eba\uff0c\u8003\u91cf\u8996\u7dda\u4e0d\u826f\u4ecd\u4ee5\u5b8c\u6574\u9304\u6848\u4e0a\u73ed\u65e5\u5118\u5feb\u6d3e\u9063\u3002\n(\u5982\u6c11\u773e\u6301\u7e8c\u6709\u722d\u8b70\uff0c\u4eba\u4e8b\u6642\u5730\u7269\u80fd\u5b8c\u6574\u63d0\u4f9b\uff0c\u518d\u806f\u7e6b\u4e00\u4e0b\u6551\u63f4\u968a\u80fd\u5426\u524d\u5f80\u4e86\u89e3\u6216\u8005\u53bb\u770b\u770b\u518d\u56de\u8986\u7d66\u6c11\u773e)"},{"q":"\u8acb\u554f\u4f4f\u5bb6\u9644\u8fd1\u91ce\u8c93\u554f\u984c\u5982\u4f55\u89e3\u6c7a\uff1f","a":"\u56e0\u70ba\u8c93\u96bb\u6d3b\u52d5\u70ba\u4e09\u5ea6\u7a7a\u9593\u4e14\u52d5\u4f5c\u654f\u6377\uff0c\u6545\u4e0d\u6613\u76f4\u63a5\u6355\u6349\u3002\u82e5\u4f4f\u5bb6\u9644\u8fd1\u6d41\u6d6a\u8c93\u6578\u589e\u591a\u7fa4\u805a\u9020\u6210\u56f0\u64fe\uff0c\u672c\u5e02\u5e02\u6c11\u5f97\u6309\u898f\u5b9a\u81f4\u96fb\u672c\u8655\u514d\u8cbb\u6392\u501f\u8a98\u6355\u8c93\u7c60\u6355\u6349(\u6843\u5712\u5340\u7e23\u5e9c\u8def57\u865f\uff0c03-3250126\u5206\u6a5f500\u30011999\u5e02\u5e9c\u5c08\u7dda\u82071959\u52d5\u4fdd\u5c08\u7dda)\uff0c\u5982\u6355\u7372\u8c93\u96bb\u5373\u523b\u81f4\u96fb\u672c\u8655\uff0c\u5f8c\u672c\u8655\u5c07\u6309\u672c\u5e02TNVR\u63aa\u65bd\u4f5c\u696d\uff0c\u4ee5\u671f\u843d\u5be6\u6e90\u982d\u7ba1\u7406\u3002\n\n\u3010\u5099\u8a3b\u3011\n\u5b8c\u6574\u9304\u6848\uff0c\u4e0a\u73ed\u6642\u6bb5\u806f\u7e6b\u8655\u7406\u3002"},{"q":"\u5982\u64bf\u5230(\u62fe\u7372)\u72ac\u8c93\u8a72\u5982\u4f55\u8655\u7406\ufe56","a":"\u60a8\u65bc\u672c\u5e02\u8f44\u5340\u5167\u62fe\u7372\u72ac\u8c93\u5f8c\uff0c\u53ef\u5148\u6d3d\u5bf5\u7269\u767b\u8a18\u7ad9\u6383\u63cf\u6709\u7121\u690d\u5165\u6676\u7247\u8fa6\u7406\u5bf5\u7269\u767b\u8a18\uff0c\u78ba\u8a8d\u662f\u5426\u70ba\u6709\u4e3b\u52d5\u7269\uff0c\u4e26\u8acb\u806f\u7e6b\u672c\u8655\u52d5\u7269\u4fdd\u8b77\u6559\u80b2\u5712\u5340(\u5730\u5740\u70ba\u65b0\u5c4b\u5340\u6c38\u8208\u91cc\u85fb\u7901\u8def1668\u865f\uff0c\u96fb\u8a71\u70ba03-4861760)\u6216\u672c\u5e02\u52d5\u7269\u4fdd\u8b77\u8655(\u5730\u5740\u70ba\u6843\u5712\u5340\u7e23\u5e9c\u8def57\u865f\uff0c\u96fb\u8a71\u70ba03-3250126)\uff0c\u5982\u60a8\u78ba\u8a8d\u8a72\u72ac\u96bb\u6709\u6676\u7247\uff0c\u8acb\u9015\u884c\u9001\u81f3\u4e0a\u8ff0\u5730\u9ede\u4ee5\u5229\u672c\u8655\u5b89\u6392\u5f8c\u7e8c\u9304\u6848\u3001\u901a\u77e5\u9818\u56de\u53ca\u6536\u5bb9\u4e8b\u5b9c\u3002\n\n\u3010\u5099\u8a3b\u3011\n\u4e0b\u73ed\u6642\u6bb5\u8acb\u6c11\u773e\u5354\u52a9\u5b89\u7f6e\uff0c\u4e0d\u8981\u8b93\u6c11\u773e\u76f4\u63a5\u9001\u5230\u5712\u5340\u3002\u7cfb\u7d71\u9304\u6848\u5f8c\u4e0a\u73ed\u6642\u6bb5\u7531\u55ae\u4f4d\u806f\u7e6b\u8655\u7406\u3002\n\u6536\u5bb9\u540c\u6642\u7b26\u5408\u4e8c\u8981\u4ef6\u624d\u80fd\u8655\u7406\uff1a\u9700\u70ba\u6843\u5712\u5e02\u6c11\u3001\u62fe\u7372\u5730\u65bc\u6843\u5712 (\u904a\u5ba2\u975e\u5e02\u6c11\u50c5\u80fd\u5a49\u62d2)"},{"q":"\u5982\u9047\u72ac\u8c93\u53d7\u56f0\uff0c\u6c11\u773e\u7121\u6cd5\u5354\u52a9\u5176\u812b\u56f0\u6642\uff0c\u53ef\u5411\u54ea\u55ae\u4f4d\u5c0b\u6c42\u5354\u52a9 (\u542b\u975e\u4e0a\u73ed\u6642\u6bb5)?","a":"1\u3001\u4e0a\u73ed\u6642\u9593\u8acb\u9023\u7e6b\u6843\u5712\u5e02\u653f\u5e9c\u52d5\u7269\u4fdd\u8b77\u8655(03-3250126\u5206\u6a5f500-510)\uff0c1959\u52d5\u4fdd\u5c08\u7dda\u672c\u8655\u5c07\u8996\u7576\u4e0b\u5177\u9ad4\u60c5\u5f62\u505a\u59a5\u9069\u8655\u7406\u3002\n2\u3001\u4e0b\u73ed\u6642\u9593\u8acb\u64a5\u62531999\u5c08\u7dda\uff0c1999\u5c08\u7dda\u5c07\u8f49\u672c\u8655\u6025\u96e3\u6551\u52a9\u4eba\u54e1\u8996\u7576\u4e0b\u5177\u9ad4\u60c5\u5f62\u505a\u59a5\u9069\u8655\u7406\u3002\n\n\u3010\u5099\u8a3b\u3011\n\u4e86\u89e3\u4e8b\u4ef6\u7684\u6025\u8feb\u6027\uff0c\u8003\u91cf\u5de5\u5177(\u9ad8\u7a7a/\u593e\u5c64\u7b49)\u53ca\u4eba\u54e1\u7684\u5b89\u5168\u548c\u56f0\u96e3\u5ea6\uff0c\u4e86\u89e3\u8a73\u7d30\u60c5\u6cc1\u5f8c\u5411\u6c11\u773e\u8aaa\u660e\u6211\u5011\u5411\u6551\u63f4\u968a\u78ba\u8a8d\u80fd\u5426\u5354\u52a9(\u8996\u5668\u6750\u53ca\u80fd\u529b)\uff1b\u70ba\u964d\u4f4e\u6c11\u6028\u52ff\u904e\u5ea6\u62d2\u7d55\uff0c\u6551\u63f4\u968a\u53ef\u4ee5\u8996\u60c5\u6cc1\u524d\u5f80\u770b\u770b\u53ca\u8655\u7406\u5f8c\u7e8c\u3002"},{"q":"\u8acb\u63d0\u4f9b\u5982\u81ea\u5bb6\u5bf5\u7269\u5728\u4f4f\u5bb6\u5167\u53d7\u56f0\uff0c\u98fc\u4e3b\u7121\u6cd5\u5354\u52a9\u812b\u56f0\uff0c\u53ef\u5411\u54ea\u55ae\u4f4d\u5c0b\u6c42\u5354\u52a9(\u542b\u975e\u4e0a\u73ed\u6642\u6bb5)?","a":"\"1\u3001\u4e0a\u73ed\u6642\u9593\u8acb\u9023\u7e6b\u6843\u5712\u5e02\u653f\u5e9c\u52d5\u7269\u4fdd\u8b77\u8655\uff0c\u672c\u8655\u5c07\u8996\u7576\u4e0b\u5177\u9ad4\u60c5\u5f62\u505a\u59a5\u9069\u8655\u7406\u3002\n2\u3001\u4e0b\u73ed\u6642\u9593\u8acb\u64a5\u62531999\u5c08\u7dda\uff0c1999\u5c08\u7dda\u5c07\u8f49\u672c\u8655\u6025\u96e3\u6551\u52a9\u4eba\u54e1\u8996\u7576\u4e0b\u5177\u9ad4\u60c5\u5f62\u505a\u59a5\u9069\u8655\u7406\u3002\n\u203b\u6843\u5712\u5e02\u653f\u5e9c\u52d5\u7269\u4fdd\u8b77\u8655\u5730\u5740\u53ca\u806f\u7d61\u96fb\u8a71\uff1a(1)\u5730\u5740\uff1a\u6843\u5712\u5e02\u6843\u5712\u5340\u7e23\u5e9c\u8def57\u865f (2)\u96fb\u8a71\uff1a03-3250126\u5206\u6a5f500\"\n\n\u3010\u5099\u8a3b\u3011\n\u4e86\u89e3\u4e8b\u4ef6\u7684\u6025\u8feb\u6027\uff0c\u8003\u91cf\u591c\u9593\u8996\u7dda\u3001\u52d5\u7dda\u3001\u5de5\u5177 (\u9ad8\u7a7a/\u593e\u5c64\u7b49)\u53ca\u4eba\u54e1\u7684\u5b89\u5168\u548c\u56f0\u96e3\u5ea6\uff0c\u4e86\u89e3\u8a73\u7d30\u60c5\u6cc1\u5f8c\u5411\u6c11\u773e\u8aaa\u660e\u6211\u5011\u5411\u6551\u63f4\u968a\u78ba\u8a8d\u80fd\u5426\u5354\u52a9(\u8996\u5668\u6750\u53ca\u80fd\u529b)\uff1b\u70ba\u964d\u4f4e\u6c11\u6028\u52ff\u904e\u5ea6\u62d2\u7d55\uff0c\u6551\u63f4\u968a\u53ef\u4ee5\u8996\u60c5\u6cc1\u524d\u5f80\u770b\u770b\u53ca\u8655\u7406\u5f8c\u7e8c\u3002"},{"q":"\u8fb2\u6797\u6f01\u7267-\u8acb\u63d0\u4f9b\u5411\u52d5\u7269\u4fdd\u8b77\u9632\u75ab\u8655\u501f\u7528\u8a98\u6355\u7c60\u6642\uff0c\u53ef\u4ee5\u501f\u7528\u5e7e\u500b\u8a98\u6355\u7c60?\u7533\u8acb\u8a98\u6355\u7c60\u6709\u54ea\u4e9b\u5730\u9ede?","a":"1.\u8a2d\u7c4d\u65bc\u672c\u5e02\u4e4b\u5e02\u6c11\uff0c\u539f\u5247\u4e0a\u53ef\u501f\u75281\u500b\u8a98\u6355\u7c60\uff0c\u501f\u7528\u671f\u9650\u70ba1\u5468\uff0c\u53ef\u7533\u8acb\u5c55\u5ef63\u6b21\uff0c\u6bcf\u6b21\u5c55\u5ef6\u6642\u9593\u70ba1\u5468\uff0c\u81f3\u591a\u501f\u7528\u4e00\u500b\u6708\uff0c\u7533\u8acb\u4eba\u5f97\u81f4\u96fb(033250126\u5206\u6a5f500\u62161959\u52d5\u4fdd\u5c08\u7dda)\u7533\u8acb\u501f\u7528\u53ca\u5c55\u5ef6\u3002\n2.\u53ef\u81f4\u96fb\u6216\u89aa\u81f3\u5357\u660c\u52d5\u7269\u4fdd\u8b77\u6559\u80b2\u5712\u5340\u7533\u8acb\u501f\u7528\u8a98\u6355\u7c60\u3002\n(1)\u5730\u5740\uff1a\u6843\u5712\u5e02\u6843\u5712\u5340\u5411\u5584\u8857120-1\u865f  (2)\u96fb\u8a71\uff1a 03-3250126\u5206\u6a5f500"},{"q":"\u6211\u60f3\u8a8d\u990a\u72d7\u72d7(\u8c93\u54aa)\uff0c\u8acb\u554f\u9700\u8981\u6e96\u5099\u4ec0\u9ebc\u55ce\uff1f","a":"\u9818\u990a\u8005\u9808\u651c\u5e36\u5e74\u6eff20\u6b72\u4e26\u651c\u5e36\u8eab\u5206\u8b49\u6216\u99d5\u7167\uff0c\u65bc\u52d5\u7269\u4fdd\u8b77\u6559\u80b2\u5712\u5340\u958b\u653e\u53c3\u89c0\u6642\u9593(\u9031\u4e8c\u3001\u56db\u3001\u516d\u3001\u65e5\u65e9\u4e0a\u5341\u9ede\u81f3\u4e0b\u5348\u4e09\u9ede\u534a\uff0c\u4e2d\u5348\u5341\u4e8c\u9ede\u81f3\u4e00\u9ede\u534a\u70ba\u4f11\u606f\u6642\u9593)\u81f3\u73fe\u5834\u6311\u9078\u52d5\u7269\uff0c\u5f85\u78ba\u5b9a\u5f8c\u81f3\u5712\u5340\u884c\u653f\u4e2d\u5fc3\u8fa6\u7406\u9818\u990a\u624b\u7e8c(\u5f71\u5370\u8eab\u5206\u8b49\u7b49\u8fa6\u7406\u5bf5\u7269\u767b\u8a18\u7b49\u4e8b\u5b9c\uff0c\u76ee\u524d\u70ba\u63d0\u9ad8\u8a8d\u990a\u7387\uff0c\u7121\u9808\u7e73\u7d0d\u624b\u7e8c\u8cbb\u7528); \u53e6\u8c93\u54aa\u53ca\u5e7c\u72ac\u5efa\u8b70\u81ea\u5099\u786c\u5f0f\u63d0\u7c60\uff0c\u6210\u72ac\u5247\u8acb\u6e96\u5099\u727d\u7e69\u4e26\u5b89\u6392\u9069\u5408\u7684\u63a5\u9001\u4ea4\u901a\u5de5\u5177\u3002"},{"q":"\u6211\u5bb6\u88cf\u7684\u72d7\u8c93\u6c92\u8fa6\u6cd5\u990a\u4e86\u8a72\u600e\u9ebc\u8fa6\uff1f","a":"\u6709\u95dc\u98fc\u4e3b\u4e0d\u64ec\u7e7c\u7e8c\u98fc\u990a\u72ac\u8c93\u6642\uff0c\u8acb\u4f9d\u7167\u4e0b\u5217\u8aaa\u660e\u8fa6\u7406\uff1a\n\u4e00\u3001\u6b32\u7533\u8acb\u8b93\u6e21\u4e4b\u72ac\u8c93\u9700\u5148\u9015\u884c\u6676\u7247\u690d\u5165\u5b8c\u6210\u5bf5\u7269\u767b\u8a18\u53ca\u65bd\u6253\u7576\u5e74\u5ea6\u72c2\u72ac\u75c5\u75ab\u82d7\u8207\u7d55\u80b2\uff0c\u76f8\u95dc\u8cbb\u7528\u7531\u539f\u98fc\u4e3b\u81ea\u884c\u8ca0\u64d4\uff0c\u59cb\u5f97\u8fa6\u7406\u8b93\u6e21\u624b\u7e8c\u3002\n\u4e8c\u3001\u56e0\u6545\u7121\u6cd5\u7e8c\u990a\u72ac\u8c93\u4e4b\u5e02\u6c11\uff0c\u65bc\u8fa6\u7406\u4e0d\u64ec\u7e8c\u990a\u624b\u7e8c\u524d\uff0c\u61c9\u5b8c\u6210\u4e0a\u8ff0\u4e8b\u9805\u5f8c\u651c\u5e36\u8a72\u72ac\u8c93\u4e26\u6aa2\u9644\u98fc\u4e3b\u8eab\u5206\u8b49\u660e\u6587\u4ef6\uff0c\u81f3\u672c\u5e02\u52d5\u7269\u4fdd\u8b77\u6559\u80b2\u5712\u5340(\u4ee5\u4e0b\u7c21\u7a31\u52d5\u4fdd\u5712\u5340\uff0c03-4861760\uff0c\u6843\u5712\u5e02\u65b0\u5c4b\u5340\u85fb\u7901\u8def1668\u865f)\u8fa6\u7406\u72ac\u8c93\u8b93\u6e21\u516c\u544a\u7533\u8acb\u3002\u8b93\u6e21\u7533\u8acb\u4eba\u9700\u4f9d\u8aaa\u660e\u586b\u5beb\u7533\u8acb\u8868\u683c\u4e26\u914d\u5408\u62cd\u651d\u5f85\u8b93\u6e21\u72ac\u8c93\u7167\u7247\u5f8c\uff0c\u5c07\u8cc7\u6599\u4ea4\u4ed8\u53d7\u52d5\u4fdd\u5712\u5340\uff0c\u7531\u52d5\u4fdd\u5712\u5340\u5c07\u5f85\u8b93\u6e21\u72ac\u8c93\u7167\u7247\u53ca\u76f8\u95dc\u8cc7\u6599\u520a\u767b\u65bc\u6843\u5712\u5e02\u52d5\u7269\u4fdd\u8b77\u6559\u80b2\u5712\u5340\u300c\u5bf5\u7269\u8b93\u6e21\u300d\u5c08\u5340\u7db2\u9801\u4f9b\u6c11\u773e\u700f\u89bd\uff0c\u70ba\u671f30\u65e5\u3002\u82e5\u6709\u610f\u9858\u8a8d\u990a\u5f85\u8b93\u6e21\u72ac\u8c93\u4e4b\u6c11\u773e\uff0c\u53ef\u900f\u904e\u52d5\u4fdd\u5712\u5340\u806f\u7e6b\u96d9\u65b9\u5f8c\u8fa6\u7406\u72ac\u8c93\u8f49\u8b93\u624b\u7e8c\uff0c\u8207\u7e73\u4ea4\u8f49\u8b93\u8cbb\u7528\u3002\u4ee5\u6e1b\u5c11\u52d5\u7269\u56e0\u6536\u5bb9\u65bc\u5712\u5340\u9020\u6210\u4e4b\u7dca\u8feb\u8207\u4e0d\u9069\u60c5\u6cc1\uff0c\u53ca\u63d0\u5347\u6536\u5bb9\u52d5\u7269\u7167\u8b77\u54c1\u8cea\u3002\n\u4e09\u3001\u5f85\u8b93\u6e21\u72ac\u8c93\u7d93\u520a\u767b\u8b93\u6e2130\u65e5\u5f8c\uff0c\u5018\u672a\u5c0b\u5f97\u6b32\u98fc\u990a\u4e4b\u65b0\u98fc\u4e3b\uff0c\u539f\u98fc\u4e3b\u61c9\u4e8b\u5148\u96fb\u8a71\u9023\u7e6b\u52d5\u4fdd\u5712\u5340\uff0c\u4f9d\u5712\u5340\u6307\u5b9a\u671f\u9650\u5167\u5c07\u72ac\u8c93\u5e36\u81f3\u672c\u5e02\u52d5\u7269\u4fdd\u8b77\u6559\u80b2\u5712\u5340\uff0c\u586b\u5177\u300c\u52d5\u7269\u9001\u4ea4\u66f8\u300d\u8fa6\u7406\u52d5\u7269\u9001\u4ea4\u624b\u7e8c\uff0c\u4e26\u4f9d\u6843\u5712\u5e02\u72ac\u8c93\u6536\u5bb9\u53ca\u8655\u7406\u6536\u8cbb\u6a19\u6e96\u7e73\u4ea4\u76f8\u95dc\u8cbb\u7528(\u5df2\u8fa6\u7406\u5bf5\u7269\u767b\u8a18\u8005\u6536\u53d6\u8cbb\u7528\uff1a2500\u5143\uff0c\u5982\u9700\u7d93\u672c\u8655\u63a5\u9001\u5247\u9700\u652f\u4ed81000\u5143\u904b\u8f38\u8cbb e0\u3002\u8655\u7406\u50b7\u75c5\u91ce\u751f\u52d5\u7269\u9996\u5148\u8981\u964d\u4f4e\u7dca\u8feb\u56e0\u5b50\u8b93\u52d5\u7269\u8655\u65bc\u4f11\u606f\u72c0\u614b\uff0c\u5c07\u52d5\u7269\u5b89\u7f6e\u5728\u9069\u7576\u5927\u5c0f\u4e14\u6709\u84cb\u7684\u7d19\u7bb1\u5b50\u4e2d\uff0c\u5728\u7d19\u7bb1\u5468\u570d\u6233\u4e00\u4e9b\u5c0f\u6d1e\u901a\u98a8\uff0c\u7bb1\u5167\u653e\u7f6e\u4e7e\u6de8\u67d4\u8edf\u7684\u7d19\u5dfe\u6216\u8863\u7269\uff0c\u4f7f\u7260\u6709\u5b89\u5fc3\u7684\u8457\u5730\u611f\u3002"},{"q":"\u52ff\u4f7f\u7528\u7c60\u5b50\u5b89\u7f6e\u91ce\u751f\u9ce5\u985e\uff0d\u9435\u7d72\u7c60\u7db2\u76ee\u6703\u4f7f\u91ce\u751f\u9ce5\u985e\u53d7\u50b7"},{"q":"\u82e5\u8981\u5b89\u7f6e\u9ce5\u985e\uff0c\u4f7f\u7528\u7d19\u7bb1\u662f\u6bd4\u8f03\u5408\u9069\u7684\uff1b\u91ce\u751f\u9ce5\u985e\u5bb9\u6613\u56e0\u7dca\u8feb\u800c\u5728\u7c60\u5b50\u5167\u885d\u649e\uff0c\u5728\u904e\u7a0b\u4e2d\u8b93\u81ea\u5df1\u53d7\u50b7\uff0c\u7db2\u76ee\u4e5f\u53ef\u80fd\u6703\u5361\u56db\u80a2\u6216\u4f7f\u98db\u7fbd\u6298\u640d\uff0c\u5728\u62c9\u626f\u6642\u8b93\u50b7\u52e2\u66f4\u56b4\u91cd\u3002\u5b89\u7f6e\u91ce\u751f\u9ce5\u985e\u6642\u53ef\u4f7f\u7528\u7d19\u7bb1\uff0c\u4f86\u5c07\u9ce5\u985e\u7684\u8996\u89ba\u8207\u5916\u90e8\u6d3b\u52d5\u7684\u4eba\u985e\u9694\u96e2\uff0c\u6e1b\u4f4e\u9a5a\u5687\u3002"}]},{"name":"\u52d5\u7269\u9038\u51fa\u8655\u7406\u55ae\u4f4d","items":[{"q":"\u52d5\u7269\u9038\u51fa\u7a2e\u985e\u3000\u6b0a\u8cac\u55ae\u4f4d"},{"q":"\u7d93\u6fdf\u52d5\u7269\uff1a\u8c6c\u3001\u725b\u3001\u7f8a\u3001\u9e7f\u3001\u5c71\u8c6c\u3001\u9d15\u9ce5\u3002\u3000\u7e23\u653f\u5e9c \u755c\u7522\u79d1"},{"q":"\u7d93\u6fdf\u52d5\u7269\uff1a\u8c6c(\u5c71\u8c6c\u3001\u9e9d\u9999\u8c6c)\u5bb6\u79bd\u7b49\u914d\u5408\u755c\u7522\u79d1\u9ebb\u9189\u85e5\u4f7f\u7528\u3002\u3000\u52d5\u7269\u9632\u75ab\u6240\u8c6c\u79bd\u9632\u75ab\u8ab2"},{"q":"\u7d93\u6fdf\u52d5\u7269\uff1a\u8349\u98df\u52d5\u7269(\u725b\u3001\u7f8a\u3001\u9e7f)\u7b49\u914d\u5408\u755c\u7522\u79d1\u9ebb\u9189\u85e5\u4f7f\u7528\u3002\u3000\u52d5\u7269\u9632\u75ab\u6240\u8349\u98df\u9632\u75ab\u8ab2"},{"q":"\u53d7\u50b7\u72ac\u3001\u8c93\u3002\u3000\u52d5\u7269\u9632\u75ab\u6240\u52d5\u7269\u4fdd\u8b77\u8ab2"},{"q":"\u53d7\u50b7\u91ce\u751f\u52d5\u7269\u3002(\u77f3\u864e\u9664\u5916)\u3000\u52d5\u7269\u9632\u75ab\u6240\u52d5\u7269\u4fdd\u8b77\u8ab2"},{"q":"\u91ce\u751f\u52d5\u7269\uff1a\u53f0\u7063\u737c\u7334\u3001\u9e7f\u3001\u773c\u93e1\u86c7\u3001\u7a7f\u5c71\u7532\u3001\u99ac\u4f86\u718a\u3001\u6cb3\u99ac\u3001\u7345\u5b50\u3001\u98df\u86c7\u9f9c\u3001\u9be8\u8c5a\u3001\u767d\u9f3b\u5fc3\u3001\u5c71\u7f8c\u3001\u96c9\u985e\u3001\u77f3\u864e\u3001\u87d2\u86c7\u985e\u3001\u9f9c\u985e\u3001\u7da0\u9b23\u8725\u3001\u9e1a\u9d61\u7b49\u3002\u3000\u7e23\u653f\u5e9c\n\u6797\u52d9\u66a8\u91ce\u751f\u52d5\u7269\u4fdd\u8b77\u79d1"}]},{"name":"\u79bd\u6d41\u611f","items":[{"q":"\u990a\u79bd\u696d\u8005\u61c9\u5982\u4f55\u89c0\u5bdf\u5bb6\u79bd\u5065\u5eb7\u72c0\u6cc1\u662f\u5426\u7570\u5e38? \u5982\u6709\u75ab\u60c5\u5982\u4f55\u901a\u5831?","a":"(\u4e00)\u990a\u79bd\u5834\u5982\u6709\u4ee5\u4e0b\u7570\u5e38\u60c5\u6cc1\uff0c\u8acb\u755c\u4e3b\u4e3b\u52d5\u901a\u5831\u5730\u65b9\u52d5\u7269\u9632\u75ab\u6a5f\u95dc\uff0c\u4ee5\u5229\u5373\u6642\u6aa2\u9664\u75c5\u539f\uff1a\n1.\u9023\u7e8c\u5169\u5929\uff0c\u6bcf\u5929\u5316\u88fd\u7387\u5927\u65bc\u6216\u7b49\u65bc\u767b\u8a18\u98fc\u990a\u982d\u6578\u4e4b1%\uff081,000\u96bb\u4e2d\u9023\u7e8c\u5169\u5929\uff0c\u6bcf\u5929\u6b7b\u4ea1\u79bd\u96bb\u6578\u7686\u5927\u65bc\u6216\u7b49\u65bc10\u96bb\uff09\u3002\n2.\u55ae\u65e5\u5316\u88fd\u7387\u5927\u65bc\u6216\u7b49\u65bc\u767b\u8a18\u98fc\u990a\u982d\u6578\u4e4b1.5%\uff081,000\u96bb\u4e2d\u9023\u7e8c\u5169\u5929\uff0c\u6bcf\u5929\u6b7b\u4ea1\u79bd\u96bb\u6578\u7686\u5927\u65bc\u6216\u7b49\u65bc15\u96bb\uff09\u3002\n3.\u79bd\u5834\u5bb6\u79bd\u98f2\u6c34\u91cf\u3001\u651d\u98df\u91cf\u6216\u7522\u86cb\u7387\u4e0b\u964d\u5927\u65bc5%\u3002\n\n(\u4e8c)\u4f9d\u755c\u7267\u6cd5\u7b2c9\u689d\u898f\u5b9a\uff0c\u755c\u7267\u5834\u61c9\u7f6e\u7378\u91ab\u5e2b\u6216\u6709\u7279\u7d04\u7378\u91ab\u5e2b\uff0c\u9047\u6709\u5bb6\u755c\u3001\u5bb6\u79bd\u767c\u75c5\u7387\u905410%\u4ee5\u4e0a\u6642\uff0c\u61c9\u65bc24\u5c0f\u6642\u5167\u901a\u5831\u7576\u5730\u9109\u93ae\u5e02\u516c\u6240\u7378\u91ab\u6216\u52d5\u7269\u9632\u75ab\u6a5f\u95dc(04-7620774)\u3002"},{"q":"\u653f\u5e9c\u5982\u4f55\u7a4d\u6975\u9632\u6cbb\u79bd\u6d41\u611f\u7684\u767c\u751f\u8207\u50b3\u67d3","a":"1.\u70ba\u5f37\u5316\u696d\u8005\u4e3b\u52d5\u901a\u5831\u8a98\u56e0\uff0c\u63d0\u5347\u79bd\u6d41\u611f\u9632\u6cbb\u6548\u7387\uff0c\u51e1\u4e3b\u52d5\u901a\u5831\u5f8c\uff0c\u63a1\u9810\u9632\u6027\u64b2\u6bba\u6216\u78ba\u8a3a\u70baH5N1\u3001H5N2\u3001H5N5\u3001H5N6\u53caH5N8\u9ad8\u75c5\u539f\u6027\u79bd\u6d41\u611f\u6848\u4f8b\u8005\uff0c\u64b2\u6bba\u52d5\u7269\u4f9d\u8a55\u50f9\u984d\u88dc\u511f6\u6210\uff1b\u5982\u9810\u9632\u6027\u64b2\u6bba\u5f8c\uff0c\u6700\u5f8c\u6aa2\u9a57\u7d50\u679c\u70ba\u9ad8\u6216\u4f4e\u75c5\u539f\u6027\u79bd\u6d41\u611f\u8005\uff0c\u64b2\u6bba\u52d5\u7269\u5747\u4ee5\u8a55\u50f9\u984d\u4ee5\u5167\u88dc\u511f\u3002\n\n2.\u5bb6\u79bd\u755c\u7267\u5834\u6216\u98fc\u990a\u5834\u52d9\u5fc5\u4f9d\u672c\u7e23\u516c\u544a\u4e4b\u300cH5\u3001H7\u4e9e\u578b\u79bd\u6d41\u611f\u9632\u6cbb\u63aa\u65bd\u300d\u4e2d\u5404\u9805\u8edf\u3001\u786c\u9ad4\u751f\u7269\u5b89\u5168\u4f5c\u70ba\uff0c\u9055\u53cd\u8005\u5c07\u4f9d\u300c\u52d5\u7269\u50b3\u67d3\u75c5\u9632\u6cbb\u689d\u4f8b\u300d\u898f\u5b9a\u8655\u4ee53\u842c\u5143\u4ee5\u4e0a15\u842c\u5143\u4ee5\u4e0b\u7f70\u9370\uff0c\u4e26\u9650\u671f\u6539\u5584\u5176\u9632\u75ab\u8a2d\u65bd\uff0c\u843d\u5be6\u81ea\u4e3b\u7ba1\u7406\u3002\n\n3. \u52a0\u5f37\u9ad8\u98a8\u96aa\u5730\u5340\u79bd\u5834\u5bb6\u79bd\u6d41\u884c\u6027\u611f\u5192\u76e3\u6e2c\u63aa\u65bd\uff0c\u5206\u4e8c\u968e\u6bb5\u5be6\u65bd\uff0c\u7b2c\u4e00\u968e\u6bb5\u5be6\u65bd\u6642\u9593\u81ea 111\u5e74 10 \u6708 01 \u65e5\u81f3 111 \u5e74 12 \u6708 31 \u65e5\u6b62\uff0c\u7b2c\u4e8c\u968e\u6bb5\u5be6\u65bd\u6642\u9593\u81ea112 \u5e74 01 \u6708 01 \u65e5\u81f3 112 \u5e74 03 \u6708 31 \u65e5\u6b62\uff0c\u91dd\u5c0d\u672c\u7e23\u8f44\u5167\u9ad8\u98a8\u96aa\u5340\uff08H5\u3001H7\u4e9e\u578b\u79bd\u6d41\u611f\u9632\u6cbb\u63aa\u65bd\u7a3d\u67e5\u5217\u7ba1\u5834\u8207\u7406\u8ca8\u5834\u53ca\u524d2\u5e74\u79bd\u6d41\u611f\u6848\u4f8b\u5834\u7b49\u71b1\u5340\u512a\u5148\uff09\u8fa6\u7406\u63a1\u6a23\u76e3\u6e2c\u5de5\u4f5c\uff0c\u7b2c\u4e00\u968e\u6bb5\u65bc\u5be6\u65bd\u7bc4\u570d\u5167\u63a1\u6a23\u9678\u79bd30\u5834\u53ca\u6c34\u79bd42\u5834\uff0c\u7b2c\u4e8c\u968e\u6bb5\u65bc\u5be6\u65bd\u7bc4\u570d\u5167\u63a1\u6a23\u9678\u79bd12\u5834\u53ca\u6c34\u79bd32\u5834\u3002"},{"q":"\u6c11\u773e\u53bb\u8cde\u9ce5\u6216\u9935\u9d3f\u5b50\u6703\u611f\u67d3\u5230\u79bd\u6d41\u611f\u55ce\uff1f","a":"\u76ee\u524d\u570b\u5167\u767c\u751f\u7684H5N5\u3001H5N6\u3001H5N8\u53ca\u6700\u8fd1\u767c\u751f\u4e4bH5N2\u3001H5N1\u79bd\u6d41\u611f\u75c5\u6bd2\uff0c\u9664H5N1\u3001H5N6\u8207H5N8\u5206\u5225\u5728\u5370\u5ea6\u3001\u82f1\u570b\u3001\u7f8e\u570b\u3001\u4e2d\u570b\u5927\u9678\u53ca\u4fc4\u7f85\u65af\u9020\u6210\u5c11\u6578\u4eba\u985e\u611f\u67d3\u5916\uff0c\u6c92\u6709\u8b49\u64da\u986f\u793a\u6703\u9020\u6210\u4eba\u985e\u5927\u898f\u6a21\u611f\u67d3\uff0c\u986f\u793a\u6b63\u5e38\u60c5\u5f62\u4e0b\uff0c\u4e0d\u523b\u610f\u63a5\u89f8\u9ce5\u985e\u611f\u67d3\u79bd\u6d41\u611f\u4e4b\u98a8\u96aa\u6975\u4f4e\uff0c\u4f46\u70ba\u964d\u4f4e\u98a8\u96aa\uff0c\u9084\u662f\u61c9\u907f\u514d\u89aa\u5bc6\u63a5\u89f8\u79bd\u9ce5\u5982\u9935\u98df\u9d3f\u5b50\u6216\u5176\u4ed6\u79bd\u9ce5\u3002\u82e5\u4e0d\u614e\u78b0\u89f8\u6216\u8863\u7269\u6cbe\u5230\u9ce5\u7cde\uff0c\u61c9\u7acb\u5373\u7528\u80a5\u7682\u6f88\u5e95\u6e05\u6d17\u3002\u5efa\u8b70\u82e5\u6709\u91ce\u5916\u8cde\u9ce5\u884c\u7a0b\u6642\uff0c\u63a1\u9060\u8ddd\u96e2\u4ee5\u671b\u9060\u93e1\u8cde\u9ce5\uff0c\u6e1b\u5c11\u8207\u79bd\u9ce5\u63a5\u89f8\u6a5f\u6703\uff0c\u4e5f\u907f\u514d\u5e72\u64fe\u79bd\u9ce5\u751f\u6d3b\u3002"},{"q":"\u4e00\u822c\u6c11\u773e\u8981\u5982\u4f55\u9810\u9632\u79bd\u6d41\u611f\uff1f","a":"\u4e00\u822c\u6c11\u773e\u9700\u914d\u5408\u4ee5\u4e0b\u4e8b\u9805\u5c31\u53ef\u907f\u514d\u611f\u67d3\u7684\u98a8\u96aa:\n1.\u79bd\u8089\u86cb\u985e\u8981\u300c\u5145\u5206\u716e\u719f\u300d\u624d\u98df\u7528\u3002\n2.\u8981\u7d93\u5e38\u7528\u80a5\u7682\u6d17\u624b\u3002\n3.\u4e0d\u63a5\u89f8\u3001\u9935\u98fc\u79bd\u9ce5\u3002\n4.\u4e0d\u8cfc\u8cb7\u4f86\u8def\u4e0d\u660e\u79bd\u9ce5\u53ca\u7522\u54c1\u3002\n5.\u4e0d\u81ea\u884c\u5bb0\u6bba\u79bd\u9ce5\u98df\u7528\u3002\n6.\u4e0d\u53bb\u990a\u79bd\u5834\u53ca\u5c60\u5bb0\u5834\u3002\n7.\u6709\u611f\u5192\u5fb5\u5019\uff0c\u61c9\u7acb\u5373\u6234\u53e3\u7f69\u5118\u901f\u5c31\u91ab\u3002"},{"q":"\u5bb6\u88e1\u5982\u679c\u6709\u990a\u5bf5\u7269\u79bd\u9ce5\uff0c\u8981\u6ce8\u610f\u4ec0\u9ebc\uff1f","a":"\u5bb6\u88e1\u6709\u990a\u5bf5\u7269\u79bd\u9ce5\u7684\u670b\u53cb\uff0c\u61c9\u907f\u514d\u8b93\u60a8\u7684\u5bf5\u7269\u79bd\u9ce5\u8207\u91ce\u9ce5\u63a5\u89f8\uff0c\u6e05\u7406\u5176\u6392\u6cc4\u7269\u6642\u5b9c\u6234\u53e3\u7f69\u53ca\u81a0\u8cea\u624b\u5957\uff0c\u6e05\u7406\u5b8c\u7562\u61c9\u7528\u80a5\u7682\u6d17\u6de8\u96d9\u624b\uff1b\u5982\u5bf5\u7269\u79bd\u9ce5\u6b7b\u4ea1\u9700\u4ee5\u4e00\u822c\u5ee2\u68c4\u7269\u6a19\u6e96\u8655\u7406\uff0c\u5343\u842c\u4e0d\u8981\u4efb\u610f\u68c4\u7f6e\u3002"}]},{"name":"\u975e\u6d32\u8c6c\u761f","items":[{"q":"\u611f\u67d3\u975e\u6d32\u8c6c\u761f\u7684\u8c6c\u96bb\u6703\u767c\u751f\u4ec0\u9ebc\u75c7\u72c0\uff1f\u5982\u4f55\u770b\u51fa\u8c6c\u96bb\u5df2\u88ab\u50b3\u67d3\uff1f","a":"1.\t\u767c\u75c5\u8c6c\u96bb\uff0c\u7279\u5fb5\u70ba\u767c\u9ad8\u71b1\u53ca\u76ae\u819a\u5448\u73fe\u7d2b\u6591\u9ede\uff0c\u5168\u8eab\u5167\u81df\u7684\u51fa\u8840\uff0c\u5c24\u4ee5\u6dcb\u5df4\u7d50\uff0c\u814e\u81df\u548c\u8178\u7c98\u819c\u6700\u660e\u986f\u3002\n2.\t\u75c5\u7a0b\u5206\u751a\u6025\u3001\u6025\u3001\u4e9e\u6025\u8207\u6162\u6027\u7b49\u56db\u7a2e\u3002\u751a\u6025\u6027\uff1a\u767c\u71d2\u3001\u7a81\u7136\u6b7b\u4ea1\uff0c\u7121\u5176\u4ed6\u75c7\u72c0\u3002\u6025\u6027\uff1a\u9ad8\u71d2\u3001\u98df\u617e\u5c1a\u6709\u3001\u6b7b\u4ea1\u524d\u98df\u617e\u5ee2\u7d55\u3001\u547c\u5438\u5feb\u3001\u7cbe\u795e\u4e0d\u826f\u3001\u56db\u80a2\u3001\u8033\u3001\u76ae\u819a\u767c\u7d3a\u3001\u5614\u5410\u3001\u4e0b\u75e2\u3001\u6b7b\u4ea1\uff0c\u70ba\u671f7\u5929\u3002\u4e9e\u6025\u6027\uff1a\u767c\u71d2\uff0c3-4\u661f\u671f\u3002\u6162\u6027\uff1a\u75c5\u72c0\u4e0d\u660e\u986f\uff0c\u6301\u7e8c\u6578\u6708\u3002"},{"q":"\u5982\u679c\u5728\u8cfc\u7269\u7db2\u7ad9\u8cb7\u6771\u897f\uff0c\u6536\u570b\u5916\u75ab\u5340\u8089\u88fd\u54c1\u8d08\u54c1\u8a72\u600e\u9ebc\u505a\uff1f","a":"\u6c11\u773e\u5982\u6301\u6709\u4f86\u6e90\u4e0d\u660e\u8089\u54c1\uff0c\u61c9\u9001\u4ea4\u884c\u653f\u9662\u8fb2\u696d\u59d4\u54e1\u6703\u52d5\u690d\u7269\u9632\u75ab\u6aa2\u75ab\u5c40\u5404\u5206\u5c40\u8655\u7406"},{"q":"\u6c11\u773e\u8a72\u5982\u4f55\u9632\u7bc4\u975e\u6d32\u8c6c\u761f\u5165\u4fb5\u8207\u914d\u5408\u653f\u5e9c\u653f\u7b56?","a":"\u6c11\u773e\u6216\u662f\u65c5\u5ba2\u5e38\u56e0\u597d\u5947\uff0c\u6216\u662f\u81ea\u4e2d\u570b\u5927\u9678\u7b49\u975e\u6d32\u8c6c\u761f\u75ab\u5340\u570b\u5bb6\u651c\u5e36\u5bb6\u755c\u8089\u985e\u7522\u54c1\u3001\u4f34\u624b\u79ae\u5165\u5883\u8207\u89aa\u670b\u597d\u53cb\u5206\u4eab\u3002\u518d\u6b21\u547c\u7c72\u70ba\u9632\u7bc4\u75ab\u75c5\u5165\u4fb5\uff0c\u8acb\u51fa\u5165\u5883\u65c5\u5ba2\u52ff\u651c\u5e36\u5bb6\u755c\u8089\u985e\u7522\u54c1\u3001\u542b\u8089\u88fd\u54c1\u4e4b\u4f34\u624b\u79ae\u5165\u5883\uff0c\u4ee5\u514d\u53d7\u7f70\uff0c\u5171\u540c\u7dad\u8b77\u6211\u570b\u8fb2\u755c\u7522\u696d\u751f\u7522\u5b89\u5168"},{"q":"\u570b\u4eba\u6216\u5916\u7c4d\u914d\u5076(\u79fb\u5de5)\u5230\u975e\u6d32\u8c6c\u761f\u75ab\u5340\u570b\u5bb6\u61c9\u6ce8\u610f\u90a3\u4e9b\u4e8b\u9805\uff1f","a":"\u907f\u514d\u755c\u7267\u5834\u53c3\u89c0\u8a2a\u5 var COLORS={'桃園':'#E8763A','南投':'#4CAF7D','嘉義':'#E8A03A','彰化':'#5B8FD4'};

function E(id){return document.getElementById(id);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function linkify(s){return s.replace(/(https?:\/\/)([^\s<>"&]*)(&amp;[^\s<>"]*)?/g,function(_,a,b,c){var u=(a+b+(c||'')).replace(/&amp;/g,'&');return '<a class="a-link" href="'+u+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+(a+b+(c||''))+'</a>';});}
function hl(t,q){var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return t.replace(re,'<mark>$1</mark>');}
function toast(m){var t=E('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2500);}
function clone(o){return JSON.parse(JSON.stringify(o));}
function saveDB(){try{localStorage.setItem('qadb',JSON.stringify(db));localStorage.setItem('qadbv',VER);}catch(e){toast('⚠ 儲存失敗');}}
function loadDB(){try{if(localStorage.getItem('qadbv')===VER){var s=localStorage.getItem('qadb');if(s){var p=JSON.parse(s);if(p&&p['桃園'])return p;}}}catch(e){}return clone(INIT);}
function chgSz(d){fSize=Math.max(12,Math.min(20,fSize+d));localStorage.setItem('fs',fSize);document.body.style.fontSize=fSize+'px';}

function init(){
  city='桃園';adminMode=false;pImgs=[];editCtx=null;
  fSize=parseInt(localStorage.getItem('fs')||'14');
  document.body.style.fontSize=fSize+'px';
  db=loadDB();
  try{mqData=JSON.parse(localStorage.getItem('mq')||'[]');}catch(e){mqData=[];}
  if(!mqData.length)mqData=[{scope:'all',text:'歡迎使用 1959 動保知識庫！提供桃園、南投、嘉義、彰化四縣市動物保護資訊查詢。'}];
  try{pins=JSON.parse(localStorage.getItem('pins')||'[]');}catch(e){pins=[];}
  try{recents=JSON.parse(localStorage.getItem('recs')||'[]');}catch(e){recents=[];}
  try{cases=JSON.parse(localStorage.getItem('cases')||'[]');}catch(e){cases=[];}
  renderMQ();renderTabs();renderSB();renderContent();renderPins();renderRecs();
}

function renderMQ(){
  var el=E('mqSec');
  var rows=mqData.filter(function(m){return m.text.trim();});
  if(!rows.length){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=rows.map(function(m){
    var lbl=m.scope==='all'?'📢 全站':('📌 '+m.scope);
    var bg=m.scope==='all'?'#4A5568':COLORS[m.scope];
    return '<div class="mq-row"><span class="mq-lbl" style="background:'+bg+'">'+lbl+'</span><div class="mq-track"><div class="mq-txt">'+esc(m.text)+'</div></div></div>';
  }).join('');
}

function renderTabs(){
  E('cityTabs').innerHTML=CITIES.map(function(c){
    var a=c===city?' active':'';
    return '<button class="c-tab'+a+'" onclick="switchCity(\''+c+'\')" style="'+(c===city?'color:'+COLORS[c]+';':'')+'">'
      +'<span class="c-dot" style="background:'+COLORS[c]+'"></span>'+c+'</button>';
  }).join('');
}
function switchCity(c){city=c;E('srchInput').value='';E('srchPanel').style.display='none';E('mainLayout').style.display='flex';E('cityTabs').style.display='flex';renderTabs();renderSB();renderContent();}

function renderSB(){
  var sb=E('sidebar');var color=COLORS[city];
  sb.style.setProperty('--city-color',color);
  var topics=db[city].topics;
  var h='<div class="sb-head"><span>主題大綱</span><button class="sb-add" id="sbAdd" onclick="sbAddTopic()" style="display:'+(adminMode?'block':'none')+'">＋</button></div>';
  topics.forEach(function(t,i){
    h+='<div class="sb-item" id="sbi'+i+'" onclick="sbClick('+i+')">'
      +'<span class="sb-lbl">'+esc(t.name)+'</span><span class="sb-cnt">'+t.items.length+'</span>'
      +'<span class="sb-acts" id="sbact'+i+'" style="display:'+(adminMode?'flex':'none')+'">'
      +'<button class="sb-eb" onclick="event.stopPropagation();sbRename('+i+')">✏</button>'
      +'<button class="sb-db" onclick="event.stopPropagation();sbDel('+i+')">🗑</button></span></div>';
  });
  sb.innerHTML=h;
  if(topics.length)document.getElementById('sbi0').classList.add('act');
}
function sbClick(idx){document.querySelectorAll('.sb-item').forEach(function(el,i){el.classList.toggle('act',i===idx);});var el=E('topic'+idx);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});var b=E('tbody'+idx);if(b&&!b.classList.contains('open'))togTopic(idx);}
function sbAddTopic(){var n=prompt('請輸入新主題名稱：');if(!n||!n.trim())return;db[city].topics.push({name:n.trim(),items:[]});saveDB();renderSB();renderContent();toast('✅ 主題已新增');}
function sbRename(i){var o=db[city].topics[i].name;var n=prompt('修改主題名稱：',o);if(!n||n===o)return;db[city].topics[i].name=n.trim();saveDB();renderSB();renderContent();toast('✅ 已更新');}
function sbDel(i){var t=db[city].topics[i];if(!confirm('刪除「'+t.name+'」？'))return;db[city].topics.splice(i,1);saveDB();renderSB();renderContent();toast('🗑 已刪除');}

function renderContent(){
  var color=COLORS[city];var topics=db[city].topics;
  var total=topics.reduce(function(s,t){return s+t.items.length;},0);
  var h='<div class="sec-hdr"><div class="sec-ttl" style="color:'+color+'">📍 '+city+' 動物保護</div>'
    +'<span class="badge" style="background:'+color+'">'+total+' 筆資料</span></div>';
  topics.forEach(function(topic,ti){
    h+='<div class="topic" id="topic'+ti+'" style="--city-color:'+color+'">'
      +'<div class="t-hdr" style="background:'+color+'" onclick="togTopic('+ti+')">'
      +'<span class="t-ttl">'+esc(topic.name)+'</span>'
      +'<button class="t-addqa" id="tadd'+ti+'" style="display:'+(adminMode?'inline-flex':'none')+'" onclick="event.stopPropagation();openAddQa('+ti+')">＋ 新增Q&A</button>'
      +'<span class="t-chev open" id="tchev'+ti+'">▾</span></div>'
      +'<div class="t-body open" id="tbody'+ti+'">';
    topic.items.forEach(function(item,ii){
      var hasDet=item.a||item.url||(item.imgs&&item.imgs.length);
      if(hasDet){
        var aH=item.a?linkify(esc(item.a)):'';
        var uH=item.url?'<a class="url-chip a-link" href="'+esc(item.url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 '+esc(item.url)+'</a>':'';
        var iH=(item.imgs&&item.imgs.length)?'<div class="img-wrap">'+item.imgs.map(function(s,si){return '<img src="'+s+'" onclick="openLb('+ti+','+ii+','+si+')" alt="附圖">';}).join('')+'</div>':'';
        var cB=item.a?'<button class="copy-btn" onclick="event.stopPropagation();cpTxt('+ti+','+ii+')">📋 複製回答</button>':'';
        var adm=adminMode?'<div class="qa-acts" style="display:flex">'
          +'<button class="qa-pb" onclick="event.stopPropagation();togPin('+ti+','+ii+')">📌</button>'
          +'<button class="eb" onclick="event.stopPropagation();openEdit('+ti+','+ii+')">✏ 編輯</button>'
          +'<button class="db" onclick="event.stopPropagation();delQa('+ti+','+ii+')">🗑</button></div>':'';
        h+='<div class="qa-card"><div class="qa-q" onclick="togQA('+ti+','+ii+')">'
          +'<div class="q-icon">Q</div><div class="q-txt">'+linkify(esc(item.q))+'</div>'
          +adm+'<span class="q-chev" id="chev'+ti+'_'+ii+'">▾</span></div>'
          +'<div class="qa-a" id="qaa'+ti+'_'+ii+'">'+(aH?'<div class="a-txt">'+aH+'</div>':'')+cB+uH+iH+'</div></div>';
      }else{
        var adm2=adminMode?'<span style="float:right;display:inline-flex;gap:3px;margin-left:7px">'
          +'<button class="eb btn-sm" onclick="event.stopPropagation();openEdit('+ti+','+ii+')">✏</button>'
          +'<button class="db btn-sm" onclick="event.stopPropagation();delQa('+ti+','+ii+')">🗑</button></span>':'';
        h+='<div class="info-card">'+adm2+linkify(esc(item.q))+'</div>';
      }
    });
    h+='</div></div>';
  });
  E('content').innerHTML=h;
}
function togTopic(i){E('tbody'+i).classList.toggle('open');E('tchev'+i).classList.toggle('open');}
function togQA(ti,ii){var a=E('qaa'+ti+'_'+ii);var c=E('chev'+ti+'_'+ii);a.classList.toggle('open');c.classList.toggle('open');if(a.classList.contains('open')){addRec(city,ti,ii,db[city].topics[ti].items[ii].q);}}
function cpTxt(ti,ii){var t=db[city].topics[ti].items[ii].a||'';if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){toast('📋 已複製');});}else{var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 已複製');}}
function openLb(ti,ii,si){E('lbImg').src=db[city].topics[ti].items[ii].imgs[si];E('lb').classList.add('open');}
function closeLb(){E('lb').classList.remove('open');}

function togPin(ti,ii){var key=city+'|'+ti+'|'+ii;var idx=pins.findIndex(function(p){return p.k===key;});var item=db[city].topics[ti].items[ii];if(idx>=0){pins.splice(idx,1);toast('📌 已取消書籤');}else{pins.push({k:key,city:city,ti:ti,ii:ii,q:item.q.substring(0,28)});toast('📌 已加入書籤');}localStorage.setItem('pins',JSON.stringify(pins));renderPins();}
function renderPins(){var bar=E('pinBar');var ch=E('pinChips');if(!pins.length){bar.style.display='none';return;}bar.style.display='flex';ch.innerHTML=pins.map(function(p){return '<span class="pin-chip" onclick="gotoRes(\''+p.city+'\','+p.ti+','+p.ii+')">'+esc(p.q)+' <span onclick="event.stopPropagation();rmPin(\''+p.k+'\')" style="opacity:.5;font-size:10px">✕</span></span>';}).join('');}
function rmPin(k){pins=pins.filter(function(p){return p.k!==k;});localStorage.setItem('pins',JSON.stringify(pins));renderPins();}
function addRec(c,ti,ii,q){var k=c+'|'+ti+'|'+ii;recents=recents.filter(function(r){return r.k!==k;});recents.unshift({k:k,city:c,ti:ti,ii:ii,q:q.substring(0,24)});if(recents.length>5)recents.pop();localStorage.setItem('recs',JSON.stringify(recents));renderRecs();}
function renderRecs(){var bar=E('recBar');var ch=E('recChips');if(!recents.length){bar.style.display='none';return;}bar.style.display='flex';ch.innerHTML=recents.map(function(r){return '<span class="rec-chip" onclick="gotoRes(\''+r.city+'\','+r.ti+','+r.ii+')">'+esc(r.q)+'</span>';}).join('');}

function doSearch(q){
  q=q.trim();if(!q){E('srchPanel').style.display='none';E('mainLayout').style.display='flex';E('cityTabs').style.display='flex';return;}
  E('mainLayout').style.display='none';E('srchPanel').style.display='block';E('cityTabs').style.display='none';
  var ql=q.toLowerCase();var hits=[];
  CITIES.forEach(function(c){db[c].topics.forEach(function(t,ti){t.items.forEach(function(item,ii){if((item.q&&item.q.toLowerCase().indexOf(ql)>=0)||(item.a&&item.a.toLowerCase().indexOf(ql)>=0)||(item.url&&item.url.toLowerCase().indexOf(ql)>=0))hits.push({c:c,t:t.name,ti:ti,ii:ii,item:item});});});});
  if(!hits.length){E('srchPanel').innerHTML='<div class="no-res">🔍 未找到「'+esc(q)+'」的相關資料</div>';return;}
  var h='<div class="sec-hdr"><div class="sec-ttl">搜尋「'+esc(q)+'」（'+hits.length+' 筆）</div></div>';
  hits.forEach(function(hit){var col=COLORS[hit.c];h+='<div class="hit" onclick="gotoRes(\''+hit.c+'\','+hit.ti+','+hit.ii+')">'+'<div class="hit-meta"><span class="hit-city" style="background:'+col+'">'+hit.c+'</span>› '+esc(hit.t)+'</div>'+'<div class="hit-q">'+hl(esc(hit.item.q),q)+'</div>'+(hit.item.a?'<div class="hit-a">'+hl(esc(hit.item.a.substring(0,130)),q)+(hit.item.a.length>130?'…':'')+'</div>':'')+(hit.item.url?'<div style="font-size:11px;color:'+col+';margin-top:3px">🔗 '+esc(hit.item.url)+'</div>':'')+'</div>';});
  E('srchPanel').innerHTML=h;
}
function gotoRes(c,ti,ii){E('srchInput').value='';E('srchPanel').style.display='none';E('mainLayout').style.display='flex';E('cityTabs').style.display='flex';if(c!==city)switchCity(c);else{renderTabs();renderSB();renderContent();}setTimeout(function(){var el=E('topic'+ti);if(el)el.scrollIntoView({behavior:'smooth'});var b=E('tbody'+ti);if(b&&!b.classList.contains('open'))togTopic(ti);var a=E('qaa'+ti+'_'+ii);if(a&&!a.classList.contains('open'))togQA(ti,ii);},120);}

function showView(v){E('nKB').classList.toggle('active',v==='kb');E('nCase').classList.toggle('active',v==='case');E('mainLayout').style.display=v==='kb'?'flex':'none';E('cityTabs').style.display=v==='kb'?'flex':'none';E('srchPanel').style.display='none';E('casePanel').style.display=v==='case'?'block':'none';if(v==='case')renderCases();}

function renderCases(){
  var pad=function(n){return String(n).padStart(2,'0');};
  var now=new Date();var dt=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+'T'+pad(now.getHours())+':'+pad(now.getMinutes());
  var h='<div class="sec-hdr"><div class="sec-ttl">📋 案件通報記錄</div><div style="display:flex;gap:7px"><button class="btn btn-out btn-sm" onclick="expCases()">⬇ 匯出 CSV</button><button class="btn btn-red btn-sm" onclick="clearCases()">清除全部</button></div></div>'
    +'<div class="c-form"><h3>＋ 新增案件記錄</h3>'
    +'<div class="c-grid"><div class="fg"><label>通報時間</label><input type="datetime-local" id="cTime" value="'+dt+'"></div>'
    +'<div class="fg"><label>縣市</label><select id="cCity"><option>桃園</option><option>南投</option><option>嘉義</option><option>彰化</option></select></div></div>'
    +'<div class="c-grid3"><div class="fg"><label>案件類型</label><select id="cType"><option>動物救援</option><option>陳情案件</option><option>一般諮詢</option><option>寵物登記</option><option>路殺通報</option><option>其他</option></select></div>'
    +'<div class="fg"><label>通報人姓名</label><input type="text" id="cName" placeholder="姓名"></div>'
    +'<div class="fg"><label>通報人電話</label><input type="tel" id="cPhone" placeholder="電話"></div></div>'
    +'<div class="fg"><label>事發地址</label><input type="text" id="cAddr" placeholder="詳細地址"></div>'
    +'<div class="fg"><label>案件說明</label><textarea id="cDesc" placeholder="詳述案件情形（動物種類、狀況、需求…）"></textarea></div>'
    +'<div class="c-grid"><div class="fg"><label>處理狀態</label><select id="cStatus"><option value="open">待處理</option><option value="pending">處理中</option><option value="done">已完成</option></select></div>'
    +'<div class="fg"><label>備註</label><input type="text" id="cNote" placeholder="備註事項"></div></div>'
    +'<div style="text-align:right;margin-top:6px"><button class="btn btn-grn" onclick="addCase()">📋 新增記錄</button></div></div>'
    +'<div class="c-tbl-wrap"><table class="c-tbl"><thead><tr><th>時間</th><th>縣市</th><th>類型</th><th>通報人</th><th>地址</th><th>說明</th><th>狀態</th><th></th></tr></thead><tbody>';
  if(!cases.length){h+='<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:22px">尚無案件記錄</td></tr>';}
  else{cases.slice().reverse().forEach(function(c,i){var ri=cases.length-1-i;var sc=c.status==='done'?'s-done':c.status==='pending'?'s-pend':'s-open';h+='<tr><td style="white-space:nowrap;font-size:11px">'+esc(c.time||'')+'</td><td><span style="color:'+COLORS[c.city]+';font-weight:700">'+esc(c.city||'')+'</span></td><td>'+esc(c.type||'')+'</td><td>'+esc(c.name||'')+' '+esc(c.phone||'')+'</td><td style="font-size:11px">'+esc(c.addr||'')+'</td><td style="font-size:11px;max-width:160px">'+esc((c.desc||'').substring(0,50))+(c.desc&&c.desc.length>50?'…':'')+'</td><td><select class="'+sc+'" onchange="updStatus('+ri+',this.value)"><option value="open"'+(c.status==='open'?' selected':'')+'>待處理</option><option value="pending"'+(c.status==='pending'?' selected':'')+'>處理中</option><option value="done"'+(c.status==='done'?' selected':'')+'>已完成</option></select></td><td><button class="c-del" onclick="delCase('+ri+')">🗑</button></td></tr>';});}
  h+='</tbody></table></div>';E('casePanel').innerHTML=h;
}
function addCase(){var t=E('cTime').value;cases.push({time:t?t.replace('T',' '):new Date().toLocaleString('zh-TW'),city:E('cCity').value,type:E('cType').value,name:E('cName').value.trim(),phone:E('cPhone').value.trim(),addr:E('cAddr').value.trim(),desc:E('cDesc').value.trim(),status:E('cStatus').value,note:E('cNote').value.trim()});localStorage.setItem('cases',JSON.stringify(cases));renderCases();toast('✅ 案件已新增');}
function updStatus(i,v){cases[i].status=v;localStorage.setItem('cases',JSON.stringify(cases));toast('✅ 狀態已更新');}
function delCase(i){if(!confirm('確定刪除？'))return;cases.splice(i,1);localStorage.setItem('cases',JSON.stringify(cases));renderCases();toast('🗑 已刪除');}
function clearCases(){if(!confirm('確定清除所有案件記錄？'))return;cases=[];localStorage.setItem('cases',JSON.stringify(cases));renderCases();toast('🗑 已清除');}
function expCases(){if(!cases.length){toast('⚠ 無案件記錄');return;}var hdr=['時間','縣市','類型','通報人','電話','地址','說明','狀態','備註'];var rows=cases.map(function(c){return[c.time,c.city,c.type,c.name,c.phone,c.addr,c.desc,c.status==='done'?'已完成':c.status==='pending'?'處理中':'待處理',c.note].map(function(v){return'"'+(v||'').replace(/"/g,'""')+'"';}).join(',');});var csv='\uFEFF'+hdr.join(',')+'\n'+rows.join('\n');dlFile(csv,'案件記錄_'+new Date().toLocaleDateString('zh-TW')+'.csv','text/csv');}

function clickAdmin(){if(!adminMode){E('loginOv').classList.add('open');setTimeout(function(){E('loginPw').focus();},80);}else openAdmin();}
function closeLogin(){E('loginOv').classList.remove('open');E('loginPw').value='';E('loginErr').style.display='none';}
function doLogin(){if(E('loginPw').value==='1959'){adminMode=true;closeLogin();openAdmin();E('adminBtn').textContent='⚙ 後台(編輯中)';E('adminBtn').style.cssText='background:#FFFBEB;border-color:#F6E05E;';renderSB();renderContent();toast('✅ 已進入編輯模式');}else{E('loginErr').style.display='block';E('loginPw').value='';E('loginPw').focus();}}
function openAdmin(){renderMqEds();E('admCity').value=city;E('adminOv').classList.add('open');}
function closeAdmin(){E('adminOv').classList.remove('open');}
function saveAdmin(){mqData=[];document.querySelectorAll('.mq-row2').forEach(function(r){var s=r.querySelector('select').value;var t=r.querySelector('input').value.trim();if(t)mqData.push({scope:s,text:t});});localStorage.setItem('mq',JSON.stringify(mqData));renderMQ();closeAdmin();toast('✅ 設定已儲存');}
function doLogout(){if(!confirm('確定登出？'))return;adminMode=false;closeAdmin();E('adminBtn').textContent='⚙ 後台';E('adminBtn').style.cssText='';renderSB();renderContent();toast('👋 已登出後台');}
function renderMqEds(){var c=E('mqEds');c.innerHTML='';(mqData.length?mqData:[{scope:'all',text:''}]).forEach(function(m){addMqRow(m.scope,m.text);});}
function addMqEd(){if(document.querySelectorAll('.mq-row2').length>=3){toast('⚠ 最多3條');return;}addMqRow('all','');}
function addMqRow(scope,text){var c=E('mqEds');if(c.children.length>=3){toast('⚠ 最多3條');return;}var d=document.createElement('div');d.className='mq-row2';var opts=CITIES.map(function(ci){return '<option value="'+ci+'"'+(scope===ci?' selected':'')+'>'+ci+'</option>';}).join('');d.innerHTML='<select><option value="all"'+(scope==='all'?' selected':'')+'>全站</option>'+opts+'</select><input type="text" placeholder="公告文字" value="'+esc(text||'')+'"><button class="mq-del" onclick="this.parentElement.remove()">✕</button>';c.appendChild(d);}
function addTopic(){var c=E('admCity').value;var n=E('newTopicInp').value.trim();if(!n){toast('⚠ 請輸入主題名稱');return;}db[c].topics.push({name:n,items:[]});saveDB();E('newTopicInp').value='';if(c===city){renderSB();renderContent();}toast('✅ 主題已新增');}
function exportDB(){dlFile(JSON.stringify(db,null,2),'動保知識庫_'+new Date().toLocaleDateString('zh-TW')+'.json','application/json');toast('✅ 備份已下載');}
function importDB(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var p=JSON.parse(e.target.result);if(!p['桃園'])throw new Error('格式不符');db=p;saveDB();renderSB();renderContent();toast('✅ 資料已匯入');}catch(er){toast('⚠ 匯入失敗:'+er.message);}};r.readAsText(f);inp.value='';}
function dlFile(content,name,type){var b=new Blob([content],{type:type});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}
function openAddQa(ti){editCtx=null;pImgs=[];E('qaTitle').textContent='➕ 新增 Q&A';E('qaCity').value=city;updQaTopic(ti);E('qaQ').value='';E('qaA').value='';E('qaUrl').value='';E('imgPrev').innerHTML='';E('qaOv').classList.add('open');}
function openEdit(ti,ii){var item=db[city].topics[ti].items[ii];editCtx={city:city,ti:ti,ii:ii};pImgs=(item.imgs||[]).slice();E('qaTitle').textContent='✏ 編輯 Q&A';E('qaCity').value=city;updQaTopic(ti);E('qaQ').value=item.q||'';E('qaA').value=item.a||'';E('qaUrl').value=item.url||'';renderImgPrev();E('qaOv').classList.add('open');}
function updQaTopic(sel){var c=E('qaCity').value;E('qaTopic').innerHTML=db[c].topics.map(function(t,i){return '<option value="'+i+'"'+(i===sel?' selected':'')+'>'+esc(t.name)+'</option>';}).join('');}
function closeQa(){E('qaOv').classList.remove('open');editCtx=null;pImgs=[];}
function saveQa(){var c=E('qaCity').value;var ti=parseInt(E('qaTopic').value);var q=E('qaQ').value.trim();var a=E('qaA').value.trim();var url=E('qaUrl').value.trim();if(!q){toast('⚠ 請輸入問題');return;}var item={q:q};if(a)item.a=a;if(url)item.url=url;if(pImgs.length)item.imgs=pImgs;if(editCtx&&editCtx.ii>=0)db[c].topics[ti].items[editCtx.ii]=item;else db[c].topics[ti].items.push(item);saveDB();closeQa();if(c===city){renderSB();renderContent();}toast('✅ 已儲存');}
function delQa(ti,ii){if(!confirm('確定刪除？'))return;db[city].topics[ti].items.splice(ii,1);saveDB();renderSB();renderContent();toast('🗑 已刪除');}
function handleImgs(inp){Array.from(inp.files).forEach(function(f){var r=new FileReader();r.onload=function(e){pImgs.push(e.target.result);renderImgPrev();};r.readAsDataURL(f);});inp.value='';}
function renderImgPrev(){E('imgPrev').innerHTML=pImgs.map(function(s){return '<img src="'+s+'" onclick="E(\'lbImg\').src=this.src;E(\'lb\').classList.add(\'open\')" alt="">';}).join('');}
document.addEventListener('click',function(e){if(e.target.classList.contains('a-link'))e.stopPropagation();});
init();
</script>
</body>
</html>
