<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1959 動物保護專線 知識庫</title>
<style>
  :root {
    --taoyuan: #E8763A;
    --nantou: #4CAF7D;
    --chiayi: #E8A03A;
    --changhua: #5B8FD4;
    --bg: #F5F7FA;
    --card-bg: #FFFFFF;
    --text: #2D3748;
    --text-light: #718096;
    --border: #E2E8F0;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 14px;
    --accent: #4CAF7D;
    --marquee-bg: #2D3748;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* MARQUEE */
  .marquee-section {
    background: var(--marquee-bg);
    color: #fff;
    padding: 0;
    overflow: hidden;
    position: relative;
  }
  .marquee-row {
    display: flex;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    height: 36px;
  }
  .marquee-row:last-child { border-bottom: none; }
  .marquee-label {
    flex-shrink: 0;
    padding: 0 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: rgba(255,255,255,0.1);
    height: 100%;
    display: flex;
    align-items: center;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.15);
  }
  .marquee-track {
    overflow: hidden;
    flex: 1;
    height: 100%;
    display: flex;
    align-items: center;
  }
  .marquee-content {
    white-space: nowrap;
    display: inline-block;
    animation: scroll-left 30s linear infinite;
    font-size: 13px;
    font-weight: 500;
    padding-left: 20px;
  }
  .marquee-content:empty::after { content: "（目前無公告）"; opacity: 0.5; }
  .marquee-row:hover .marquee-content { animation-play-state: paused; }
  @keyframes scroll-left {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }

  /* HEADER */
  header {
    background: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #4CAF7D, #45A077);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .header-title h1 {
    font-size: 18px; font-weight: 800; color: var(--text);
    line-height: 1.2;
  }
  .header-title p {
    font-size: 12px; color: var(--text-light); margin-top: 2px;
  }
  .search-bar {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    gap: 8px;
    flex: 1;
    max-width: 420px;
    transition: border-color 0.2s;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar input {
    border: none; background: none; outline: none;
    font-size: 14px; font-weight: 500; width: 100%;
    color: var(--text);
  }
  .search-bar input::placeholder { color: var(--text-light); }
  .search-icon { color: var(--text-light); font-size: 16px; }
  .header-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-admin {
    background: var(--text);
    color: #fff;
  }
  .btn-admin:hover { background: #1A202C; transform: translateY(-1px); }
  .btn-settings {
    background: var(--bg);
    color: var(--text);
    border: 2px solid var(--border);
  }
  .btn-settings:hover { border-color: var(--accent); color: var(--accent); }

  /* CITY TABS */
  .city-tabs {
    display: flex;
    gap: 8px;
    padding: 16px 24px 0;
    background: #fff;
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
  }
  .city-tab {
    padding: 10px 22px;
    border-radius: 12px 12px 0 0;
    border: none;
    background: var(--bg);
    color: var(--text-light);
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
    bottom: -2px;
  }
  .city-tab:hover { background: #EDF2F7; color: var(--text); }
  .city-tab.active {
    background: #fff;
    color: var(--city-color, #333);
    border: 2px solid var(--border);
    border-bottom: 2px solid #fff;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
  }
  .city-tab-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    background: currentColor;
    opacity: 0.7;
  }
  .city-tab.active .city-tab-dot { opacity: 1; }

  /* MAIN LAYOUT */
  .main-layout {
    display: flex;
    min-height: calc(100vh - 200px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 132px;
    height: calc(100vh - 132px);
    overflow-y: auto;
  }
  .sidebar-title {
    padding: 0 16px 12px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-light);
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .sidebar-item {
    display: block;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-light);
    transition: all 0.15s;
    border-left: 3px solid transparent;
    background: none;
    border-top: none; border-right: none; border-bottom: none;
    width: 100%;
    text-align: left;
    line-height: 1.4;
  }
  .sidebar-item:hover { color: var(--text); background: var(--bg); }
  .sidebar-item.active {
    color: var(--city-color, #333);
    background: var(--bg);
    border-left-color: var(--city-color, #333);
  }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 24px;
    min-width: 0;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
  }
  .section-badge {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    background: var(--city-color, #eee);
    color: #fff;
  }
  .btn-add-topic {
    padding: 8px 16px;
    border-radius: 999px;
    background: var(--city-color, #eee);
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    display: none;
    gap: 6px;
    align-items: center;
  }
  .btn-add-topic:hover { opacity: 0.85; }

  /* TOPIC SECTION */
  .topic-section {
    margin-bottom: 28px;
  }
  .topic-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    background: var(--city-color, #eee);
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .topic-header:hover { opacity: 0.92; }
  .topic-header h2 {
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    flex: 1;
  }
  .topic-toggle {
    color: rgba(255,255,255,0.8);
    font-size: 18px;
    transition: transform 0.25s;
  }
  .topic-toggle.open { transform: rotate(180deg); }
  .topic-add-btn {
    background: rgba(255,255,255,0.25);
    border: none;
    color: #fff;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    gap: 4px;
    align-items: center;
  }
  .topic-add-btn:hover { background: rgba(255,255,255,0.4); }
  .topic-body { display: none; }
  .topic-body.open { display: block; }

  /* QA CARD */
  .qa-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-top: none;
    padding: 0;
    transition: box-shadow 0.2s;
    overflow: hidden;
  }
  .qa-card:last-child { border-radius: 0 0 10px 10px; }
  .qa-card:hover { box-shadow: var(--shadow); }
  .qa-question {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    user-select: none;
    transition: background 0.15s;
  }
  .qa-question:hover { background: var(--bg); }
  .qa-q-icon {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: var(--city-color, #eee);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .qa-q-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    line-height: 1.5;
  }
  .qa-chevron {
    color: var(--text-light);
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 4px;
    transition: transform 0.25s;
  }
  .qa-chevron.open { transform: rotate(180deg); }
  .qa-actions {
    display: none;
    gap: 6px;
    flex-shrink: 0;
    align-items: center;
  }
  .qa-edit-btn, .qa-del-btn {
    padding: 3px 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
  }
  .qa-edit-btn { background: #EBF8FF; color: #2B6CB0; }
  .qa-edit-btn:hover { background: #BEE3F8; }
  .qa-del-btn { background: #FFF5F5; color: #C53030; }
  .qa-del-btn:hover { background: #FED7D7; }
  .qa-answer {
    display: none;
    padding: 0 18px 16px 56px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  .qa-answer.open { display: block; }
  .qa-a-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    padding-top: 14px;
  }
  .qa-a-link {
    color: var(--city-color, #3182CE);
    text-decoration: none;
    word-break: break-all;
  }
  .qa-a-link:hover { text-decoration: underline; }
  .qa-img-wrap {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .qa-img-wrap img {
    max-width: 220px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid var(--border);
  }
  .info-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-top: none;
    padding: 14px 18px 14px 56px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }
  .info-card:last-child { border-radius: 0 0 10px 10px; }

  /* SEARCH RESULTS */
  .search-results {
    display: none;
  }
  .search-results.active { display: block; }
  .search-city-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 4px 10px;
    border-radius: 999px;
    color: #fff;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .search-hit {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  .search-hit:hover { box-shadow: var(--shadow); }
  .search-hit-topic { font-size: 12px; color: var(--text-light); margin-bottom: 6px; }
  .search-hit-q { font-size: 15px; font-weight: 700; color: var(--text); }
  .search-hit-a { font-size: 13px; color: var(--text-light); margin-top: 4px; white-space: pre-wrap; max-height: 60px; overflow: hidden; }
  mark { background: #FEFCBF; border-radius: 3px; padding: 0 2px; }
  .no-results { text-align: center; color: var(--text-light); padding: 48px; font-size: 15px; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 20px;
    color: var(--text);
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    margin-bottom: 6px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { min-height: 120px; }
  .modal-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }
  .btn-cancel { background: var(--bg); color: var(--text); border: 2px solid var(--border); }
  .btn-save { background: var(--accent); color: #fff; border: none; }
  .btn-save:hover { background: #3D9970; }
  .img-upload-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    color: var(--text-light);
    font-size: 14px;
  }
  .img-upload-area:hover { border-color: var(--accent); }
  .img-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .img-preview img { width: 80px; height: 60px; object-fit: cover; border-radius: 6px; border: 2px solid var(--border); }

  /* ADMIN PANEL */
  .admin-modal .modal { max-width: 680px; }
  .admin-section { margin-bottom: 24px; }
  .admin-section h4 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-light);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .marquee-editor-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .marquee-editor-row select { width: 110px; flex-shrink: 0; }
  .marquee-editor-row input { flex: 1; }
  .marquee-editor-row .btn-del-marquee {
    background: #FFF5F5;
    color: #C53030;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 2000;
    align-items: center;
    justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
  }
  .lightbox-close {
    position: fixed;
    top: 20px; right: 24px;
    color: #fff;
    font-size: 32px;
    cursor: pointer;
    font-weight: 300;
    line-height: 1;
  }

  /* LOGIN */
  .login-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 900;
    align-items: center;
    justify-content: center;
  }
  .login-overlay.open { display: flex; }
  .login-box {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  .login-box h3 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .login-box p { font-size: 13px; color: var(--text-light); margin-bottom: 20px; }
  .login-box input {
    width: 100%;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    margin-bottom: 12px;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-error { color: #C53030; font-size: 13px; margin-top: -6px; margin-bottom: 10px; display: none; }
  .login-btns { display: flex; gap: 8px; margin-top: 4px; }

  /* CITY COLORS */
  .city-桃園 { --city-color: #E8763A; }
  .city-南投 { --city-color: #4CAF7D; }
  .city-嘉義 { --city-color: #E8A03A; }
  .city-彰化 { --city-color: #5B8FD4; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .header-title p { display: none; }
    .search-bar { max-width: 200px; }
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: #2D3748;
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    z-index: 3000;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .count-badge {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 700;
    margin-left: 6px;
  }
</style>
</head>
<body>

<!-- MARQUEE -->
<div class="marquee-section" id="marqueeSection"></div>

<!-- HEADER -->
<header>
  <div class="header-logo">
    <div class="logo-icon">🐾</div>
    <div class="header-title">
      <h1>1959 動保知識庫</h1>
      <p>動物保護專線內部查詢系統</p>
    </div>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="跨縣市關鍵字搜尋…" oninput="doSearch(this.value)">
  </div>
  <div class="header-actions">
    <button class="btn btn-settings" onclick="openAdmin()">⚙ 後台設定</button>
  </div>
</header>

<!-- CITY TABS -->
<div class="city-tabs" id="cityTabs"></div>

<!-- MAIN LAYOUT -->
<div class="main-layout" id="mainLayout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<!-- SEARCH RESULTS -->
<div class="content" id="searchResults" style="display:none"></div>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h3>🔐 後台登入</h3>
    <p>請輸入管理密碼</p>
    <input type="password" id="loginInput" placeholder="• • • •" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="loginError">密碼錯誤，請重試</div>
    <div class="login-btns">
      <button class="btn btn-cancel" style="flex:1" onclick="closeLogin()">取消</button>
      <button class="btn btn-save" style="flex:1" onclick="doLogin()">登入</button>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="modal-overlay admin-modal" id="adminModal">
  <div class="modal">
    <h3>⚙ 後台設定</h3>
    <div class="admin-section">
      <h4>🔊 跑馬燈管理（最多3條）</h4>
      <div id="marqueeEditors"></div>
      <button class="btn btn-settings" style="margin-top:8px" onclick="addMarqueeEditor()">＋ 新增跑馬燈</button>
    </div>
    <div class="admin-section">
      <h4>📂 主題管理</h4>
      <div class="form-group">
        <label>選擇縣市</label>
        <select id="adminCitySelect" onchange="updateAdminTopicList()">
          <option value="桃園">桃園</option>
          <option value="南投">南投</option>
          <option value="嘉義">嘉義</option>
          <option value="彰化">彰化</option>
        </select>
      </div>
      <div class="form-group">
        <label>新增主題大綱</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="newTopicName" placeholder="輸入主題名稱">
          <button class="btn btn-save" onclick="addTopic()">新增</button>
        </div>
      </div>

<script>
// ==================== DATA ====================
const QA_DATA = {"桃園": {"color": "#E8763A", "topics": [{"name": "桃園寵登系統操作方式", "items": [{"q": "寵登系統：", "a": "https://www.pet.gov.tw/Index.aspx?s=999"}, {"q": "帳號：C01185", "a": null}, {"q": "密碼：C01185", "a": null}, {"q": "寵登系統：不可結案！", "a": null}, {"q": "請留意，登入帳號需為桃園1959，如不是請記得切換正確帳號，不要登錄到別的縣市去", "a": null}, {"q": "通報群組", "a": "桃園動保處1959 (程高客服KH)→派勤"}, {"q": "寵登操作系統 畫面如圖", "a": null}, {"q": "1.選擇工作人員入口>寵登行政資訊系統", "a": null}, {"q": "2.確認登入為正確帳號", "a": null}, {"q": "3.登入後請確認左上方是否顯示正確地區", "a": null}, {"q": "4.有兩個登入路徑，可從上方選單登入，也可下滑網頁至儀表板內找到", "a": null}, {"q": "5.點選新增", "a": null}, {"q": "6.依照上方指示填入(遊蕩犬一定要GPS)", "a": null}, {"q": "7.這幾項均無須勾選", "a": null}]}, {"name": "動保聯絡資訊", "items": [{"q": "開頭語：", "a": "桃園1959動物保護專線您好！"}, {"q": "桃園1959動保專線委外服務時間：", "a": "週一至週五 17:00-隔日08:00\n週六日、例假日、國定假日、颱風、春節24H"}, {"q": "桃園動物保護處", "a": "https://animal.tycg.gov.tw/"}, {"q": "桃園動物保護園區 (新屋收容所)", "a": "https://taw.tycg.gov.tw/"}, {"q": "地　　址：32744 桃園市新屋區永興里三鄰藻礁路1668號\n電　　話：(03)486-1760　　　\nEmail：tyadcc@mail.tycg.gov.tw\n傳　　真：(03)486-1765\n開放時間：每週二、四、五、六、日\n服務時段：上午09:30~下午16:00。\n(中午12時至13時，不開放入動物舍參觀)", "a": "服務內容：\n開放日：民眾於開放區域參觀及認養、領回寵物及捐贈物資與動物送交、市民動物屍體火化事宜，另亦接受民眾諮詢服務。\n非開放日(休園日)：辦理指定動物認養(不開放入動物舍參觀)、領回寵物及捐贈物資與動物送交、市民動物屍體火化事宜，另亦接受民眾諮詢服務。"}, {"q": "南昌動物保護教育園區:", "a": "地址 : 330063 桃園市桃園區向善街120-1號\n a. 動物保護課、動物管制課、寵物及產業管理課\n電話：03-3250126\n上班時間 : 星期一至星期五 上午8:00至12:00 下午13:00至17:00\n b.桃園市犬貓市區認領養中心\n電話：03-3250126 分機556\n開放時間：每週二、四、五、六、日\n服務時段：上午09:30~下午16:00。(中午12時至13時，不開放入動物舍參觀)"}, {"q": "急難救助：(救援單位已有更新，以表單為主)", "a": "◆平日週一至週五: 17:00-08:00\n◆一般假日及政府宣佈停班:24小時全時段\n皆為委外急難救助廠商佶鼎超媒體有限公司進行協助"}, {"q": "◆佶鼎超媒體有限公司話務窗口:0972588688\n◆備援電話:0937802020(負責人賴彥文先生)\n備用（2）0966652765\n\n請留意【賴彥文】時段，能力及工具資源僅能救援犬貓，請依救援原則提供對應可協助單位", "a": "姓名：(系統儘量登錄全名)\n聯絡電話：\n受傷動物：\n所在地詳細地址：\n動物別（狗/貓）：\n動物體型(大/中/小)：\n毛色或特徵：\n動物受傷狀況（尚可行走/無法行走）：\n備註：\n寵登編號："}, {"q": "委外急難救助廠商僅能協助貓狗救援\n若民眾來電反應有動物需急難救助但非貓狗且該時段為委外急難救助廠商處理，請委婉說明:\n「現時段由委外急難救助廠商協助但他們能力有限僅能救助貓狗，目前如有非貓狗的動物需救援，要麻煩您改洽1999由他們通知派案給對應單位協助。」\n◆若民眾線上不接受持續要求1959接案\n→請紀錄動物狀態後直接通報群組(需於備註說明有請民眾改洽1999但民眾持續不願要求處理)，不打給委外急難救助廠商。\n注意事項:\n◇說明上請留意，不是「經費不足」而是「救援能力有限」。(不是錢的問題，是救援人員能力僅能處理貓犬)\n◇ 蛇、蜂、保育類動物、野生動物本身就是1999處理。", "a": null}, {"q": "蛇、蜂、保育類動物、野生動物、燕子", "a": "農業局林務科權責；可請民眾撥打1999協助，會派給林務科。\n◆鴿子及白嘴八哥→桃園動保處接案，不是1999。\n(白嘴八哥(台灣冠八哥)屬於二級保育類動物還是歸桃園動保處接案，請勿派外勤，請民眾安置待上班再聯繫動保處。)"}, {"q": "不在服務範圍的動物", "a": "貓犬以外、 蛇、蜂、保育類動物、野生動物"}]}, {"name": "常見問題", "items": [{"q": "常見問題", "a": "動保單位白天處理方式(客服參考用)"}, {"q": "民眾發現不同種類之受傷動物（如狗、貓），應分別向哪一單位通報收容處理?", "a": "如果街頭發現流浪犬貓受傷時，於本處上班時間可通報本處（電話：03-3250126#500）或市民專線1999，下班時間則直撥市民專線1999通報，本處將盡快派員前往救援，並為該動物檢傷分類，評估是否後送合約動物醫院住院醫療。"}, {"q": "上班時間如果於街頭發現動物受傷怎麼辦？動物後續處置為何？", "a": "\"一.\t發現流浪動物(一般指犬貓)受傷時，可通報本處（電話：03-3250126分機500~510）或市民專線1999，本處將盡快派員前往救援，並為該動物檢傷分類，評估是否後送合約動物醫院住院醫療。務必提供通報人的姓名、聯絡電話、受傷動物所在地詳細地址、動物別（狗/貓）、動物體型(大/中/小)、毛色或特徵、動物受傷狀況（尚可行走/無法行走）等資料，並辦理公告。二、如無主犬貓無人認領，且體況恢復良好，且達已可絕育之年齡，仿照國外及其他縣市作法，由本處協助TNVR(誘捕、絕育、狂犬病疫苗注 射、回放) ，以期控制遊蕩犬貓族群數量。其他則接回本市動物保護教育園區安置，如公告7日無人認領，則依動物保護法規定執行後續收容安置與開放民眾認養。\""}, {"q": "如果於街頭發現流浪犬、貓受傷怎麼辦？動物後續處置為何？", "a": "一.發現流浪犬、貓受傷時，請撥以下電話：\n1.上班時間：可通報本處(電話：03-3250126分機500-510)或1959動保專線及市民專線1999。\n2.下班時間：市民專線1999。\n接獲通報後，本處將盡快派員前往救援，並為該動物檢傷分類，評估是否後送合約動物醫院住院醫療。務必提供通報人的姓名、聯絡電話、受傷動物所在地詳細地址、動物別（狗/貓）、動物體型(大/中/小)、毛色或特徵、動物受傷狀況（尚可行走/無法行走）等資料，並辦理公告。\n二.如無主犬貓無人認領，且體況恢復良好，且達已可絕育之年齡，仿照國外及其他縣市作法，由本處協助TNVR(誘捕、絕育、狂犬病疫苗注射、回放) ，以期控制遊蕩犬貓族群數量。其他則接回本市動物保護教育園區安置，如公告7日無人認領，則依動物保護法規定執行後續收容安置與開放民眾認養。"}, {"q": "流浪動物(犬貓)於非上班時間受傷需緊急救護應如何處理？", "a": "您可撥打1999市民諮詢服務熱線，話務人員將通報相關單位前往處理，為了能盡快搜尋到動物，請務必提供您的姓名、聯絡電話、受傷動物所在地詳細地址、動物別（狗/貓）、動物體型(大/中/小)、毛色或特徵、動物受傷狀況（尚可行走/無法行走）等資料。"}, {"q": "家中心愛寵物往生，我要將牠屍體焚化，請問如何辦理﹖", "a": "目前市民處理飼養寵物之遺體的建議方式如下：\n(一) 可交由各區公所清潔隊權責處理。採用本方式處理寵物遺體，無須繳交額外費用。未來民眾發現街道犬貓遺體由環境清潔稽查大隊前往現場,協助掃描晶片,並予明確記錄編號後裝袋, 後送往本市動物保護教育園區(簡稱園區),如經晶片辨識 為有主之遺體,由園區通知飼主領回;無主則由園區委託 遺體專業焚化機構處理。\n(二) 本處提供市民委託犬貓屍體焚化服務，委外集體焚化犬貓遺體。犬貓屍體焚化服務費按重量計費，每公斤收費新臺幣90元，不足一公斤者以一公斤計算。其他寵物屍體重量不逾八十公斤者，且無防疫疑慮者，得比照處理。 \n(三) 寵物需個別火化者，可交付私人寵物殯葬業處理，目前北部共有數家業者提供相關服務，民眾可參考各家業者服務內容及收費規定自由進行選擇。"}, {"q": "桃園市動物保護教育園區之開放時間為何？", "a": "認領養犬貓、免費參觀開放時間：每週二、四、六及日，10:00~12:00，13:00~15:30。(每週三及國定假日休園)"}, {"q": "我家附近有許多流浪犬該如何處置？", "a": "如您有捕犬需求請致電03-3250126分機500或1999及1959動保專線，並提供犬隻詳細出沒地點、特徵(花色、體型)、數量、舉報原因，並留下您的聯絡資料，我們將盡快為您服務。"}, {"q": "請問住家附近野貓問題如何解決？", "a": "因為貓隻活動為三度空間且動作敏捷，故不易直接捕捉。若住家附近流浪貓數增多群聚造成困擾，本市市民得按規定致電本處免費排借誘捕貓籠捕捉(桃園區縣府路57號，03-3250126分機500、1999市府專線與1959動保專線)，如捕獲貓隻即刻致電本處，後本處將按本市TNVR措施作業，以期落實源頭管理。"}, {"q": "如撿到(拾獲)犬貓該如何處理﹖", "a": "您於本市轄區內拾獲犬貓後，可先洽寵物登記站掃描有無植入晶片辦理寵物登記，確認是否為有主動物，並請聯繫本處動物保護教育園區(地址為新屋區永興里藻礁路1668號，電話為03-4861760)或本市動物保護處(地址為桃園區縣府路57號，電話為03-3250126)，如您確認該犬隻有晶片，請逕行送至上述地點以利本處安排後續錄案、通知領回及收容事宜。"}, {"q": "如遇犬貓受困，民眾無法協助其脫困時，可向哪單位尋求協助 (含非上班時段)?", "a": "1、上班時間請連繫桃園市政府動物保護處(03-3250126分機500-510)，1959動保專線本處將視當下具體情形做妥適處理。\n2、下班時間請撥打1999專線，1999專線將轉本處急難救助人員視當下具體情形做妥適處理。"}, {"q": "請提供如自家寵物在住家內受困，飼主無法協助脫困，可向哪單位尋求協助(含非上班時段)?", "a": "\"1、上班時間請連繫桃園市政府動物保護處，本處將視當下具體情形做妥適處理。\n2、下班時間請撥打1999專線，1999專線將轉本處急難救助人員視當下具體情形做妥適處理。\n※桃園市政府動物保護處地址及聯絡電話：(1)地址：桃園市桃園區縣府路57號 (2)電話：03-3250126分機500\""}, {"q": "農林漁牧-請提供向動物保護防疫處借用誘捕籠時，可以借用幾個誘捕籠?申請誘捕籠有哪些地點?", "a": "1.設籍於本市之市民，原則上可借用1個誘捕籠，借用期限為1周，可申請展延3次，每次展延時間為1周，至多借用一個月，申請人得致電(033250126分機500或1959動保專線)申請借用及展延。\n2.可致電或親至南昌動物保護教育園區申請借用誘捕籠。\n(1)地址：桃園市桃園區向善街120-1號  (2)電話： 03-3250126分機500"}, {"q": "我想認養狗狗(貓咪)，請問需要準備什麼嗎？", "a": "領養者須攜帶年滿20歲並攜帶身分證或駕照，於動物保護教育園區開放參觀時間(週二、四、六、日早上十點至下午三點半，中午十二點至一點半為休息時間)至現場挑選動物，待確定後至園區行政中心辦理領養手續(影印身分證等辦理寵物登記等事宜，目前為提高認養率，無須繳納手續費用); 另貓咪及幼犬建議自備硬式提籠，成犬則請準備牽繩並安排適合的接送交通工具。"}, {"q": "我家裏的狗貓沒辦法養了該怎麼辦？", "a": "有關飼主不擬繼續飼養犬貓時，請依照下列說明辦理：\n一、欲申請讓渡之犬貓需先逕行晶片植入完成寵物登記及施打當年度狂犬病疫苗與絕育，相關費用由原飼主自行負擔，始得辦理讓渡手續。\n二、因故無法續養犬貓之市民，於辦理不擬續養手續前，應完成上述事項後攜帶該犬貓並檢附飼主身分證明文件，至本市動物保護教育園區(以下簡稱動保園區，03-4861760，桃園市新屋區藻礁路1668號)辦理犬貓讓渡公告申請。讓渡申請人需依說明填寫申請表格並配合拍攝待讓渡犬貓照片後，將資料交付受動保園區，由動保園區將待讓渡犬貓照片及相關資料刊登於桃園市動物保護教育園區「寵物讓渡」專區網頁供民眾瀏覽，為期30日。若有意願認養待讓渡犬貓之民眾，可透過動保園區聯繫雙方後辦理犬貓轉讓手續，與繳交轉讓費用。以減少動物因收容於園區造成之緊迫與不適情況，及提升收容動物照護品質。\n三、待讓渡犬貓經刊登讓渡30日後，倘未尋得欲飼養之新飼主，原飼主應事先電話連繫動保園區，依園區指定期限內將犬貓帶至本市動物保護教育園區，填具「動物送交書」辦理動物送交手續，並依桃園市犬貓收容及處理收費標準繳交相關費用(已辦理寵物登記者收取費用：2500元，如需經本處接送則需支付1000元運輸費，倘動物需鎮靜則另支付麻醉費用1500元)，後由本市動物保護教育園區進行收容照顧及後續認養推廣事宜。\n        原飼主完成棄養手續後，依動物保護法第三十三條之一規定，不得飼養應辦理登記之寵物及認養收容所收容之動物。"}, {"q": "自家飼養動物是否有被捕捉", "a": "請至桃園市政府動物保護教育園區首頁https://taw.tycg.gov.tw/，點選入園公告查詢。"}, {"q": "通報路殺動物屍體", "a": "可請民眾洽各區清潔隊協助，如遇清潔隊休假，亦可請民眾撥打1999協助處理，會派案給清潔隊。"}, {"q": "蛇、蜂、保育類動物、野生動物", "a": "農業局林務科權責；可請民眾撥打1999協助，會派給林務科。"}, {"q": "拾獲受傷流浪犬貓能否自行送往動物醫院", "a": "如確定是遊蕩犬貓，就聯絡委外廠商協助。\n不建議自行送往，無法判別是否為民眾自家犬貓，客服不主動提供動物醫院及合約醫院資訊，避免費用爭議。"}, {"q": "拾獲流浪動物飼養一段時間後，不想養了能否送交收容所", "a": "民眾可能因治療費用龐大，又因為拾獲動物無力負擔，想送交收容所，請務必不能允諾及提供送往。 \n請將詳細資訊錄案，上班時段由單位處理。"}, {"q": "高速公路/快速道路通報案件", "a": "以事發地的業管單位為優先受理(得建議透過1999轉業管單位)，如主辦單位經評估需本處協助處理者，將再致電本處或委外廠商處理。\n高速公路及快速道路通報案件，須請高公局北區養護工程分局處理，如果之後還有接獲地點在高速公路或快速道路的通報，請幫我們在案情陳述敘明已請民眾改撥1999通報高公局北區養護工程分局，"}, {"q": "鳥類、保育類及野生動物的救援案件處理單位", "a": "◆燕子，因燕子屬於外來種→桃園市政府農業局林務科接案，可請民眾撥打1999協助。\n◆如為保育類及野生動物→亦請轉桃園市政府農業局林務科接案，可請民眾撥打1999協助。\n◆鴿子及白嘴八哥→桃園動保處接案。◇白嘴八哥(台灣冠八哥)屬於二級保育類動物還是歸桃園動保處接案。"}]}, {"name": "各單位執掌", "items": [{"q": "動物保護課", "a": "1. 動物保護業務管理。\n2. 犬貓狂犬病防疫及進口追蹤檢疫。\n3. 實驗動物業務管理。\n4. 犬貓絕育業務管理。\n5. 特定寵物（犬）業之業務管理。\n6. 飼物（犬）登記業務管理等事項。"}, {"q": "動物管制課", "a": "1. 流浪犬貓管制。\n2. 急難救助及收容處置。\n3. 犬貓屍體焚化服務。\n4. 公立動物收容所管理。"}, {"q": "動物保護教育園區管理課", "a": "1. 職掌動物保護教育園區之犬貓收容、認領、認養、絕育、救傷醫療管理。\n2. 生命教育推展等事項。"}, {"q": "動物防疫課", "a": "- 豬隻傳染病防治輔導。\n- 衛生教育保健及疫情調查處置。\n- 動物用藥品管理。\n- 化製原料運輸車管理。\n- 獸醫師（佐）及獸醫診療機構管理。"}, {"q": "動物檢診課", "a": "- 水產及畜禽動物疾病鑑定及疫情調查處置。\n- 畜禽動物用藥品殘留檢驗。\n- 獸醫技術研究與其他有關事項。\n- 文書、檔案、事務、出納、採購、研考、財產管理。"}, {"q": "動物衛生課", "a": "- 草食及禽類疾病防治輔導。\n- 衛生教育保健及疫情調查處置。\n- 輸出（入）檢疫物之產地（追蹤）檢疫。\n- 野生動物救傷診療等事項。"}]}, {"name": "派勤單位", "items": [{"q": "◆平日週一至週五: 17:00-08:00\n◆一般假日及政府宣佈停班:24小時全時段\n皆為委外急難救助廠商佶鼎超媒體有限公司進行協助\n\n◆佶鼎超媒體有限公司話務窗口:0972588688\n◆備援電話:0937802020(負責人賴彥文先生)\n    備用（2）0966652765", "a": null}, {"q": "下班時段以救傷/緊急為主，其他錄案後送上班時段協助。\n(以有服務民眾為上，勿過度推辭，無論遊蕩犬貓或有主犬貓，必要時救援隊可去看看)", "a": null}, {"q": "★ 寵登系統錄案 (每筆通話皆獨立入案)，不可結案！  後送案件，上班日由承辦單位回覆處理", "a": null}, {"q": "1、派勤採外撥+群組提供資訊,後送群組(程高客服KH通報)", "a": null}, {"q": "2、桃園救援資源寬裕，勿擔心過度派勤。請留意【賴彥文】時段，能力及工具資源僅能救援犬貓，請依救援原則提供對應可協助單位", "a": null}, {"q": "3、二家特約醫院資訊僅提供救援隊使用，民眾自行送醫案例不符救援原則。", "a": null}]}, {"name": "委外服務時間", "i ": null}, {"q": "【受理事項】", "a": null}, {"q": "1. 犬貓急難救助、路殺犬貓通報、動保法相關諮詢、動保案件通報、動物防檢疫問題諮詢、本所部分業務諮詢 (家犬貓狂犬病注射、絕育補助、本縣獸醫院資訊)寵物登記變更轉移相關問題、提供野生動物類之案件相關單位聯絡資訊、收容所犬貓認養相關諮詢、犬貓疏縱及棄養案件通報。", "a": null}, {"q": "2. 通報動物保護案件或犬貓救援案件請提供下列資料", "a": null}, {"q": "●發現時間（如：O 月 O 日 O 時 O 分發現）", "a": null}, {"q": "●發現地點（地址或地標，如：南投市民族路499號前人行道）", "a": null}, {"q": "●事情經過（如：一犬隻疑似車禍倒地無法行動）", "a": null}, {"q": "●動物狀況（如：狗後腳流血、貓咪躺在地上不動）", "a": null}, {"q": "● (如有)行為人（如：住所地址、車牌、電話、姓名）", "a": null}, {"q": "●案件之受理，須提供通報人真實姓名、電話", "a": null}, {"q": "● 如有案件相關照片或影片提供，請民眾於上班時間聯繫防治所。", "a": null}, {"q": "【受理動物種類】", "a": null}, {"q": "1. 主要受理動物以犬、貓為主。 / 不在範圍動物-貓犬以外、蛇蜂", "a": null}, {"q": "2. 野生動物請洽農業處林務保育科（049-2222340）或1999專線。", "a": null}, {"q": "3. 保育類動物請洽農業部生物多樣性研究所(049)2761331，常見保育類動物有石虎、穿山甲、食蛇龜及草鴞等。", "a": null}, {"q": "【受理犬貓救援案件處理流程及注意事項】", "a": null}, {"q": "●處理流程", "a": null}, {"q": "1. 民眾來電通報急難救援案件。", "a": null}, {"q": "2. 接線人員於通話結束後聯繫救援單位。", "a": null}, {"q": "3. 救援人員接獲通報後致電通報民眾確認地點及現場情況，於2小時內抵達現場進行救援。", "a": null}, {"q": "4. 救援完成後將傷病之動物送至本縣動物收容所進行醫療及後續處置。", "a": null}, {"q": "【注意事項】", "a": null}, {"q": "1. 請通報民眾留意救援人員撥打的確認電話，告知明確的事發地點、傷病或受困犬貓之情形(活動能力、是否有出血或其他詳細描述)、是否能協助暫時安置動物及其他補充說明，救援人員會告知預計的抵達時間。", "a": null}, {"q": "2. 案件完成後請民眾協助於救援出勤表通報人欄位簽名。", "a": null}, {"q": "專線忙線中請於5分鐘後再撥打，如遇無法接通等故障問題", "a": null}, {"q": "上班時間(週一至週五8:30~17:00)請撥049-2222542，假日或非上班時間請撥02-87928781。", "a": null}, {"q": "★ 寵登系統錄案 (每筆通話皆獨立入案)，不可結案！  後送案件，上班日由承辦單位協助處理。僅救援貓犬\n1、禁止說明有立即生命危險為主才能前往救援或查看，南投民眾有需要，適當的說明後可派人員去看看了解一下，救援隊如有任務在身會視緊急先後安排。             \n2、遊蕩無主健康犬貓，野外有基本生存能力及條件，適時將觀念提供民眾，不用為犬貓擔心可再多觀察，有需要後續再進線，如民眾堅持也請勿婉拒，可引導上班時間主動洽防疫所。                   \n3、單位不回電，紀錄勿寫會請專人回覆。                                       \n    (勿向民眾說明單位會回覆)，有需要請民眾上班時間電洽，單位承辦會詳加後續說明及提供辦法 (承辦很有愛心！！)      。                       \n4、南投救援資源寬裕，勿擔心過度派勤。但也要給民眾觀念，資源儘量優先留給需要的貓犬。", "a": null}, {"q": "派勤原則", "a": null}, {"q": "以有協助到民眾為主，可群組諮詢，如非緊急需求可嘗試引導上班時段洽防治所 ((以有服務民眾為上，勿過度推辭，民眾覺得有需要可以派勤)", "a": null}, {"q": "派勤單位 049-2220644 南投葬儀社 (出勤穿著防治所背心) 如下圖所示", "a": null}]}, {"name": "寵物登記項目表", "items": [{"q": "寵物登記項目表", "a": null}, {"q": "狂犬病注射證明書", "a": "（登記費1000元＋晶片費300元）"}, {"q": "寵物", "a": null}, {"q": "登", "a": null}, {"q": "（若注射超過一年則需補強注射）", "a": null}, {"q": "寵物絕育證明", "a": null}, {"q": "寵物", "a": null}, {"q": "寵物繁殖業者", "a": "飼主身分證"}, {"q": "狂犬病注射證明書", "a": "(需每季報送晶片使用情形表，"}, {"q": "（若注射超過一年則需補強注射）", "a": "以領取晶片)"}, {"q": "寵物業許可證影本並且具備以下2要件：", "a": null}, {"q": "(1)營業項目包含繁殖", "a": null}, {"q": "(2)飼主必須與負責人相同", "a": null}, {"q": "寵物", "a": null}, {"q": "原飼主及新飼主身分證件", "a": null}, {"q": "寵物或寵物登記證", "a": null}, {"q": "100元", "a": null}, {"q": "遺失協尋", "a": "飼主身分證"}, {"q": "寵物登記證", "a": null}, {"q": "死亡除戶", "a": "飼主身分證"}, {"q": "寵物登記證", "a": null}, {"q": "登記證遺失補發", "a": "飼主身分證"}, {"q": "寵物", "a": null}, {"q": "資料變更", "a": "飼主身分證"}, {"q": "寵物登記證", "a": null}, {"q": "完成寵物登記提醒事項", "a": null}, {"q": "寵物晶片植入", "a": "寵物登記：由寵物登記站為寵物植入晶片，並將資料上傳至寵物登記管理資訊網(https://www.pet.gov.tw/)後，列印寵物登記證交給飼主。寵物登記證是寵物一輩子的身份證，請飼主為牠妥善保管。"}]}, {"name": "1959常見問題", "items": [{"q": "1959問題答覆單", "a": null}, {"q": "動物保護問題", "a": null}]}, {"name": "動物防疫檢疫問題", "items": [{"q": "動物防疫檢疫問題", "a": null}]}, {"name": "海蟾蜍", "items": [{"q": "什麼是海蟾蜍？為什麼要防治呢？", "a": "海蟾蜍是台灣生態系統的新威脅，了解牠們的特徵與習性，才能有效防治！"}, {"q": "海蟾蜍（學名：Rhinella marina）", "a": "是一種原產於中南美洲的大型蟾蜍，因人為引入已成為全球最具侵略性的外來種之一，被列為世界百大外來入侵種。在 2021 年，海蟾蜍首次在南投草屯被發現，體長約 10 至 15 公分（目前台灣野外紀錄最大可達 21.5 公分），是台灣原生蟾蜍的兩倍大。牠們繁殖力驚人，一次可產下8,000-35,000顆卵，對台灣的生物多樣性構成嚴重威脅"}, {"q": "如何辨識海蟾蜍", "a": "辨識海蟾蜍的關鍵特徵包括：體型巨大（成體可達 10-15 公分）、背部呈棕色至灰褐色且有疣狀突起、頭部兩側有明顯的大型腮腺（毒腺）稱為耳後腺、鼓膜明顯可見。與台灣原生蟾蜍相比，海蟾蜍體型更大、腮腺更為明顯，且缺乏明顯的黑色斑點花紋。若發現疑似個體，請保持安全距離，並立即通報。"}, {"q": "海蟾蜍的棲息環境與活動習性", "a": "海蟾蜍適應力極強，能在多種環境中生存，包括森林、草地、農田、市區等。牠們偏好潮濕環境，常在開闊水域附近繁殖，如池塘、溝渠、沼澤等。夜間活動頻繁，常聚集在燈光下獵食昆蟲，白天則躲在陰涼處避暑。在台灣，建築區域、農業區域和水體周邊是高風險區域，需要重點監測。"}, {"q": "發現海蟾蜍？正確的通報與處理方式", "a": "若您發現疑似海蟾蜍，請遵循以下步驟：1. 保持安全距離，不要徒手接觸；2. 拍攝清晰照片或錄音，並記錄地點與時間；3. 通過官方通報系統或專線電話進行回報；4. 若情況許可，可使用手套和防曬、透氣且不會被逃脫的容器進行安全收容，等待專業人員處理。您的每一次通報都是保護台灣生態系統的重要貢獻！除了通報，也可以加入我們的志工培訓行列，一同守護台灣的自然環境。"}]}, {"name": "南投清潔隊電話", "items": [{ "a": "05-2168661 ( 08:00-17:30 周一至周日，除國定假日皆會接聽)"}, {"q": "下班時間(17:30-08:00) 救援案件  \n**後送案件，全天都要通報群組知悉，以利人員上班時段即時處理。\n**陳情案件：全天都通報群組，不用打電話", "a": "洪秀鈴: 0976442282，\n洪嘉成:0926995451→由客服打派案"}, {"q": "動保園區服務時間", "a": "星期日、一休園，不對外開放。"}, {"q": "動保園區收容", "a": "1.受傷犬貓 2.飼主棄養（週二~週六 09:00-11:30，14:00-16:30，需自行置園區辦理手續），其餘皆為tnvr(六個月以上的動物絕育後回置）\n一般陳情之流浪犬貓捕捉後會進行TNVR(捕捉後絕育並施打疫苗，再原捕捉地回置動物)，絕育需6個月以上，否則器官尚未發育完全，易導致死亡。絕育後評估適合認養的會留在園區供民眾認養，具攻擊性的犬隻會留在園區進行行為訓練等不會回置外，其他一律回置。\n適齡動物可以進行絕育者，在園區仍有收容空間時民眾可以協助帶來絕育，未達6月齡之動物無法收容。"}, {"q": "救傷通報以到現場確認是動物受傷需要救援為接案憑斷，如通報人已做前段處理（自行送醫），視同為動物之管領人，不符合接案標準不需前往處理。", "a": "若接獲民眾電話通報有奶貓被母貓棄養，不要直接回答「我們不收奶貓」或「我們只收有攻擊性的，奶貓沒有攻擊性我們沒辦法收」。\n幼犬貓 ➔ 外觀乾淨 ➔ 有媽媽照顧 ➔ 隨意帶走容易造成死亡，且媽媽退奶會加速進入發情期，並生更多浪浪\n若接獲民眾電話通報有奶貓被母貓棄養，不要直接回答「我們不收奶貓」或「我們只收有攻擊性的，奶貓沒有攻擊性我們沒辦法收」。\n請照以下方式回答:\n請通報人先檢視奶貓外觀，通報人通常不知道要看什麼，這時同仁可以詢問通報人，幼貓身體是否乾淨、精神良好、肚子微凸:\n(1)若通報人回答是，同仁可建議通報人:這代表這隻幼貓有母貓照顧及餵奶，當下母貓剛好出去覓食或正在移巢，請不要移動幼貓或將幼貓放回原發現地點，過陣子母貓會回來帶走幼貓。\n若通報人堅持要同仁派員帶走幼貓，請同仁務必教育民眾，沒有母貓照顧的奶貓較難長大，最好還是由母貓照顧，因母乳中有完整及足夠的必需營養成分，對奶貓的腸胃道較易消化吸收，且母乳含有「移行抗體」，可增加奶貓的免疫力。而以人工餵養的奶貓，餵養過程可能會遇到許多狀況，即便是經驗豐富的照顧人員，存活率也不高，多方考量下會建議將幼貓留在原地或放回原發現地點，等母貓去帶走，因為只有母貓才能給幼貓最好的照顧。\n(2)若通報人回答，幼貓外觀看來髒髒瘦瘦且非常虛弱，這時請立刻派人去救援幼貓。"}, {"q": "借用誘捕籠或預約流浪犬貓絕育，需留電話預約安排，上班日園區同仁會回電。", "a": null}, {"q": "撿到受傷犬貓，收容所會到場確認 ，(若民眾有帶去治療帶回去照顧視同要養，無法確認是飼主端或拾獲，不會接收，所以會現場去看再帶回來)。", "a": null}, {"q": "撿到能否送收容所：詢問哪裡撿到，派員去處理。", "a": null}, {"q": "流浪動物、攻擊性動物，危險性犬隻，通報會派員去稽查。救援是緊急，非緊急不會立即，當下後送群組，會看情況安排時間。", "a": null}, {"q": "檢舉虐待，通報會派員去處理，民眾有敘述事實地點，了解狀況，有物證事證可以舉證，可以過去稽查勸導，但若沒有明確事證的話較難舉發。", "a": null}, {"q": "報表內容及群組內通知：姓氏、電話、地址、內容、時間   (寵登網資料需齊全)", "a": null}, {"q": "緊急的立即聯繫及通報，不緊急的日報後送", "a": null}, {"q": "受困(要有明確的地點)，或投訴鄰居狗晚上吠叫擾民也要有明確地點，若無虐待之實沒有違反動保法，算環境噪音部份需報警", "a": null}, {"q": "狗聚集追咬人：要確切的時間點比較好稽查", "a": null}, {"q": "撿到疑似有人飼養的貓犬，請民眾帶到動物醫院或園區掃晶片", "a": null}, {"q": "貓犬絕育補助", "a": "https://ccap.chiayi.gov.tw/Default.aspx"}, {"q": "看到貓犬鳥躺在那不會動，請民眾靠近一下看看會不會逃跑，不見得是受傷", "a": null}, {"q": "自家動物受困可以協助以不破壞為原則，如果是受傷則是要自行送醫，我們主要以流浪動物為原則", "a": null}, {"q": "民眾借誘補籠補到動物，優先請民眾自己送過來，若半夜打來因為非緊急狀況，優先請民眾白天送，其次再請單位上班時間去接。", "a": null}]}]}, "彰化": {"color": "#5B8FD4", "topics": [{"name": "派勤單位", "items": [{"q": "請參照值班表：https://reurl.cc/Vz0kXN", "a": null}, {"q": "目前平日夜間22：00到隔日08：00之救援案件，無值班人員，如平常日跟連假最後一天該時段遇到(符合)救援案件盡量詢問民眾是否能先行安置或自行送往配合之動物醫院，防治所會於上班時間盡快前往處理，如民眾無法協助，那只能先將需要救援的動物留置原地並LINE通報後待明日上班後再由防治所接手處理", "a": null}, {"q": "請記得，如果有引導1999的，因彰化無法直撥1999，務必提供及(登打)給完整號碼", "a": null}, {"q": "彰化1999： (04)753-1999", "a": null}, {"q": "以有立即生命危險為主派勤，必要時引導民眾協助送至合約醫院並來回追蹤/需提供員編。\n所有後送案件皆需群組通報。", "a": null}]}, {"name": "委外服務時間", "items": [{"q": "下班時段、例假日\n平日 17:00-08:30，休假日 24H", "a": null}]}, {"name": "案件處理流程", "items": [{"q": "彰化縣動物防疫所 動物保護相關案件處理標準作業流程", "a": null}, {"q": "※有關本所各承辦人員之聯絡資訊，請切勿提供給民眾，避免造成困擾，謝謝！", "a": null}, {"q": "客服人員接擭民眾或相關單位通報", "a": null}, {"q": "動保案件(如重大虐待、毒殺及傷害動物等事件)", "a": null}, {"q": "請客服人員以電話聯繫方式通知動保課承辦人員，並告知案件之情形及案件通報人聯絡電話，以便能及時處理相關事宜", "a": null}, {"q": "動物救援案件", "a": null}, {"q": "遇到救援案件：", "a": null}, {"q": "(1)\t請民眾協助幫忙自行送本縣特約動物醫院治療，以節省救援經費；如遇夜間動物醫院已關店，請民眾先行幫忙安置受傷動物，並留下聯絡資料後告知承辦人員，以便聯繫。", "a": null}, {"q": "(2)\t如不行，請聯繫委外救援人員陳淑珍(0971-112202), 張生錦(0972-381407)、許鈺雲進行救援，並安排後送相關事宜。", "a": null}, {"q": "動物屍體案件", "a": null}, {"q": "1.\t一般動物屍體(犬、貓)：請民眾將屍體以黑色垃圾袋打包後，交由本縣各鄉鎮市公所清潔隊處理。", "a": null}, {"q": "2.\t野生動物屍體(食肉目如白鼻心.鼬獾等)，請通知聯繫委外救援人員陳淑珍(0971-112202), 張生錦(0972-381407)、許鈺雲至現場將該屍體載回本所冰存，並告知本所疫病檢驗課，以進行後續送驗工", "a": null}, {"q": "捕犬案件", "a": null}, {"q": "如接獲民眾通報捕犬案件時，請民眾於上班時間撥打捕犬專線04-8590010 由專人將該案件錄案，並進行安排捕捉相關事宜。", "a": null}, {"q": "捕貓案件", "a": null}, {"q": "目前本縣尚無貓隻捕捉之服務，請告知通報民眾，本所有提供民眾貓隻誘捕籠外借之服務，請民眾於上班時間撥打04-7620774#266預約借用。", "a": null}, {"q": "動物拾獲案件", "a": null}, {"q": "1.民眾拾獲健康之品種犬貓，請民眾協助送往動物醫院掃晶片，如沒有，送流浪狗中途之家(地址:彰化縣芬園鄉大彰路一段875巷，因委外救援主要針對受傷動物)。", "a": null}, {"q": "2.如拾獲健康小狗小貓，可請民眾先行在臉書或其他平台找尋愛心人士認領養，如不行，送往流浪狗中途之家。", "a": null}, {"q": "一般動保案件(疏縱、飼養不當、未施打晶片、未絕育)請客服入案後，由本所上班時間處理", "a": null}, {"q": "動保案件處理相關", "a": null}, {"q": "1、接獲民眾陳情案件時，首先務必留下陳情人之姓名、聯絡電話(手機)、案發現場地點，並詢問相關案件事發情形後可依下列處理情形辦理。", "a": null}, {"q": "2、動物逸出處理分工權責", "a": null}, {"q": "經濟動物是指：豬、牛、羊、鹿、山豬、鴕鳥。可撥彰化1999請求協助(無法直撥)需提供號碼： (04)753-1999", "a": null}, {"q": "3、動物保護相關案件處理方式如:標準作業流程。", "a": null}]}, {"name": "承辦業務資訊", "items": [{"q": "彰化縣動物防疫所 承辦業務資訊", "a": null}, {"q": "豬禽防疫課", "a": null}, {"q": "獸醫藥政課", "a": null}, {"q": "動物保護課", "a": null}, {"q": "草食防疫課", "a": null}, {"q": "疫病檢驗課", "a": null}]}, {"name": "委外救援", "items": [{"q": "n  緊急救援只針對有立即生命危險之動物，如果單純是虛弱、眼睛分泌物，皮膚病....等等，不屬派員條條件，請民眾自行po網尋求協助。", "a": "委外救援輪值時間表 (連續假期前一日17:00起-為24hH)"}, {"q": "如民眾通報受困案件只聽到聲音但卻現場並無法確認犬貓狀態，無明確資訊供判斷無法派員避免浪費資源。", "a": "陳淑珍_17:00起"}, {"q": "l  如動物沒有立即生命危險均不適用於緊急救援之業務。", "a": "張生錦_17:00起"}, {"q": "l  專線針對急難救援有危及生命危險之犬貓，如卡在車引擎室或卡在牆壁、水溝、天花板等需要工具拆除等，請民眾自行救起後，無受傷請民眾原放或將相關資訊po上網找尋愛心人士認領養。", "a": "許鈺雲_17:00起"}, {"q": "l  捕獸夾案件：通報人需有辦法將受傷犬貓限制在一區域本所才有辦法前往救援，多數捕獸夾案件如犬隻還能移動避免本所到場後動物已不在現場。", "a": "17:00-22:00"}, {"q": "l  受困排水溝或高處案件：本所救援設備只有捕犬網及捕犬桿，太深人員無法下去的水溝為維護人員安全皆無法提供救助，請民眾將案件內容Po在一些動物救援社團請求民間有專業器具之人士協助。", "a": "17:00-22:00"}, {"q": "l  委外救援人員資訊：", "a": "17:00-22:00"}, {"q": "陳淑珍 0971112202", "a": null}, {"q": "張生錦 0972381407", "a": null}, {"q": "許鈺雲 0911111871", "a": null}, {"q": "週一到四，及連假最後一天夜間救援只到10點，", "a": null}, {"q": "如10點後有案件請民眾先行安置，或自行送往配合動物醫院", "a": null}, {"q": "週五17點起~週日22點，都是可緊急救援時段", "a": null}]}, {"name": "115年度 獸醫診療機構", "items": [{"q": "彰化縣115年度配合救援之獸醫診療機構名冊 114/12/30\n配合動物救援人員-陳淑珍0971-112202、張生錦0972-381407 許鈺雲0911-111871\n救援人員資訊請勿洩漏", "a": null}, {"q": "名冊運用方式：提供離民眾最接近的醫院、並留意營業時間", "a": null}, {"q": "如為流浪動物、流浪犬貓，縣府有補助 (簽具切結書)，治療後並收進收容所；防治所提醒，留意民眾是無法將自家寵物以流浪動物之名送醫的(會掃晶片由主人付費) 。如民眾有費用相關問題，建議洽醫院", "a": null}]}, {"name": "QA", "items": [{"q": "民眾發現貓、狗受傷請求救護（上班時間及離線時段）？", "a": "如民眾於路上遇到受傷之犬貓，可請民眾撥打1959動保通報專線，由專線人員指引民眾作後續處理。"}, {"q": "如民眾於路上遇到受傷之犬貓，可請民眾撥打1959動保通報專線，由專線人員指引民眾作後續處理。", "a": "課別：動物保護課\n承辦人：張議仁\n電話及分機：7620774#265"}, {"q": "民眾反映於彰化市市區發現有狗受傷，惟民眾趕著上班，無法在現場陪同等待救護，該如何處理？", "a": "如民眾於路上遇到受傷之犬貓，可請民眾撥打1959動保通報專線，由專線人員指引民眾作後續處理。"}, {"q": "民眾拾獲寵物（烏龜、鸚鵡），希請處理（上班時間及離線時段）？", "a": "上班時間：若發現寵物烏龜或鸚鵡可於上午08:00-12:00、下午01:00-05:00送至本縣動物防疫所協尋飼主。\n\n離線時段：若於非上班期間發現寵物烏龜或鸚鵡，可先將動物放置適合大小紙箱（戳洞紙箱）安置或是置物箱中，可以適當給予飲水，再於上班期間送至本縣動物防疫所。"}, {"q": "民眾發現保育類野生動物受傷，請求緊急救護（上班時間及離線時段）？", "a": "上班時間：民眾救援時可以用毛巾、手套或衣服將受傷動物包覆放置於紙箱(需戳洞)內安置，暫勿餵食、餵水，並於上午8:30-12:00、下午01:30-05:30先撥電話((049-2761331 分機700,725 )至南投野生動物急救站確認狀況後，將其送至該單位進行專業的救護，亦可於上午08:00-12:00、下午01:00-05:00送至本縣動物防疫所進行簡單的救護，再後送至南投野生動物急救站進行專業的救護。"}, {"q": "流浪貓在家附近聚集，請求捕捉？", "a": "目前本縣動物防疫所及各鄉鎮市公所清潔隊，並無捕捉貓隻之服務；但本縣動物防疫所有提供「貓摺疊式誘捕籠」免費外借服務，如有借用需求可請撥打7620774轉261向本縣動物防疫所預約登記，捕捉後可分享免費送養之相關訊息於臉書各鄉鎮大小事等動物專區，請民眾協助轉發認養訊息或請民眾親送至本縣流浪狗中途之家（衛星定位地址：彰化縣芬園鄉大彰路一段875巷直走到底），電話：04-8590638。"}, {"q": "流浪狗破壞農作物，請求捕捉？", "a": "一、目前本縣捕捉流浪犬工作為尊重生命、保護動物，落實精準捕捉及人道捕犬原則，捕捉對象以會追逐或攻擊民眾，或咬傷畜禽，或破壞農作物之流浪犬為優先捕捉對象，如有上述情形，請民眾撥打捕犬專線：04-8590010，並提供流浪犬詳細資訊，錄案後本縣動物防疫所會轉請當地所轄鄉鎮市公所清潔隊執行捕捉。\n\n二、目前本縣捕捉流浪犬工作，各鄉鎮市公所清潔隊可主動出勤捕捉，民眾亦可向當地鄉鎮市公所反映。"}, {"q": "受傷的狗貓很兇，我不敢抓怎麼辦？", "a": "因為動物疼痛的關係所以會有這種反應，一般的愛心民眾會請認識的人或附近民眾協助，先用一大塊布或衣服蓋住受傷動物，防止動物捉咬，隔著布再將動物放置紙箱內即可。"}, {"q": "彰化縣有沒有急診的動物醫院？", "a": "目前彰化沒有24小時急診動物醫院，台中有全國動物醫院(04-23710496)，若沒辦法可以先移至安全地方，等白天再載送至本縣配合動物醫院或本縣流浪狗中之家。"}, {"q": "我在路上遇到路殺的犬、貓屍體怎麼辦?", "a": "民眾可用黑色垃圾袋將犬貓屍體裝袋交由地方清潔隊處理。另如果民眾有愛心的話，動物醫院或網路上皆有相關寵物生命業者可洽詢，衍生出的費用由民眾自行負擔。"}, {"q": "你們公務員都這樣推諉卸責，不救治急難的動物嗎？", "a": "因為目前編制的關係，人員皆有動物救援案件，無法立即前往，請愛心的民眾協助送至本縣配合動物醫院或本縣流浪狗中途之家，為這些動物盡一份心力。"}, {"q": "彰化縣有沒有補助犬貓結紮？", "a": "彰化縣每年皆有絕育補助活動，活動開始時會將相關訊息放至本所官網的活動訊息刊登，請民眾自行參閱。\n有二種補助方式：\n(1)    動物醫院(品種犬貓或混種犬貓即可)：民眾亦可攜帶家中犬貓至與本府配合絕育工作之動物醫院進行絕育，可申請絕育費用部分補助(公犬貓補助800元、母犬貓補助1,500元)，扣除補助費餘下的金額民眾需自行付款。\n(2)    免費混種犬貓3合1活動(限混種犬貓)：免費混種犬貓活動開始時會將相關訊息放至本所官網的「活動訊息」刊登，請民眾自行參閱報名。"}, {"q": "有狗會追車咬人怎麼處理?", "a": "(1)流浪狗：目前本縣捕捉流浪狗工作為尊重生命、保護動物，落實精準捕捉及人道捕犬原則，捕捉對象以會追逐或攻擊民眾，或破壞農作物之流浪犬為優先捕捉對象，如有上述情形，請臺端撥打捕犬專線(04-8590010)，並提供流浪犬詳細資訊，錄案後本縣動物防疫所會轉請當地所轄鄉鎮市公所清潔隊執行捕捉。另目前本縣捕捉流浪狗工作，各鄉鎮市公所清潔隊可主動出勤捕捉，臺端亦可向當地鄉鎮市公所反映。\n\n(2)家犬：請臺端惠予提供相關事證或可供調查之線索至本縣動物防疫所臉書粉絲專頁Messenger，以利稽查人員前往稽查。"}, {"q": "我發現好像有人在虐待狗貓，我要怎麼做？", "a": "如發現動物疑似遭受虐待或傷害案件，請惠予提供案件詳細地址、發生時間、事由及相關證據等資料至本所臉書彰化縣動物防疫所粉絲專頁裡面的Messenger裡面，本所人員將於上班時間盡快回復您，如有問題，請撥打04-7620774。\n\n鄰居家傳來貓/狗慘叫聲，未實際看到但有錄音。→如民眾無法提出具體虐待動物事實，那就會算噪音案件，請民眾直接通報當地派出所，依社會秩序處理法規定辦理。"}, {"q": "我在高速公路或快速道路上遇到遊蕩犬貓再跑，請問該怎麼辦?(111.12.28新增)", "a": "因高速公路及快速道路上車況多且路況危險，無法進行捕捉，可與民眾留下位在南下北上幾公里處，報知公路總局, 0800-231035，請他們派委外工程車協助驅趕動物。\n\n無論是民眾還是高公局來電表示有犬貓死亡/亂竄/受傷等任何情況要求協助，只要於高速公路/快速道路上發生，道路權責是歸屬於高公局非1959，考慮到人員安全性問題我們無法派員處理，需由高公局/公路局或其廠商依權責安排驅趕或救援。\n\n(1)與民眾說明：若為高速公路或快速道路發生之狀況，因考量救援人員執勤時之安全風險，需請高公局進行驅趕或救援。\n▴民眾不接受：因動防所的救援為針對一般道路上有生命危險之犬貓個案，高速公路或快速道路上非動防所權責，故確實若需救援或驅趕等相關作業，都要麻煩您洽高公局由他們安排處理。\n(2)與高公局說明：1959目前為委外緊急救援時段，經動防所專責人員告知針對高速公路或快速道路部分，要請高公局或公路局依其權責協助處理或找合作廠商協助驅趕或進行動物救援作業。"}, {"q": "如民眾反應有發現保育類動物，無論是否有受傷，一律請民眾洽先安置並於上班時間撥打林務暨野生動物保護科。", "a": "◆林務暨野生動物保護科聯絡電話:047531或047531999\n◆若民眾無法安置，則引導打市民專線047531999"}, {"q": "動物卡在會需破壞到他人資產的位置皆無法協助，須請專業人士處理。", "a": "如民眾來電反應有動物卡在自家門縫、門板夾層、任何裝潢、汽車引擎、冷氣機內等等會破壞到通報人或他人資產的位置，請委婉告知：\n“因若破壞到通報人/他人的任何財產無法賠償，且沒有汽修專業技能或破壞傢俱門板水管的相關工具，要麻煩您先聯絡跟造成動物受困主因的相關專業人士處理，謝謝”"}]}, {"name": "狂犬病", "items": [{"q": "狂犬病相關案件處理情形", "a": null}, {"q": "我家的狗、貓每年都要施打狂犬病嗎?未施打狂犬病疫苗，會被開罰嗎?", "a": "若您的愛犬、貓已滿三個月齡以上或注射已逾一年仍未施打狂犬病疫苗，請您攜帶您的愛犬、貓至縣轄內接受委託之動物醫院施打狂犬病疫苗，並於每年補強一次，注射完畢後請為您的寵物戴上注射證明牌，以降低狂犬病由野生動物傳至犬貓的風險。本所將不定期稽查取締，一經查獲未施打狂犬病疫苗者，將依動物傳染病防治條例處以新台幣30,000元以上150,000元以下罰鍰。"}, {"q": "若遺失或損毀狂犬病預防注射證明牌，是否可補發？", "a": "狂犬病預防注射證明牌每年於預防注射後均會核發該年度證明牌，故不進行補發作業。如有遺失或損毀，請備妥預防注射證明書備查即可。"}, {"q": "本縣有狂犬病病例嗎?目前國內發生狀況?", "a": "本縣目前並無狂犬病陽性病例；呼籲民眾應確實遵守「二不一要」－不要棄養寵物，不要接觸及捕捉野生動物，要為家中犬貓每年施打狂犬病疫苗，提升整體免疫覆蓋率，才能確保人畜安全。"}, {"q": "請問彰化縣犬貓有可施打嗎？", "a": "(1)行政院農業委員會動物植物防疫檢疫局之公費疫苗\n僅補助全國各縣市高風險區(案例發生區、原住民山區及案例發生縣市之鼬獾分佈區)，因本縣至今尚無野生動物陽性案例，屬非高風險區，故僅針對野生動物出沒較頻繁的靠山區鄉鎮(二水鄉及芬園鄉)提供免費犬貓狂犬病疫苗施打。\n(2)另本所每年皆有至各鄉鎮市公所辦理「狂犬病預防注射及寵物登記巡迴活動」，活動開始時會將相關訊息放至本所官網的「活動訊息」刊登，請民眾自行參閱。"}]}, {"name": "彰化清潔隊資訊", "items": [{"q": "彰化縣各鄉鎮市清潔隊聯絡電話", "a": null}]}, {"name": "流浪犬案件處理", "items": [{"q": "流浪犬案件處理情形", "a": null}, {"q": "彰化縣流浪狗中途之家電話、住址及開放時間為何?", "a": "1.電話為04-8590638。\n2.地址為芬園鄉大彰路一段875巷巷底(衛星定位找的到)。\n3.開放時間除了星期五(消毒日)、營業時間為上午10點~12點、下午2點~4點。"}, {"q": "我撿到流浪狗可以送交哪個單位收容?", "a": "請民眾先協助送往鄰近動物醫院掃瞄有無晶片，如果無晶片，再請民眾協助於臉書PO文協尋主人亦可送交本縣流浪狗中途之家收容。\n2、另如果在路上有看到幼犬貓，請告知民眾因本縣收容所收容量能有限，考量幼犬貓未不會有追人追車影響民眾安全之虞慮，且幼犬貓因免疫抵抗力較差，死亡率較高，煩請民眾協助分享至各大鄉鎮大小事社團或動物救援社團請求愛心人士及愛心團體協助；真無法處理才送本縣流浪狗中途之家收容。\n由於彰化縣動物收容所量能已不足，如有接到拾獲流浪貓狗想要送往的案件，請先提供動防所的電話 04-7620774 ，讓民眾於上班時間先撥打電話詢問是否還有空間可收容，請勿直接請民眾送過去。"}, {"q": "我的狗很兇會咬人，但有幼兒無法繼續飼養怎麼辦?", "a": "建議可先幫愛犬找尋合適的飼主飼養，讓牠有一個溫暖的家。動物保護法第5條第3項規定:「飼主飼養之動物，除得交送動物收容處所或直轄市、縣(市)主管機關指定之場所收容處理外，不得棄養。」如果無法找尋合適之飼主，可自己將家中犬隻送至本縣流浪狗中途之家辦理不擬飼養，費用為有寵物登記且絕育2000元，無其中一項者收費4000元，電話: 04-8590638 衛星導航地址：彰化縣芬園鄉大彰路一段875巷(直走到底)。"}, {"q": "認養小狗需要哪些條件?哪時可去?認養手續?", "a": "年滿18歲之民眾攜帶身份證明文件，開放時間除了星期五(消毒日)、營業時間為上午10點~12點、下午2點~4點，並可攜帶犬隻牽繩或籠子以便將犬隻帶回。如有問題，可撥打彰化縣流浪狗中途之家04-8590638詢問。"}]}, {"name": "野生動物救援", "items": [{"q": "野生動物救援流程", "a": null}, {"q": "接獲民眾、消防局、警察局通報有受傷之野生動物", "a": null}, {"q": "請民眾先確認是否受傷？", "a": "當野生動物動也不動時，可能是牠的習性或本能反應，不一定是受傷或生病。"}, {"q": "有以下狀況時，不需救援", "a": null}, {"q": "幼雛（落巢）、練飛的小鳥", "a": "請民眾檢視周圍是否有鳥巢？若有"}, {"q": "夜鷹的幼鳥", "a": "習性：休息時蹲伏在地面動也不動，宛若石頭、枯木"}, {"q": "幼年野兔", "a": "習性：躲在草地，兔媽媽常常不在身邊。"}, {"q": "有明顯受傷者，請民眾協助先給予動物一個適合暫養的環境，待上班日再送至本所，上班時間08-00-17:00，或撥打04-7620774詢問。", "a": null}, {"q": "減少人為干擾並給予充分的休息", "a": null}, {"q": "過度人為干擾會使野生動物產生緊迫，引發休克，這也是造成死亡的最大原因。處理傷病野生動物首先要降低緊迫因子讓動物處於休息狀態，將動物安置在適當大小且有蓋的紙箱子中，在紙箱周圍戳一些小洞通風，箱內放置乾淨柔軟的紙巾或衣物，使牠有安心的著地感。", "a": null}, {"q": "勿使用籠子安置野生鳥類－鐵絲籠網目會使野生鳥類受傷", "a": null}, {"q": "若要安置鳥類，使用紙箱是比較合適的；野生鳥類容易因緊迫而在籠子內衝撞，在過程中讓自己受傷，網目也可能會卡四肢或使飛羽折損，在拉扯時讓傷勢更嚴重。安置野生鳥類時可使用紙箱，來將鳥類的視覺與外部活動的人類隔離，減低驚嚇。", "a": null}]}, {"name": "動物逸出處理單位", "items": [{"q": "動物逸出處理人員名單(非上班日)(附件1)", "a": null}, {"q": "動物逸出種類", "a": "權責單位"}, {"q": "經濟動物：豬、牛、羊、鹿、山豬、鴕鳥。", "a": "縣政府 畜產科"}, {"q": "經濟動物：豬(山豬、麝香豬)家禽等配合畜產科麻醉藥使用。", "a": "動物防疫所豬禽防疫課"}, {"q": "經濟動物：草食動物(牛、羊、鹿)等配合畜產科麻醉藥使用。", "a": "動物防疫所草食防疫課"}, {"q": "受傷犬、貓。", "a": "動物防疫所動物保護課"}, {"q": "受傷野生動物。(石虎除外)", "a": "動物防疫所動物保護課"}, {"q": "野生動物：台灣獼猴、鹿、眼鏡蛇、穿山甲、馬來熊、河馬、獅子、食蛇龜、鯨豚、白鼻心、山羌、雉類、石虎、蟒蛇類、龜類、綠鬣蜥、鸚鵡等。", "a": "縣政府\n林務暨野生動物保護科"}]}, {"name": "禽流感", "items": [{"q": "禽流感疫情相關參閱資料", "a": null}, {"q": "養禽業者應如何觀察家禽健康狀況是否異常? 如有疫情如何通報?", "a": "(一)養禽場如有以下異常情況，請畜主主動通報地方動物防疫機關，以利即時檢除病原：\n1.連續兩天，每天化製率大於或等於登記飼養頭數之1%（1,000隻中連續兩天，每天死亡禽隻數皆大於或等於10隻）。\n2.單日化製率大於或等於登記飼養頭數之1.5%（1,000隻中連續兩天，每天死亡禽隻數皆大於或等於15隻）。\n3.禽場家禽飲水量、攝食量或產蛋率下降大於5%。\n\n(二)依畜牧法第9條規定，畜牧場應置獸醫師或有特約獸醫師，遇有家畜、家禽發病率達10%以上時，應於24小時內通報當地鄉鎮市公所獸醫或動物防疫機關(04-7620774)。"}, {"q": "政府如何積極防治禽流感的發生與傳染", "a": "1.為強化業者主動通報誘因，提升禽流感防治效率，凡主動通報後，採預防性撲殺或確診為H5N1、H5N2、H5N5、H5N6及H5N8高病原性禽流感案例者，撲殺動物依評價額補償6成；如預防性撲殺後，最後檢驗結果為高或低病原性禽流感者，撲殺動物均以評價額以內補償。\n\n2.家禽畜牧場或飼養場務必依本縣公告之「H5、H7亞型禽流感防治措施」中各項軟、硬體生物安全作為，違反者將依「動物傳染病防治條例」規定處以3萬元以上15萬元以下罰鍰，並限期改善其防疫設施，落實自主管理。\n\n3. 加強高風險地區禽場家禽流行性感冒監測措施，分二階段實施，第一階段實施時間自 111年 10 月 01 日至 111 年 12 月 31 日止，第二階段實施時間自112 年 01 月 01 日至 112 年 03 月 31 日止，針對本縣轄內高風險區（H5、H7亞型禽流感防治措施稽查列管場與理貨場及前2年禽流感案例場等熱區優先）辦理採樣監測工作，第一階段於實施範圍內採樣陸禽30場及水禽42場，第二階段於實施範圍內採樣陸禽12場及水禽32場。"}, {"q": "民眾去賞鳥或餵鴿子會感染到禽流感嗎？", "a": "目前國內發生的H5N5、H5N6、H5N8及最近發生之H5N2、H5N1禽流感病毒，除H5N1、H5N6與H5N8分別在印度、英國、美國、中國大陸及俄羅斯造成少數人類感染外，沒有證據顯示會造成人類大規模感染，顯示正常情形下，不刻意接觸鳥類感染禽流感之風險極低，但為降低風險，還是應避免親密接觸禽鳥如餵食鴿子或其他禽鳥。若不慎碰觸或衣物沾到鳥糞，應立即用肥皂澈底清洗。建議若有野外賞鳥行程時，採遠距離以望遠鏡賞鳥，減少與禽鳥接觸機會，也避免干擾禽鳥生活。"}, {"q": "一般民眾要如何預防禽流感？", "a": "一般民眾需配合以下事項就可避免感染的風險:\n1.禽肉蛋類要「充分煮熟」才食用。\n2.要經常用肥皂洗手。\n3.不接觸、餵飼禽鳥。\n4.不購買來路不明禽鳥及產品。\n5.不自行宰殺禽鳥食用。\n6.不去養禽場及屠宰場。\n7.有感冒徵候，應立即戴口罩儘速就醫。"}, {"q": "家裡如果有養寵物禽鳥，要注意什麼？", "a": "家裡有養寵物禽鳥的朋友，應避免讓您的寵物禽鳥與野鳥接觸，清理其排泄物時宜戴口罩及膠質手套，清理完畢應用肥皂洗淨雙手；如寵物禽鳥死亡需以一般廢棄物標準處理，千萬不要任意棄置。"}]}, {"name": "非洲豬瘟", "items": [{"q": "非洲豬瘟疫情相關參閱資料", "a": null}, {"q": "感染非洲豬瘟的豬隻會發生什麼症狀？如何看出豬隻已被傳染？", "a": "1.\t發病豬隻，特徵為發高熱及皮膚呈現紫斑點，全身內臟的出血，尤以淋巴結，腎臟和腸粘膜最明顯。\n2.\t病程分甚急、急、亞急與慢性等四種。甚急性：發燒、突然死亡，無其他症狀。急性：高燒、食慾尚有、死亡前食慾廢絕、呼吸快、精神不良、四肢、耳、皮膚發紺、嘔吐、下痢、死亡，為期7天。亞急性：發燒，3-4星期。慢性：病狀不明顯，持續數月。"}, {"q": "如果在購物網站買東西，收國外疫區肉製品贈品該怎麼做？", "a": "民眾如持有來源不明肉品，應送交行政院農業委員會動植物防疫檢疫局各分局處理"}, {"q": "民眾該如何防範非洲豬瘟入侵與配合政府政策?", "a": "民眾或是旅客常因好奇，或是自中國大陸等非洲豬瘟疫區國家攜帶家畜肉類產品、伴手禮入境與親朋好友分享。再次呼籲為防範疫病入侵，請出入境旅客勿攜帶家畜肉類產品、含肉製品之伴手禮入境，以免受罰，共同維護我國農畜產業生產安全"}, {"q": "國人或外籍配偶(移工)到非洲豬瘟疫區國家應注意那些事項？", "a": "避免畜牧場參觀訪問或接觸動物，請勿攜帶動物產品（如：生肉、火腿、含肉類月餅、肉乾、香腸等加工食品）返國。"}, {"q": "請問現在養豬還可以餵廚餘嗎?", "a": "非經申請許可，不得餵廚餘。\n依據行政院農業委員會110年9月29日農牧自第1101472576號函公告，「禁止搬運廚餘至豬隻飼養場所及廚餘不得作為飼料或飼料添加物使用」。自9月29日起全國禁止廚餘進入養豬場，違者依飼料管理法處3萬元至300萬元罰鍰，及動物傳染病防治條例處5萬至100萬元罰鍰。"}]}, {"name": "藥物殘留", "items": [{"q": "藥物殘留及動物用藥品相關參閱資料", "a": null}, {"q": "如果畜牧場被檢出藥物殘留，請問會如何處理？", "a": "（一）如果檢出藥物殘留標準符合動物用藥殘留標準，防疫所會對檢出藥殘的牧場訪查是否依動物用藥品管理法規定使用藥物，如未依法使用藥物會處以新台幣3萬元至15萬元罰鍰並公告。\n（二）如果檢出藥物殘留標準未符合動物用藥殘留標準，防疫所會對檢出藥殘的牧場進行移動管制，經複檢合格後才可解除，並訪查是否依動物用藥品管理法規定使用藥物，如未依法使用藥物會處以新台幣3萬元至15萬元罰鍰並公告。"}, {"q": "如果畜禽產品在超商、市場檢出藥物殘留，請問會如何處理？", "a": "(一) 會請市場採樣單位提供來源牧場給防疫所，並請當地衛生局依食品衛生管理法處置。\n（二）如果經檢畜禽產品殘留標準符合動物用藥殘留標準，防疫所會對來源牧場訪查是否依動物用藥品管理法規定使用藥物，如未依法使用藥物會處以新台幣3萬元至15萬元罰鍰並公告。\n（三）如果經檢畜禽產品未符合動物用藥殘留標準，防疫所會對來源牧場進行移動管制，經複檢合格後才可解除，並訪查是否依動物用藥品管理法規定使用藥物，如未依法使用藥物會處以新台幣3萬元至15萬元罰鍰並公告"}, {"q": "動物用藥品是否可自行販賣?具備那些資格條件才能申請動物用藥品販賣業許可證?", "a": "1.販賣動物用藥品，應向所在地直轄市或縣 (市) 主管機關申請，經審查合格並核發動物用藥品販賣業許可證後，始得登記營業，未具販賣業許可證擅自販售得處新臺幣九萬元以上四十五萬元以下罰鍰。2.具備下列各款資格條件之一者，得申請動物用藥品販賣業許可證：\n一、依法設立登記且經營動物用藥品批發、零售、輸入或輸出業務之公司或商號。\n二、依法設立登記且經營觀賞魚非處方藥品零售業務之公司或商號。\n三、在製造處所經營自製產品零售業務之動物用藥品製造業者。\n四、依法設立且經營動物用藥品零售業務之獸醫診療機構。\n五、依法設立且經營動物用藥品零售業務之農會、漁會、農業合作社。\n前項申請者，不得有經直轄市、縣（市）主管機關依第十條第二項、\n第十七條第一項第一款或本法第三十條規定廢止動物用藥品販賣業\n許可證未滿二年之情事。"}]}, {"name": "疫病檢驗相關", "items": [{"q": "疫病檢驗相關參閱資料", "a": null}, {"q": "畜主所飼養的動物如有大量死亡時，應如何處置？", "a": "1.家畜禽若發生大量死亡時，可先通知場內特約獸醫師，確認是否為傳染病致死。\n2.如懷疑為傳染病或需進行病性鑑定時，請與本縣動物防疫所聯繫(電話04-7620774)或撥打疫病檢驗課承辦，將儘速派員至現場採樣。\n3.水產動物如大量死亡時，請先停止餵飼以免污染水質，只能少量換水以免造成水質急遽變化，注意氣溫及溶氧，未確認死亡的原因之前，不可貿然投藥，以免造成魚隻更多的死亡，並請與本縣動物防疫所聯繫，將儘速派員至現場採樣。"}, {"q": "我們家旁的大排發現雞、鴨、鵝、豬、魚等動物的屍體，應如何處置？", "a": "請撥打環保局報案專線電話，本權責單位應善盡管理之責，由權責單位打撈後，豬隻部分因應非洲豬瘟之防疫工作，禽類部分(單一種類3隻以上)因應高病原家禽流行性感冒之防疫工作，由本所採樣送行政院農業委員會衛生試驗所檢驗。"}]}]}};

      return parsed;
    } catch(e) {}
  }
  return JSON.parse(JSON.stringify(QA_DATA));
}

// ==================== INIT ====================
function init() {
  renderMarquee();
  renderCityTabs();
  switchCity(currentCity);
}

// ==================== MARQUEE ====================
function renderMarquee() {
  const section = document.getElementById('marqueeSection');
  section.innerHTML = '';
  const toShow = marqueeData.filter(m => m.text.trim());
  if (!toShow.length) { section.style.display='none'; return; }
  section.style.display='block';
  toShow.forEach(m => {
    const row = document.createElement('div');
    row.className = 'marquee-row';
    const label = m.scope === 'all' ? '📢 全站公告' : `📌 ${m.scope}`;
    const color = m.scope === 'all' ? '#4A5568' : CITY_COLORS[m.scope];
    row.innerHTML = `<span class="marquee-label" style="background:${color}">${label}</span>
      <div class="marquee-track"><div class="marquee-content">${escHtml(m.text)}</div></div>`;
    section.appendChild(row);
  });
}

// ==================== CITY TABS ====================
function renderCityTabs() {
  const tabs = document.getElementById('cityTabs');
  tabs.innerHTML = '';
  CITIES.forEach(city => {
    const btn = document.createElement('button');
    btn.className = 'city-tab' + (city === currentCity ? ' active' : '');
    btn.style.setProperty('--city-color', CITY_COLORS[city]);
    btn.innerHTML = `<span class="city-tab-dot" style="background:${CITY_COLORS[city]}"></span>${city}`;
    btn.onclick = () => switchCity(city);
    tabs.appendChild(btn);
  });
}

function switchCity(city) {
  currentCity = city;
  currentTopic = null;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('mainLayout').style.display = 'flex';
  renderCityTabs();
  renderSidebar();
  renderContent();
}

// ==================== SIDEBAR ====================
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const cityData = db[currentCity];
  sidebar.innerHTML = `<div class="sidebar-title">主題大綱</div>`;
  cityData.topics.forEach((topic, idx) => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-item' + (idx === currentTopic ? ' active' : '');
    btn.style.setProperty('--city-color', CITY_COLORS[currentCity]);
    const count = topic.items.length;
    btn.innerHTML = `${topic.name}<span class="count-badge" style="background:${idx===currentTopic?CITY_COLORS[currentCity]:'#E2E8F0'};color:${idx===currentTopic?'#fff':'#718096'}">${count}</span>`;
    btn.onclick = () => {
      currentTopic = idx;
      renderSidebar();
      document.getElementById('topic_' + idx)?.scrollIntoView({behavior:'smooth', block:'start'});
    };
    sidebar.appendChild(btn);
  });
}

// ==================== CONTENT ====================
function renderContent() {
  const content = document.getElementById('content');
  const cityData = db[currentCity];
  const color = CITY_COLORS[currentCity];

  let html = `<div class="section-header">
    <div class="section-title" style="color:${color}">📍 ${currentCity} 動物保護</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="section-badge" style="background:${color}">${cityData.topics.reduce((s,t)=>s+t.items.length,0)} 筆資料</span>
      <button class="btn-add-topic" id="addTopicBtn" style="background:${color};display:${adminMode?'flex':'none'}" onclick="openAddTopicHere()">＋ 新增主題</button>
    </div>
  </div>`;

  cityData.topics.forEach((topic, tIdx) => {
    const isOpen = true; // default open
    html += `<div class="topic-section city-${currentCity}" id="topic_${tIdx}" style="--city-color:${color}">
      <div class="topic-header" onclick="toggleTopic(${tIdx})">
        <h2>${escHtml(topic.name)}</h2>
        <button class="topic-add-btn" id="topicAddBtn_${tIdx}" style="display:${adminMode?'flex':'none'}" onclick="event.stopPropagation();openAddQA('${currentCity}',${tIdx})">＋ 新增Q&A</button>
        <span class="topic-toggle open" id="topicToggle_${tIdx}">▾</span>
      </div>
      <div class="topic-body open" id="topicBody_${tIdx}">`;

    topic.items.forEach((item, iIdx) => {
      if (item.a) {
        // Link detection
        const aHtml = linkify(escHtml(item.a));
        html += `<div class="qa-card">
          <div class="qa-question" onclick="toggleQA(${tIdx},${iIdx})">
            <div class="qa-q-icon">Q</div>
            <div class="qa-q-text">${escHtml(item.q)}</div>
            <div class="qa-actions" id="qaAct_${tIdx}_${iIdx}" style="display:${adminMode?'flex':'none'}">
              <button class="qa-edit-btn" onclick="event.stopPropagation();openEditQA('${currentCity}',${tIdx},${iIdx})">✏ 編輯</button>
              <button class="qa-del-btn" onclick="event.stopPropagation();deleteQA('${currentCity}',${tIdx},${iIdx})">🗑</button>
            </div>
            <span class="qa-chevron" id="qaChev_${tIdx}_${iIdx}">▾</span>
          </div>
          <div class="qa-answer" id="qaAns_${tIdx}_${iIdx}">
            <div class="qa-a-text">${aHtml}</div>`;
        if (item.imgs && item.imgs.length) {
          html += `<div class="qa-img-wrap">` + item.imgs.map(img=>`<img src="${img}" onclick="openLightbox('${img}')" alt="附圖">`).join('') + `</div>`;
        }
        html += `</div></div>`;
      } else {
        // Info-only card
        html += `<div class="info-card">${linkify(escHtml(item.q))}</div>`;
      }
    });

    html += `</div></div>`;
  });

  content.innerHTML = html;
}

function toggleTopic(idx) {
  const body = document.getElementById('topicBody_' + idx);
  const toggle = document.getElementById('topicToggle_' + idx);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

function toggleQA(tIdx, iIdx) {
  const ans = document.getElementById(`qaAns_${tIdx}_${iIdx}`);
  const chev = document.getElementById(`qaChev_${tIdx}_${iIdx}`);
  ans.classList.toggle('open');
  chev.classList.toggle('open');
}

// ==================== SEARCH ====================
function doSearch(query) {
  query = query.trim();
  if (!query) {
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('mainLayout').style.display = 'flex';
    return;
  }
  document.getElementById('mainLayout').style.display = 'none';
  const sr = document.getElementById('searchResults');
  sr.style.display = 'block';

  const q = query.toLowerCase();
  let hits = [];
  CITIES.forEach(city => {
    db[city].topics.forEach((topic, tIdx) => {
      topic.items.forEach((item, iIdx) => {
        const qMatch = item.q && item.q.toLowerCase().includes(q);
        const aMatch = item.a && item.a.toLowerCase().includes(q);
        if (qMatch || aMatch) {
          hits.push({city, topic: topic.name, item, tIdx, iIdx});
        }
      });
    });
  });

  if (!hits.length) {
    sr.innerHTML = `<div class="no-results">🔍 未找到「${escHtml(query)}」的相關資料</div>`;
    return;
  }

  let html = `<div class="section-header"><div class="section-title">搜尋結果：「${escHtml(query)}」（${hits.length} 筆）</div></div>`;
  hits.forEach(({city, topic, item, tIdx, iIdx}) => {
    const color = CITY_COLORS[city];
    const qHl = highlight(escHtml(item.q), query);
    const aHl = item.a ? highlight(escHtml(item.a.substring(0,150)), query) : '';
    html += `<div class="search-hit" onclick="goToResult('${city}',${tIdx},${iIdx})">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="search-city-label" style="background:${color}">${city}</span>
        <span class="search-hit-topic">› ${escHtml(topic)}</span>
      </div>
      <div class="search-hit-q">${qHl}</div>
      ${aHl ? `<div class="search-hit-a">${aHl}${item.a.length>150?'…':''}</div>` : ''}
    </div>`;
  });
  sr.innerHTML = html;
}

function goToResult(city, tIdx, iIdx) {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('mainLayout').style.display = 'flex';
  if (city !== currentCity) switchCity(city);
  setTimeout(() => {
    const el = document.getElementById(`topic_${tIdx}`);
    if (el) el.scrollIntoView({behavior:'smooth'});
    const body = document.getElementById(`topicBody_${tIdx}`);
    if (body && !body.classList.contains('open')) toggleTopic(tIdx);
    const ans = document.getElementById(`qaAns_${tIdx}_${iIdx}`);
    if (ans && !ans.classList.contains('open')) toggleQA(tIdx, iIdx);
  }, 100);
}

// ==================== ADMIN ====================
function openAdmin() {
  if (!adminMode) {
    document.getElementById('loginOverlay').classList.add('open');
    setTimeout(()=>document.getElementById('loginInput').focus(), 100);
  } else {
    showAdminModal();
  }
}

function closeLogin() {
  document.getElementById('loginOverlay').classList.remove('open');
  document.getElementById('loginInput').value = '';
  document.getElementById('loginError').style.display = 'none';
}

function doLogin() {
  const pw = document.getElementById('loginInput').value;
  if (pw === '1959') {
    adminMode = true;
    closeLogin();
    renderContent();
    showAdminModal();
    toast('✅ 已進入編輯模式');
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginInput').value = '';
    document.getElementById('loginInput').focus();
  }
}

function showAdminModal() {
  renderMarqueeEditors();
  document.getElementById('adminCitySelect').value = currentCity;
  document.getElementById('adminModal').classList.add('open');
}

function closeAdmin() {
  document.getElementById('adminModal').classList.remove('open');
}

function saveAdminAndClose() {
  // Save marquee
  const editors = document.querySelectorAll('.marquee-editor-row');
  marqueeData = [];
  editors.forEach(row => {
    const scope = row.querySelector('select').value;
    const text = row.querySelector('input').value.trim();
    if (text) marqueeData.push({scope, text});
  });
  localStorage.setItem('marquee_data', JSON.stringify(marqueeData));
  renderMarquee();
  closeAdmin();
  toast('✅ 設定已儲存');
}

function renderMarqueeEditors() {
  const container = document.getElementById('marqueeEditors');
  container.innerHTML = '';
  const toEdit = marqueeData.length ? marqueeData : [{scope:'all',text:''}];
  toEdit.forEach((m, idx) => addMarqueeEditorRow(m.scope, m.text, idx));
}

function addMarqueeEditorRow(scope='all', text='', idx) {
  const container = document.getElementById('marqueeEditors');
  if (container.children.length >= 3) { toast('⚠ 最多3條跑馬燈'); return; }
  const row = document.createElement('div');
  row.className = 'marquee-editor-row';
  row.innerHTML = `<select><option value="all">全站</option>${CITIES.map(c=>`<option value="${c}" ${scope===c?'selected':''}>${c}</option>`).join('')}</select>
    <input type="text" placeholder="輸入公告文字" value="${escHtml(text)}">
    <button class="btn-del-marquee" onclick="this.parentElement.remove()">✕</button>`;
  container.appendChild(row);
}

function addMarqueeEditor() {
  addMarqueeEditorRow();
}

function addTopic() {
  const city = document.getElementById('adminCitySelect').value;
  const name = document.getElementById('newTopicName').value.trim();
  if (!name) { toast('⚠ 請輸入主題名稱'); return; }
  db[city].topics.push({name, items: []});
  saveData();
  document.getElementById('newTopicName').value = '';
  if (city === currentCity) renderContent();
  renderSidebar();
  toast('✅ 主題已新增');
}

function openAddTopicHere() {
  document.getElementById('adminCitySelect').value = currentCity;
  showAdminModal();
}

// ==================== QA EDIT ====================
function openAddQA(city, tIdx) {
  editingItem = {city, tIdx, iIdx: -1};
  pendingImgs = [];
  document.getElementById('qaModalTitle').textContent = '➕ 新增 Q&A';
  document.getElementById('qaCity').value = city;
  updateQaTopicSelect(city, tIdx);
  document.getElementById('qaQ').value = '';
  document.getElementById('qaA').value = '';
  document.getElementById('imgPreview').innerHTML = '';
  document.getElementById('qaModal').classList.add('open');
}

function openEditQA(city, tIdx, iIdx) {
  editingItem = {city, tIdx, iIdx};
  pendingImgs = [];
  const item = db[city].topics[tIdx].items[iIdx];
  document.getElementById('qaModalTitle').textContent = '✏ 編輯 Q&A';
  document.getElementById('qaCity').value = city;
  updateQaTopicSelect(city, tIdx);
  document.getElementById('qaQ').value = item.q || '';
  document.getElementById('qaA').value = item.a || '';
  pendingImgs = (item.imgs || []).slice();
  renderImgPreview();
  document.getElementById('qaModal').classList.add('open');
}

function updateQaTopicSelect(city, selectedIdx) {
  const sel = document.getElementById('qaTopic');
  sel.innerHTML = db[city].topics.map((t,i)=>`<option value="${i}" ${i===selectedIdx?'selected':''}>${escHtml(t.name)}</option>`).join('');
}

function closeQaModal() {
  document.getElementById('qaModal').classList.remove('open');
  editingItem = null;
  pendingImgs = [];
}

function saveQaItem() {
  const city = document.getElementById('qaCity').value;
  const tIdx = parseInt(document.getElementById('qaTopic').value);
  const q = document.getElementById('qaQ').value.trim();
  const a = document.getElementById('qaA').value.trim();
  if (!q) { toast('⚠ 請輸入問題'); return; }
  const item = {q, a: a || null, imgs: pendingImgs.length ? pendingImgs : undefined};
  if (editingItem && editingItem.iIdx >= 0) {
    db[city].topics[tIdx].items[editingItem.iIdx] = item;
    toast('✅ 已更新');
  } else {
    db[city].topics[tIdx].items.push(item);
    toast('✅ 已新增');
  }
  saveData();
  closeQaModal();
  if (city === currentCity) { renderContent(); renderSidebar(); }
}

function deleteQA(city, tIdx, iIdx) {
  if (!confirm('確定刪除此 Q&A？')) return;
  db[city].topics[tIdx].items.splice(iIdx, 1);
  saveData();
  renderContent();
  renderSidebar();
  toast('🗑 已刪除');
}

// ==================== IMG UPLOAD ====================
function handleImgUpload(input) {
  const files = Array.from(input.files);
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      pendingImgs.push(e.target.result);
      renderImgPreview();
    };
    reader.readAsDataURL(f);
  });
  input.value = '';
}

function renderImgPreview() {
  const preview = document.getElementById('imgPreview');
  preview.innerHTML = pendingImgs.map((src,i)=>`<img src="${src}" onclick="openLightbox('${src}')" alt="預覽">`).join('');
}

// ==================== LIGHTBOX ====================
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ==================== UTILS ====================
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function linkify(html) {
  // Find URLs and make them clickable
  return html.replace(/(https?:\/\/[^\s&lt;&gt;"]+)/g, '<a href="$1" target="_blank" class="qa-a-link">$1</a>');
}

function highlight(text, query) {
  const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== START ====================
init();
</script>
