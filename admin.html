<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理 · 動物保護資訊系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

<!-- Login Screen -->
<div class="admin-login" id="login-screen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">後台管理</div>
    <div class="login-sub">動物保護資訊查詢系統</div>
    <div class="form-group">
      <label>管理密碼</label>
      <input type="password" id="pw-input" placeholder="輸入密碼" autocomplete="current-password">
      <div class="error-msg" id="pw-error">密碼錯誤，請重試</div>
    </div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">登入</button>
    <div style="margin-top:16px">
      <a href="index.html" style="font-size:0.85rem;color:var(--text-light)">← 回查詢首頁</a>
    </div>
  </div>
</div>

<!-- Admin Panel (hidden until login) -->
<div id="admin-panel" style="display:none">

  <!-- Header -->
  <header class="admin-header">
    <div class="admin-title">⚙ 後台管理 · 動物保護資訊系統</div>
    <div class="admin-actions">
      <button class="btn btn-success" onclick="exportJSON()">📥 匯出 JSON</button>
      <label class="btn btn-secondary" style="cursor:pointer">
        📤 匯入 JSON
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(this)">
      </label>
      <button class="btn btn-secondary" onclick="clearStorage()">🗑 清除暫存</button>
      <a href="index.html" class="btn btn-secondary">← 回首頁</a>
      <button class="btn btn-danger" onclick="doLogout()">登出</button>
    </div>
  </header>

  <!-- Layout -->
  <div class="admin-layout">

    <!-- Sidebar: County Select -->
    <div class="admin-sidebar">
      <div class="admin-sidebar-title">縣市</div>
      <div id="admin-county-nav"></div>
    </div>

    <!-- Main Content -->
    <div class="admin-content">

      <!-- Marquee Edit -->
      <div class="admin-section">
        <div class="admin-section-title">📢 跑馬燈文字</div>
        <div class="marquee-edit">
          <textarea id="marquee-input" placeholder="輸入跑馬燈公告文字…"></textarea>
          <button class="btn btn-primary" onclick="saveMarquee()">儲存</button>
        </div>
      </div>

      <!-- Topic & Items -->
      <div class="admin-section">
        <div class="admin-section-title" style="justify-content:space-between">
          <span>📚 主題與資料管理</span>
          <button class="btn btn-success" style="font-size:0.85rem;padding:6px 14px" onclick="openAddTopic()">＋ 新增主題</button>
        </div>
        <div class="topic-tree" id="admin-topic-tree"></div>
      </div>

    </div>
  </div>
</div>

<!-- Modal: Add/Edit Topic -->
<div class="modal-overlay hidden" id="modal-topic">
  <div class="modal">
    <div class="modal-title" id="modal-topic-title">新增主題</div>
    <div class="form-group">
      <label>主題名稱</label>
      <input type="text" id="topic-name-input" placeholder="例：服務時間與聯繫">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-topic')">取消</button>
      <button class="btn btn-primary" onclick="saveTopic()">儲存</button>
    </div>
  </div>
</div>

<!-- Modal: Confirm Delete -->
<div class="modal-overlay hidden" id="modal-confirm">
  <div class="modal" style="max-width:420px">
    <div class="modal-title">⚠ 確認刪除</div>
    <p id="confirm-msg" style="color:var(--text-sub);font-size:0.95rem;margin-bottom:10px"></p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-confirm')">取消</button>
      <button class="btn btn-danger" id="confirm-ok-btn">確認刪除</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  let appData = null;
  let currentCountyId = null;
  let editingTopicIdx = null;
  let confirmCallback = null;

  /* ════════════════════════
     LOGIN
  ════════════════════════ */
  window.doLogin = function() {
    const pw = document.getElementById('pw-input').value;
    loadData(() => {
      const expected = (appData.settings && appData.settings.admin_password) || '1959';
      if (pw === expected) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('pw-error').classList.remove('show');
        buildAdminUI();
      } else {
        document.getElementById('pw-error').classList.add('show');
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    });
  };

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  window.doLogout = function() {
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
  };

  /* ════════════════════════
     DATA LOAD / SAVE
  ════════════════════════ */
  function loadData(cb) {
    if (appData) { cb && cb(); return; }
    const saved = localStorage.getItem('animalData');
    if (saved) {
      try { appData = JSON.parse(saved); cb && cb(); return; } catch(e) {}
    }
    fetch('data.json')
      .then(r => r.json())
      .then(d => { appData = d; cb && cb(); })
      .catch(() => {
        toast('無法載入資料', 'err');
        appData = { counties: [], settings: { admin_password: '1959', site_title: '動物保護資訊查詢系統' } };
        cb && cb();
      });
  }

  function saveData() {
    localStorage.setItem('animalData', JSON.stringify(appData));
    toast('已儲存至瀏覽器暫存', 'ok');
  }

  window.exportJSON = function() {
    if (!appData) return;
    const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'data.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('已匯出 data.json', 'ok');
  };

  window.importJSON = function(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        appData = JSON.parse(e.target.result);
        saveData();
        buildAdminUI();
        toast('匯入成功', 'ok');
      } catch(err) {
        toast('JSON 格式錯誤', 'err');
      }
    };
    reader.readAsText(file);
    input.value = '';
  };

  window.clearStorage = function() {
    if (!confirm('確定清除瀏覽器暫存？清除後將重新讀取 data.json。')) return;
    localStorage.removeItem('animalData');
    appData = null;
    loadData(() => { buildAdminUI(); toast('已清除暫存', 'ok'); });
  };

  /* ════════════════════════
     BUILD UI
  ════════════════════════ */
  function buildAdminUI() {
    buildCountyNav();
    if (appData.counties && appData.counties.length > 0) {
      selectAdminCounty(currentCountyId || appData.counties[0].id);
    }
  }

  function buildCountyNav() {
    const nav = document.getElementById('admin-county-nav');
    nav.innerHTML = '';
    (appData.counties || []).forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'admin-county-btn';
      btn.dataset.id = c.id;
      btn.style.backgroundColor = c.color || '#888';
      btn.textContent = c.name;
      btn.addEventListener('click', () => selectAdminCounty(c.id));
      nav.appendChild(btn);
    });
  }

  function selectAdminCounty(id) {
    currentCountyId = id;
    document.querySelectorAll('.admin-county-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.id === id);
    });
    const county = getCounty();
    if (!county) return;
    document.getElementById('marquee-input').value = county.marquee || '';
    renderAdminTopics();
  }

  function getCounty() {
    return (appData.counties || []).find(c => c.id === currentCountyId);
  }

  /* ════════════════════════
     NORMALIZE IMAGES
     向下相容: image string → images array
  ════════════════════════ */
  function getImages(item) {
    if (item.images && Array.isArray(item.images)) return item.images;
    if (item.image && typeof item.image === 'string') return [item.image];
    return [];
  }

  /* ════════════════════════
     RENDER ADMIN TOPICS
  ════════════════════════ */
  function renderAdminTopics() {
    const county = getCounty();
    if (!county) return;
    const tree = document.getElementById('admin-topic-tree');
    tree.innerHTML = '';

    (county.topics || []).forEach((topic, ti) => {
      const node = document.createElement('div');
      node.className = 'topic-node';
      node.dataset.ti = ti;

      const hd = document.createElement('div');
      // Default open
      hd.className = 'topic-node-hd open';
      hd.innerHTML = `
        <span class="topic-node-title">${escHtml(topic.title)}</span>
        <span class="topic-node-count">${(topic.items||[]).length} 則</span>
        <span class="topic-node-arrow">▼</span>
        <div class="topic-node-actions">
          <button class="icon-btn edit" title="編輯主題名稱" onclick="event.stopPropagation();openEditTopic(${ti})">✏</button>
          <button class="icon-btn del" title="刪除主題" onclick="event.stopPropagation();deleteTopic(${ti})">🗑</button>
        </div>
      `;

      const itemList = document.createElement('div');
      // Default open
      itemList.className = 'item-list open';
      itemList.id = 'topic-items-' + ti;

      (topic.items || []).forEach((item, ii) => {
        itemList.appendChild(buildItemEntry(ti, ii, item));
      });

      // Add item button row (with inline form placeholder)
      const addRow = document.createElement('div');
      addRow.className = 'add-topic-row';
      addRow.id = 'add-row-' + ti;
      addRow.innerHTML = `<button class="btn btn-success" style="font-size:0.83rem;padding:6px 14px" onclick="openInlineAdd(${ti})">＋ 新增資料</button>`;
      itemList.appendChild(addRow);

      hd.addEventListener('click', () => {
        hd.classList.toggle('open');
        itemList.classList.toggle('open');
      });

      node.appendChild(hd);
      node.appendChild(itemList);
      tree.appendChild(node);
    });
  }

  /* ────────────────────────
     Build single item entry
  ──────────────────────── */
  function buildItemEntry(ti, ii, item) {
    const row = document.createElement('div');
    row.className = 'item-entry';
    row.id = `item-entry-${ti}-${ii}`;
    row.innerHTML = `
      <div class="item-entry-main">
        <span class="item-entry-q">${escHtml(item.question)}</span>
      </div>
      <div class="item-entry-actions">
        <button class="icon-btn edit" title="編輯" onclick="openInlineEdit(${ti},${ii})">✏</button>
        <button class="icon-btn del" title="刪除" onclick="deleteItem(${ti},${ii})">🗑</button>
      </div>
    `;
    return row;
  }

  /* ════════════════════════
     INLINE EDIT FORM
  ════════════════════════ */
  // pendingImages: { zoneId → [base64...] }
  const pendingImagesMap = {};

  function buildInlineForm(zoneId, item) {
    // item = null for add, object for edit
    const images = item ? getImages(item) : [];
    pendingImagesMap[zoneId] = [...images];

    const thumbsHtml = images.map((src, idx) =>
      `<div class="img-thumb-wrap" id="thumb-${zoneId}-${idx}">
        <img class="img-thumb" src="${escHtml(src)}" alt="圖片${idx+1}">
        <button type="button" class="img-thumb-del" onclick="removeInlineImage('${zoneId}',${idx})" title="移除">✕</button>
      </div>`
    ).join('');

    const zone = document.createElement('div');
    zone.className = 'inline-edit-zone';
    zone.id = zoneId;
    zone.innerHTML = `
      <div class="inline-edit-fields">
        <div class="form-group">
          <label>問題 / 標題</label>
          <input type="text" class="iez-question" placeholder="問題或標題" value="${escHtml(item ? item.question : '')}">
        </div>
        <div class="form-group">
          <label>回答 / 內容</label>
          <textarea class="iez-answer" rows="5" placeholder="詳細回答或說明…">${escHtml(item ? (item.answer || '') : '')}</textarea>
        </div>
        <div class="form-group">
          <label>電話（選填）</label>
          <input type="text" class="iez-phone" placeholder="04-1234567" value="${escHtml(item ? (item.phone || '') : '')}">
        </div>
        <div class="form-group">
          <label>連結（選填）</label>
          <input type="url" class="iez-link" placeholder="https://…" value="${escHtml(item ? (item.link || '') : '')}">
        </div>
        <div class="form-group">
          <label>圖片（可上傳多張）</label>
          <input type="file" class="iez-images" multiple accept="image/*">
          <div class="img-thumb-list" id="thumbs-${zoneId}">${thumbsHtml}</div>
        </div>
      </div>
      <div class="inline-edit-actions">
        <button type="button" class="btn btn-secondary" onclick="cancelInlineEdit('${zoneId}')">取消</button>
        <button type="button" class="btn btn-primary" onclick="saveInlineEdit('${zoneId}')">儲存</button>
      </div>
    `;

    // File input handler
    zone.querySelector('.iez-images').addEventListener('change', function() {
      const files = Array.from(this.files);
      const readers = files.map(f => new Promise(resolve => {
        const r = new FileReader();
        r.onload = e => resolve(e.target.result);
        r.readAsDataURL(f);
      }));
      Promise.all(readers).then(results => {
        pendingImagesMap[zoneId].push(...results);
        renderInlineThumbs(zoneId);
      });
      this.value = '';
    });

    return zone;
  }

  function renderInlineThumbs(zoneId) {
    const imgs = pendingImagesMap[zoneId] || [];
    const container = document.getElementById('thumbs-' + zoneId);
    if (!container) return;
    container.innerHTML = imgs.map((src, idx) =>
      `<div class="img-thumb-wrap">
        <img class="img-thumb" src="${escHtml(src)}" alt="圖片${idx+1}">
        <button type="button" class="img-thumb-del" onclick="removeInlineImage('${zoneId}',${idx})" title="移除">✕</button>
      </div>`
    ).join('');
  }

  window.removeInlineImage = function(zoneId, idx) {
    if (!pendingImagesMap[zoneId]) return;
    pendingImagesMap[zoneId].splice(idx, 1);
    renderInlineThumbs(zoneId);
  };

  /* ── Open inline edit for existing item ── */
  window.openInlineEdit = function(ti, ii) {
    // Close any other open inline zones first
    closeAllInlineZones();

    const county = getCounty();
    const item = county.topics[ti].items[ii];
    const zoneId = `iez-edit-${ti}-${ii}`;
    const entryEl = document.getElementById(`item-entry-${ti}-${ii}`);
    if (!entryEl) return;

    // Hide the entry row's actions temporarily by adding editing class
    entryEl.classList.add('editing');

    const zone = buildInlineForm(zoneId, item);
    zone.dataset.ti = ti;
    zone.dataset.ii = ii;
    zone.dataset.mode = 'edit';

    entryEl.insertAdjacentElement('afterend', zone);
    zone.querySelector('.iez-question').focus();
  };

  /* ── Open inline add at bottom of topic ── */
  window.openInlineAdd = function(ti) {
    closeAllInlineZones();

    const addRow = document.getElementById('add-row-' + ti);
    if (!addRow) return;

    const zoneId = `iez-add-${ti}`;
    const zone = buildInlineForm(zoneId, null);
    zone.dataset.ti = ti;
    zone.dataset.mode = 'add';

    addRow.insertAdjacentElement('beforebegin', zone);
    addRow.style.display = 'none';
    zone.querySelector('.iez-question').focus();
  };

  function closeAllInlineZones() {
    document.querySelectorAll('.inline-edit-zone').forEach(z => {
      const ti = z.dataset.ti;
      const ii = z.dataset.ii;
      const mode = z.dataset.mode;

      if (mode === 'edit' && ti !== undefined && ii !== undefined) {
        const entryEl = document.getElementById(`item-entry-${ti}-${ii}`);
        if (entryEl) entryEl.classList.remove('editing');
      }
      if (mode === 'add' && ti !== undefined) {
        const addRow = document.getElementById('add-row-' + ti);
        if (addRow) addRow.style.display = '';
      }
      delete pendingImagesMap[z.id];
      z.remove();
    });
  }

  window.cancelInlineEdit = function(zoneId) {
    const zone = document.getElementById(zoneId);
    if (!zone) return;
    const ti = zone.dataset.ti;
    const ii = zone.dataset.ii;
    const mode = zone.dataset.mode;

    if (mode === 'edit' && ti !== undefined && ii !== undefined) {
      const entryEl = document.getElementById(`item-entry-${ti}-${ii}`);
      if (entryEl) entryEl.classList.remove('editing');
    }
    if (mode === 'add' && ti !== undefined) {
      const addRow = document.getElementById('add-row-' + ti);
      if (addRow) addRow.style.display = '';
    }
    delete pendingImagesMap[zoneId];
    zone.remove();
  };

  window.saveInlineEdit = function(zoneId) {
    const zone = document.getElementById(zoneId);
    if (!zone) return;

    const question = zone.querySelector('.iez-question').value.trim();
    if (!question) { toast('請輸入問題/標題', 'err'); return; }

    const answer = zone.querySelector('.iez-answer').value.trim();
    const phone = zone.querySelector('.iez-phone').value.trim() || null;
    const link = zone.querySelector('.iez-link').value.trim() || null;
    const images = pendingImagesMap[zoneId] || [];

    const county = getCounty();
    const ti = parseInt(zone.dataset.ti);
    const mode = zone.dataset.mode;

    if (mode === 'add') {
      county.topics[ti].items = county.topics[ti].items || [];
      county.topics[ti].items.push({
        id: currentCountyId + '_item_' + Date.now(),
        question, answer, phone, link,
        images: images.length > 0 ? images : undefined
      });
    } else {
      const ii = parseInt(zone.dataset.ii);
      const item = county.topics[ti].items[ii];
      item.question = question;
      item.answer = answer;
      item.phone = phone;
      item.link = link;
      // Remove old single-image field, store as array
      delete item.image;
      item.images = images.length > 0 ? images : undefined;
    }

    saveData();
    // Clean up and re-render
    delete pendingImagesMap[zoneId];
    renderAdminTopics();
    // Re-expand this topic
    const hd = document.querySelector(`#admin-topic-tree .topic-node:nth-child(${ti+1}) .topic-node-hd`);
    const list = document.getElementById('topic-items-' + ti);
    if (hd && list) { hd.classList.add('open'); list.classList.add('open'); }
  };

  /* ════════════════════════
     MARQUEE
  ════════════════════════ */
  window.saveMarquee = function() {
    const county = getCounty();
    if (!county) return;
    county.marquee = document.getElementById('marquee-input').value;
    saveData();
  };

  /* ════════════════════════
     TOPIC CRUD (Modal)
  ════════════════════════ */
  window.openAddTopic = function() {
    editingTopicIdx = null;
    document.getElementById('modal-topic-title').textContent = '新增主題';
    document.getElementById('topic-name-input').value = '';
    openModal('modal-topic');
    setTimeout(() => document.getElementById('topic-name-input').focus(), 80);
  };

  window.openEditTopic = function(ti) {
    const county = getCounty();
    editingTopicIdx = ti;
    document.getElementById('modal-topic-title').textContent = '編輯主題名稱';
    document.getElementById('topic-name-input').value = county.topics[ti].title;
    openModal('modal-topic');
    setTimeout(() => document.getElementById('topic-name-input').focus(), 80);
  };

  window.saveTopic = function() {
    const name = document.getElementById('topic-name-input').value.trim();
    if (!name) { toast('請輸入主題名稱', 'err'); return; }
    const county = getCounty();
    if (editingTopicIdx === null) {
      county.topics = county.topics || [];
      const id = currentCountyId + '_topic_' + Date.now();
      county.topics.push({ id, title: name, items: [] });
    } else {
      county.topics[editingTopicIdx].title = name;
    }
    saveData();
    renderAdminTopics();
    closeModal('modal-topic');
  };

  window.deleteTopic = function(ti) {
    const county = getCounty();
    const topic = county.topics[ti];
    openConfirm(`確定刪除主題「${topic.title}」及其所有 ${(topic.items||[]).length} 筆資料？`, () => {
      county.topics.splice(ti, 1);
      saveData();
      renderAdminTopics();
    });
  };

  /* ════════════════════════
     ITEM DELETE
  ════════════════════════ */
  window.deleteItem = function(ti, ii) {
    const county = getCounty();
    const item = county.topics[ti].items[ii];
    openConfirm(`確定刪除「${item.question}」？`, () => {
      county.topics[ti].items.splice(ii, 1);
      saveData();
      renderAdminTopics();
      // Re-expand
      setTimeout(() => {
        const hd = document.querySelector(`#admin-topic-tree .topic-node:nth-child(${ti+1}) .topic-node-hd`);
        const list = document.getElementById('topic-items-' + ti);
        if (hd && list) { hd.classList.add('open'); list.classList.add('open'); }
      }, 50);
    });
  };

  /* ════════════════════════
     MODAL
  ════════════════════════ */
  window.openModal = function(id) {
    document.getElementById(id).classList.remove('hidden');
  };
  window.closeModal = function(id) {
    document.getElementById(id).classList.add('hidden');
  };

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.add('hidden');
    });
  });

  // Topic modal: Enter key
  document.getElementById('topic-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveTopic();
  });

  function openConfirm(msg, cb) {
    confirmCallback = cb;
    document.getElementById('confirm-msg').textContent = msg;
    document.getElementById('confirm-ok-btn').onclick = () => {
      closeModal('modal-confirm');
      if (confirmCallback) confirmCallback();
    };
    openModal('modal-confirm');
  }

  /* ════════════════════════
     TOAST
  ════════════════════════ */
  let toastTimer;
  function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + (type || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  /* ════════════════════════
     HELPERS
  ════════════════════════ */
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window._adminToast = toast;

})();
</script>
</body>
</html>
